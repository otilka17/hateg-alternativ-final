<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .gold { fill: #c5a059; }
      .gold-stroke { stroke: #c5a059; fill: none; }
      .title { font-family: 'Cinzel', Georgia, serif; font-size: 40px; font-weight: 600; letter-spacing: 14px; }
      .subtitle { font-family: 'Inter', Arial, sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 7px; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <circle cx="250" cy="250" r="235" class="gold-stroke" stroke-width="1.5" opacity="0.7"/>
  <circle cx="250" cy="250" r="215" class="gold-stroke" stroke-width="3"/>

  <circle cx="250" cy="140" r="45" class="gold-stroke" stroke-width="3"/>

  <polygon points="250,140 120,310 380,310" class="gold"/>

  <text x="257" y="380" class="gold title" text-anchor="middle">METANOIA</text>
  
  <text x="253" y="420" class="gold subtitle" text-anchor="middle">HAȚEG ALTERNATIV</text>

  <circle cx="250" cy="450" r="4" class="gold"/>
</svg>
