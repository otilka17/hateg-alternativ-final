<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>DIAGNOSTIC STUDIO FOTO DIANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-6">
    <div class="max-w-3xl mx-auto space-y-8">
        
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black text-amber-500">DIAGNOSTIC: STUDIO FOTO DIANA</h1>
            <p class="text-slate-400">Analiză obiectivă pentru a elimina orice incertitudine.</p>
        </div>

        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-700 shadow-2xl">
            <h2 class="text-lg font-bold mb-6 border-b border-slate-700 pb-4">PILONII DE SIGURANȚĂ — GAL COLINELE MOLDOVEI</h2>
            <div class="space-y-6">
                
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">1. Sediul în teritoriul GAL?</label>
                    <select id="s1" onchange="update()" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                        <option value="0">Nu</option>
                        <option value="25">Da, acoperă zona (25p)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">2. Aveți experiență sau cursuri foto?</label>
                    <select id="s2" onchange="update()" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                        <option value="0">Nu</option>
                        <option value="25">Da, am cursuri/portofoliu (25p)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">3. Buget cofinanțare (20%)?</label>
                    <select id="s3" onchange="update()" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                        <option value="0">Nu</option>
                        <option value="25">Da, este disponibil (25p)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">4. Potențial angajare locală?</label>
                    <select id="s4" onchange="update()" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                        <option value="0">Nu</option>
                        <option value="25">Da, 1 loc de muncă (25p)</option>
                    </select>
                </div>

            </div>
        </div>

        <div class="bg-gradient-to-br from-emerald-600 to-emerald-800 p-8 rounded-3xl text-center">
            <div id="scor" class="text-7xl font-black text-white">0</div>
            <div class="text-sm font-bold opacity-80 mt-2">PUNCTAJ DE SIGURANȚĂ — DIANA</div>
            <p id="msg" class="mt-4 text-sm italic opacity-90">Completați grila pentru analiza de risc.</p>
        </div>
    </div>

    <script>
        function update() {
            const s1 = parseInt(document.getElementById('s1').value);
            const s2 = parseInt(document.getElementById('s2').value);
            const s3 = parseInt(document.getElementById('s3').value);
            const s4 = parseInt(document.getElementById('s4').value);
            const total = s1 + s2 + s3 + s4;
            
            document.getElementById('scor').innerText = total;
            const msg = document.getElementById('msg');
            if (total >= 75) msg.innerText = "RISC SCAZUT: Diana, ai premisele unui dosar câștigător!";
            else if (total >= 50) msg.innerText = "RISC MODERAT: Mai avem de lucrat la câteva detalii.";
            else msg.innerText = "RISC RIDICAT: Trebuie să consolidăm baza înainte de depunere.";
        }
    </script>
</body>
</html>
