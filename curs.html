        /* GATE DE ACCES */
        #login-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--negru); z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .gate-box {
            max-width: 450px; width: 100%; padding: 60px 40px;
            border: 1px solid var(--aur); background: rgba(17, 17, 17, 0.9);
            box-shadow: 0 0 80px rgba(197, 160, 89, 0.15);
        }
        .gate-box h2 { font-family: 'Cinzel'; color: var(--aur); font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 40px; }

            width: 100%; padding: 20px; background: #000; border: 1px solid #333;
            color: var(--aur); text-align: center; font-family: 'Inter'; font-size: 1.2rem;
            margin-bottom: 25px; outline: none; letter-spacing: 4px;
        }
        .gate-box button {
            width: 100%; padding: 20px; background: var(--aur); color: #000;
            border: none; font-family: 'Cinzel'; font-weight: 900; letter-spacing: 3px;
            cursor: pointer; transition: 0.5s ease;
        }
        .gate-box button:hover { background: #fff; transform: translateY(-3px); }
        #error-msg { color: #ff4444; font-size: 0.7rem; margin-top: 20px; display: none; font-family: 'Cinzel'; letter-spacing: 1px; }

        #main-content { display: none; opacity: 0; transition: opacity 1.5s ease-in; }

        header { 
            height: 80vh;

            display: flex; align-items: center; justify-content: center; text-align: center; border-bottom: 1px solid var(--aur);

        .badge { border: 1px solid var(--aur); padding: 8px 20px; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 5px; color: var(--aur); margin-bottom: 30px; display: inline-block; }

        .tagline { font-family: 'Cinzel'; font-size: 1.1rem; letter-spacing: 8px; color: #888; text-transform: uppercase; }
