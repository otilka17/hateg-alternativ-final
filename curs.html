<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acces Protocol | Metanoia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #c5a059; font-family: 'Cinzel', serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        .gate-wrap { text-align: center; width: 90%; max-width: 400px; }
        .label { letter-spacing: 5px; font-size: 0.7rem; margin-bottom: 30px; display: block; opacity: 0.6; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #c5a059; text-align: center; font-size: 1.5rem; width: 100%; padding: 15px; outline: none; letter-spacing: 10px; transition: 0.5s; }
        input:focus { border-bottom-color: #c5a059; }
        .error { color: #822; font-size: 0.6rem; margin-top: 15px; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="gate-wrap">
        <span class="label">INTRODUCEȚI CHEIA DE ELITĂ</span>
        <input type="password" id="key" placeholder="••••••••" autocomplete="off">
        <p id="err" class="error">CHEIE INVALIDĂ</p>
    </div>

    <script>
        const input = document.getElementById('key');
        const err = document.getElementById('err');
        // Cheia "elita2026" mascata
        const secret = "ZWxpdGEyMDI2"; 

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (btoa(input.value) === secret) {
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = "masterplan.html"; }, 500);
                } else {
                    err.style.opacity = '1';
                    input.value = '';
                    setTimeout(() => { err.style.opacity = '0'; }, 2000);
                }
            }
        });
    </script>
</body>
</html>
