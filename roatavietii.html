<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roata Vieții - Exercițiu Interactiv</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        header {
            text-align: center;
            grid-column: 1 / -1;
            margin-bottom: 20px;
        }

        header h1 { margin: 0 0 10px 0; color: var(--primary); }
        header p { margin: 0; color: #7f8c8d; font-style: italic; }

        .sliders-sect {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
        }

        .input-group label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .input-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .chart-sect {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 20px;
        }

        canvas {
            max-width: 100%;
            background: #fff;
        }

        .quote {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            border-top: 1px solid #eee;
            font-size: 0.95em;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Roata Vieții tale</h1>
        <p>"Dacă vrei ca roata să se învârtă lin, spițele trebuie să fie egale." — Stilul Zig Ziglar</p>
    </header>

    <div class="sliders-sect">
        <div class="input-group">
            <label>1. Aspectul Fizic <span id="val1">5</span>/10</label>
            <input type="range" id="asp1" min="1" max="10" value="5" oninput="updateWheel()">
        </div>
        
        <div class="input-group">
            <label>2. Aspectul Spiritual <span id="val2">5</span>/10</label>
            <input type="range" id="asp2" min="1" max="10" value="5" oninput="updateWheel()">
        </div>

        <div class="input-group">
            <label>3. Aspectul Mental <span id="val3">5</span>/10</label>
            <input type="range" id="asp3" min="1" max="10" value="5" oninput="updateWheel()">
        </div>

        <div class="input-group">
            <label>4. Aspectul Familial <span id="val4">5</span>/10</label>
            <input type="range" id="asp4" min="1" max="10" value="5" oninput="updateWheel()">
        </div>

        <div class="input-group">
            <label>5. Aspectul Personal <span id="val5">5</span>/10</label>
            <input type="range" id="asp5" min="1" max="10" value="5" oninput="updateWheel()">
        </div>

        <div class="input-group">
            <label>6. Aspectul Profesional <span id="val6">5</span>/10</label>
            <input type="range" id="asp6" min="1" max="10" value="5" oninput="updateWheel()">
        </div>
    </div>

    <div class="chart-sect">
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <div class="quote">
        <p><strong>Notă de reflexie:</strong> Privește forma geometrică rezultată. Este o roată rotundă cu care poți rula cu viteză maximă pe drumul succesului, sau are hopuri care îți sabotează echilibrul?</p>
    </div>
</div>

<script>
    const labels = [
        "1. Fizic",
        "2. Spiritual",
        "3. Mental",
        "4. Familial",
        "5. Personal",
        "6. Profesional"
    ];

    function updateWheel() {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const maxRadius = 150;

        // Preluare valori din slidere
        const values = [
            parseInt(document.getElementById('asp1').value),
            parseInt(document.getElementById('asp2').value),
            parseInt(document.getElementById('asp3').value),
            parseInt(document.getElementById('asp4').value),
            parseInt(document.getElementById('asp5').value),
            parseInt(document.getElementById('asp6').value)
        ];

        // Actualizare text numeric de langa slidere
        for(let i=1; i<=6; i++) {
            document.getElementById(`val${i}`).innerText = document.getElementById(`asp${i}`).value;
        }

        // Curatare canvas
        ctx.clearRect(0, 0, width, height);

        const numSlices = 6;
        const anglePerSlice = (2 * Math.PI) / numSlices;

        // 1. Desenare cercuri concentrice (Ghidaj de la 1 la 10)
        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;
        for (let i = 1; i <= 10; i++) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, (maxRadius / 10) * i, 0, 2 * Math.PI);
            ctx.stroke();
        }

        // 2. Desenare axe (spițele roții)
        ctx.strokeStyle = '#b2bec3';
        for (let i = 0; i < numSlices; i++) {
            const angle = i * anglePerSlice - Math.PI / 2; // Incepe de sus (ora 12)
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + maxRadius * Math.cos(angle), centerY + maxRadius * Math.sin(angle));
            ctx.stroke();

            // Adaugare etichete text text
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 13px Segoe UI';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const labelDist = maxRadius + 25;
            const labelX = centerX + labelDist * Math.cos(angle);
            const labelY = centerY + labelDist * Math.sin(angle);
            ctx.fillText(labels[i], labelX, labelY);
        }

        // 3. Desenare poligon de performanță (Roata ta reală)
        ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 3;
        ctx.beginPath();

        for (let i = 0; i < numSlices; i++) {
            const angle = i * anglePerSlice - Math.PI / 2;
            const currentRadius = (maxRadius / 10) * values[i];
            const x = centerX + currentRadius * Math.cos(angle);
            const y = centerY + currentRadius * Math.sin(angle);

            if (i === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Puncte pe fiecare colț al roții pentru un aspect finisat
        for (let i = 0; i < numSlices; i++) {
            const angle = i * anglePerSlice - Math.PI / 2;
            const currentRadius = (maxRadius / 10) * values[i];
            const x = centerX + currentRadius * Math.cos(angle);
            const y = centerY + currentRadius * Math.sin(angle);
            
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);
            ctx.fill();
        }
    }

    // Initializare la incarcarea paginii
    window.onload = updateWheel;
</script>

</body>
</html>
