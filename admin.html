<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Bază de Date Rezervări</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --gri: #0d0d0d; --alb: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; padding: 40px 20px; }

        /* HEADER ADMIN - LOGO-UL TĂU FIXAT SUS */
        .admin-header { 
            text-align: center; 
            margin-bottom: 60px; 
            border-bottom: 1px solid #222; 
            padding-bottom: 40px;
        }
        
        /* CONTAINER LOGO - SĂ SE VADĂ BRUTAL */
        .admin-header svg { 
            height: 220px; /* Dimensiune mare pentru impact */
            width: auto; 
            display: block; 
            margin: 0 auto 20px;
            filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.3));
        }

        h1 { font-family: 'Playfair Display', serif; font-style: italic; color: var(--auriu); font-size: 3rem; letter-spacing: 2px; }

        /* TABEL REZERVĂRI */
        .table-container { max-width: 1400px; margin: 0 auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--gri); border: 1px solid #222; }
        th { background: var(--auriu); color: #000; padding: 20px; text-align: left; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        td { padding: 20px; border-bottom: 1px solid #222; font-size: 1.1rem; }
        tr:hover { background: #151515; }

        .status { font-weight: 900; text-transform: uppercase; color: var(--auriu); }
        
        #loading { text-align: center; padding: 100px; font-size: 1.5rem; letter-spacing: 5px; color: var(--auriu); font-weight: 900; }
        .error-msg { border: 2px solid #ff4444; color: #ff4444; padding: 30px; text-align: center; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-header">
        <svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="skyGradient" cx="50%" cy="40%" r="70%">
                    <stop offset="0%" style="stop-color:#fff9e6;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#d4c5a1;stop-opacity:1" />
                </radialGradient>
                <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#d4a35a;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#7a5c32;stop-opacity:1" />
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>
            <rect width="800" height="800" fill="url(#skyGradient)" />
            <circle cx="400" cy="300" r="100" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8" filter="url(#glow)" />
            <path d="M250 450 L400 300 L550 450 Z" fill="url(#mountainGradient)" opacity="0.9" />
            <g transform="translate(400, 520)" fill="#3d3d3d">
                <path d="M-10 -50 C-80 -100 -200 -150 -250 50 C-180 30 -120 10 -10 -10 Z" opacity="0.9" />
                <path d="M10 -50 C80 -100 200 -150 250 50 C180 30 120 10 10 -10 Z" opacity="0.9" />
            </g>
            <g font-family="Playfair Display, Serif" text-anchor="middle" fill="#ffffff">
                <text x="400" y="760" font-size="44" font-weight="900" letter-spacing="2">HAȚEG ALTERNATIV</text>
            </g>
        </svg>
        <h1>Bază de Date Rezervări</h1>
    </div>

    <div id="loading">SINCROZINARE CU GOOGLE SHEETS...</div>

    <div class="table-container" id="admin-content" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Client</th>
                    <th>Telefon</th>
                    <th>Sejur</th>
                    <th>Suma</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="data-rows">
                </tbody>
        </table>
    </div>

    <script>
        // PUNE AICI URL-UL TĂU DE LA GOOGLE (CEL CU /exec)
        const URL_SHEET = "AICI_PUNE_URL_UL_TAU_DE_LA_GOOGLE";

        async function loadData() {
            try {
                const res = await fetch(URL_SHEET);
                const data = await response.json();
                
                const rows = document.getElementById('data-rows');
                const loading = document.getElementById('loading');
                const content = document.getElementById('admin-content');

                rows.innerHTML = data.map(item => `
                    <tr>
                        <td>${item['Data Inreg'] || '-'}</td>
                        <td style="color:var(--auriu); font-weight:bold;">${item['Client'] || '-'}</td>
                        <td>${item['Telefon'] || '-'}</td>
                        <td>${item['Sejur'] || '-'}</td>
                        <td style="font-weight:bold;">${item['Total'] || '-'}</td>
                        <td class="status">${item['Status'] || 'Activ'}</td>
                    </tr>
                `).join('');

                loading.style.display = 'none';
                content.style.display = 'block';

            } catch (e) {
                document.getElementById('loading').innerHTML = `
                <div class="error-msg">
                    EROARE DE PERMISIUNE GOOGLE.<br>
                    Verifică dacă ai dat Deployment ca "Anyone".
                </div>`;
            }
        }
        loadData();
    </script>
</body>
</html>
