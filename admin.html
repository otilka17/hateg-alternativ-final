<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; background: #fdfcf8; color: #1a1a1a; }
        .admin-box { max-width: 1100px; margin: 0 auto; background: #fff; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { font-weight: 700; margin-bottom: 20px; border-bottom: 2px solid #c5a059; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; border: 1px solid #eee; text-align: left; font-size: 0.85rem; }
        th { background: #c5a059; color: white; text-transform: uppercase; letter-spacing: 1px; }
        tr:nth-child(even) { background: #fafafa; }
        .status { font-weight: 700; color: #c5a059; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>Bază de Date Rezervări</h1>
        <table id="tabel-admin">
            <thead>
                <tr>
                    <th>Data Înreg.</th>
                    <th>Client</th>
                    <th>Telefon</th>
                    <th>Sejur (Check-in/out)</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="lista-rezervari">
                <tr><td colspan="6" style="text-align:center;">Se încarcă rezervările...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function incarcaRezervari() {
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwofzsm29XJWpkSw2A5l3aC2Jz5p2NNq8LMkzptewh1yjI8M3EUZ8NLwxsGVkDDS4b_/exec';
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                let html = '';
                if(data.length === 0) {
                    html = '<tr><td colspan="6" style="text-align:center;">Nu există rezervări încă.</td></tr>';
                } else {
                    data.forEach(r => {
                        html += `
                            <tr>
                                <td>${r.data}</td>
                                <td><strong>${r.nume}</strong></td>
                                <td>${r.telefon}</td>
                                <td>${r.sejur}</td>
                                <td>${r.total}</td>
                                <td class="status">${r.status}</td>
                            </tr>
                        `;
                    });
                }
                document.getElementById('lista-rezervari').innerHTML = html;
            } catch (e) {
                document.getElementById('lista-rezervari').innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Eroare la încărcare. Verifică permisiunile Script-ului.</td></tr>';
            }
        }
        incarcaRezervari();
    </script>
</body>
</html>
