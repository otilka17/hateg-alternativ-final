<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Admin | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; background: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 15px; border: 1px solid #eee; text-align: left; font-size: 0.9rem; }
        th { background: #c5a059; color: white; }
        .status-nou { background: #e3f2fd; color: #1976d2; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="margin-bottom:30px;">Panou Administrare Rezervări</h1>
    <table id="tabel-admin">
        <thead>
            <tr>
                <th>Data Rezervării</th>
                <th>Client</th>
                <th>Telefon</th>
                <th>Sejur</th>
                <th>Total</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="lista-rezervari">
            <tr><td colspan="6">Se încarcă datele...</td></tr>
        </tbody>
    </table>

    <script>
        async function incarcaDate() {
            const scriptURL = 'PUNE_AICI_URL_UL_TAU_DE_LA_DEPLOY';
            try {
                const response = await fetch(scriptURL);
                const date = await response.json();
                
                let html = '';
                date.forEach(r => {
                    html += `
                        <tr>
                            <td>${r.data}</td>
                            <td>${r.nume}</td>
                            <td>${r.telefon}</td>
                            <td>${r.sejur}</td>
                            <td>${r.total}</td>
                            <td><span class="status-nou">${r.status}</span></td>
                        </tr>
                    `;
                });
                document.getElementById('lista-rezervari').innerHTML = html;
            } catch (e) {
                document.getElementById('lista-rezervari').innerHTML = 'Eroare la încărcare.';
            }
        }
        incarcaDate();
    </script>
</body>
</html>
