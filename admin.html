<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>METANOIA | ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #030303; color: #fff; font-family: 'Inter', sans-serif; }
        .row-table { border-bottom: 1px solid #1a1a1a; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-[#c5a059] font-cinzel text-2xl mb-8">ACTIVITATE RECENTĂ</h1>
        
        <table class="w-full text-left text-sm">
            <thead>
                <tr class="text-gray-500 uppercase text-[10px] tracking-widest">
                    <th class="pb-4">Client</th>
                    <th class="pb-4">Comandă</th>
                    <th class="pb-4">Status</th>
                </tr>
            </thead>
            <tbody id="comenzi-list">
                <!-- Aici se vor popula datele din WhatsApp -->
                <tr class="row-table">
                    <td class="py-4">Ion Popescu</td>
                    <td class="py-4">Ceaun Pui</td>
                    <td class="py-4 text-[#c5a059]">În lucru</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
