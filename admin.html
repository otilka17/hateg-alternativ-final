<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrare | Hațeg alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Stiluri specifice pentru Admin - Fara litere mari */
        body { background-color: #fdfcf8; padding-top: 40px; }
        
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        .stat-card { 
            background: white; 
            border: 1px solid #eee; 
            border-radius: 20px; 
            padding: 25px; 
            text-align: left; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
        }
        
        .stat-card span { color: #64748b; font-size: 0.85rem; display: block; margin-bottom: 10px; font-weight: 400; text-transform: none; }
        .stat-card strong { color: #1b3022; font-size: 2.5rem; font-family: 'Inter', sans-serif; font-weight: 800; }
        
        .admin-toolbar { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }
        
        .admin-search, .admin-filter { 
            padding: 14px 20px; 
            border: 1px solid #eee; 
            border-radius: 50px; 
            flex: 1; 
            min-width: 250px; 
            outline: none; 
            font-family: 'Inter';
            font-size: 0.9rem;
            background: white;
        }

        .admin-table-wrap { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid #eee; 
            overflow-x: auto; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; text-align: left; }
        .admin-table th { padding: 15px; border-bottom: 2px solid #f8f9fa; color: #1b3022; font-weight: 700; text-transform: none; }
        .admin-table td { padding: 15px; border-bottom: 1px solid #f8f9fa; vertical-align: middle; }

        /* Status Badges - Rotunjite si discrete */
        .status-badge { display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; text-transform: none; }
        .status-new { background: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
        .status-confirmed { background: #f0fdf4; color: #15803d; border: 1px solid #dcfce7; }
        .status-cancelled { background: #fef2f2; color: #b91c1c; border: 1px solid #fee2e2; }

        .status-select { padding: 8px; border-radius: 10px; border: 1px solid #eee; font-size: 0.85rem; background: #fafafa; outline: none; }

        h1 { font-family: 'Playfair Display', serif; text-transform: none; font-size: 2.2rem; margin-bottom: 10px; }
        p { color: #64748b; font-weight: 300; }

        .btn-refresh { 
            background: #1b3022; 
            color: white; 
            border: none; 
            padding: 14px 25px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem;
            transition: opacity 0.3s;
        }
        .btn-refresh:hover { opacity: 0.9; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand" style="text-transform: none;">
            <span>Panou administrator</span>
        </a>
        <nav class="main-nav">
            <a href="index.html" style="text-transform: none;">Înapoi la site</a>
        </nav>
    </div>
</header>

<div class="admin-container" style="margin-top: 40px;">
    <div style="margin-bottom: 40px;">
        <h1 class="metanoia-title">Gestionați rezervările</h1>
        <p>Monitorizați cererile și actualizați statusul fiecărui oaspete.</p>
    </div>

    <div class="dashboard-stats">
        <div class="stat-card">
            <span>Total cereri</span>
            <strong id="statTotal">0</strong>
        </div>
        <div class="stat-card">
            <span>Noi (necontactați)</span>
            <strong id="statNew" style="color: #c2410c;">0</strong>
        </div>
        <div class="stat-card">
            <span>Confirmate</span>
            <strong id="statConfirmed" style="color: #15803d;">0</strong>
        </div>
        <div class="stat-card">
            <span>Anulate</span>
            <strong id="statCancelled" style="color: #b91c1c;">0</strong>
        </div>
    </div>

    <div class="admin-toolbar">
        <input type="text" id="searchInput" placeholder="Căutați nume, telefon sau email..." class="admin-search">

        <select id="statusFilter" class="admin-filter">
            <option value="">Toate statusurile</option>
            <option value="Nouă">Doar noi</option>
            <option value="Confirmată">Doar confirmate</option>
            <option value="Anulată">Doar anulate</option>
        </select>

        <button id="refreshBtn" class="btn-refresh">Reîncărcați datele</button>
    </div>

    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Client</th>
                    <th>Contact</th>
                    <th>Locație & Sejur</th>
                    <th>Experiențe & Total</th>
                    <th>Status</th>
                    <th>Acțiune</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>

        <div id="emptyState" style="display:none; text-align: center; padding: 60px; color: #94a3b8;">
            Nu s-a găsit nicio rezervare în baza de date.
        </div>
    </div>
</div>

<script src="js/admin.js"></script>

</body>
</html>
