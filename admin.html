<script>
    // PUNE AICI URL-UL NOU DE DUPĂ DEPLOY
    const SCRIPT_URL = "URL_UL_TAU_NOU_DE_LA_PASUL_2";

    async function loadReservations() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            const rows = document.getElementById('data-rows');
            rows.innerHTML = data.map(item => `
                <tr>
                    <td><small>${item['Data'] || '-'}</small></td>
                    <td class="client-name">${item['Nume'] || '-'}</td>
                    <td>${item['Telefon'] || '-'}</td>
                    <td>${item['Email'] || '-'}</td>
                    <td>${item['Locație'] || '-'}</td>
                    <td>${item['Check-in'] || '-'}</td>
                    <td>${item['Check-out'] || '-'}</td>
                    <td>${item['Persoane'] || '-'}</td>
                    <td class="total-bold">${item['Total'] || '0'} RON</td>
                    <td><small>${item['Mesaj'] || '-'}</small></td>
                </tr>
            `).join('');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';

        } catch (err) {
            document.getElementById('loading').innerHTML = `<div class="error-msg">EROARE: ${err.message}<br>Verifică dacă ai dat Deploy ca "Anyone"!</div>`;
        }
    }
    loadReservations();
</script>
