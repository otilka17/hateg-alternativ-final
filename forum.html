<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal SOulmeal | Metanoia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #1b3022; --auriu: #c5a059; --crem: #fdfcf8; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--verde); margin: 0; }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        
        h1 { font-family: 'Playfair Display'; font-size: 2.5rem; text-align: center; margin-top: 50px; color: var(--verde); }
        .subtitle { text-align: center; color: var(--auriu); font-family: 'Cinzel', serif; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 40px; }
        
        .input-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 30px 0; border: 1px solid #f0f0f0; }
        textarea { width: 100%; height: 100px; border: 1px solid #eee; border-radius: 12px; padding: 15px; background: #fafafa; outline: none; margin-bottom: 10px; font-family: 'Inter'; }
        
        .btn-gold { background: var(--auriu); color: white; padding: 12px 30px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-gold:hover { background: var(--verde); }

        .post-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--auriu); animation: aparitie 0.5s ease-out; }
        @keyframes aparitie { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-meta { font-size: 0.75rem; color: var(--auriu); font-weight: 700; margin-top: 10px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>Jurnal SOulmeal</h1>
    <div class="subtitle">EXPERIENȚA ALIMENTAȚIEI CONȘTIENTE</div>

    <div class="input-box">
        <textarea id="mesajForum" placeholder="Cum te-a transformat gustul de astăzi?"></textarea>
        <button onclick="posteaza()" class="btn-gold">Rânduiește experiența</button>
    </div>

    <div id="lista">
        <div class="post-card">
            <p>"SOulmeal nu este doar hrană, este un reset mental. Claritatea pe care o am după masa de prânz este incredibilă."</p>
            <span class="post-meta">Arhitect, comunitatea Metanoia</span>
        </div>
    </div>
</div>

<script>
function posteaza(){
    const input = document.getElementById("mesajForum");
    if(!input.value) return;
    
    const div = document.createElement("div");
    div.className = "post-card";
    
    div.innerHTML = `
        <p>"${input.value}"</p>
        <span class="post-meta">Tu, în fluxul Metanoia</span>
    `;
    
    document.getElementById("lista").prepend(div);
    input.value = "";
}
</script>

</body>
</html>
