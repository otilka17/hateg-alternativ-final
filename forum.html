<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jurnalul Rânduielii | Metanoia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@100;200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --auriu: #c5a059; 
            --negru-lux: #050505; 
            --negru-pur: #000; 
            --alb-mat: #f0f0f0; 
            --text-muted: #666; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru-pur); color: var(--alb-mat); font-family: 'Inter', sans-serif; line-height: 1.8; overflow-x: hidden; }

        /* HEADER EDITORIAL */
        .site-header { position: sticky; top: 0; width: 100%; z-index: 999; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid #111; }
        .brand-logo img { height: 35px; }
        .nav-back { color: var(--auriu); font-family: 'Cinzel'; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .nav-back:hover { color: #fff; }

        /* HERO SECTION */
        .forum-hero { height: 40vh; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; background: url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=2000') center/cover no-repeat; }
        .forum-hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--negru-pur), rgba(0,0,0,0.4)); }
        
        .hero-content { position: relative; z-index: 2; }
        .hero-content h1 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 6vw, 4rem); font-style: italic; color: #fff; line-height: 1; }
        .hero-content p { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 6px; font-size: 0.7rem; margin-top: 15px; }

        /* CONTAINER JURNAL */
        .forum-container { max-width: 800px; margin: -60px auto 100px; padding: 0 20px; position: relative; z-index: 5; }

        /* INPUT AREA */
        .publish-card { background: var(--negru-lux); border: 1px solid #1a1a1a; padding: 40px; margin-bottom: 80px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .publish-card textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; font-family: 'Inter'; font-weight: 200; font-size: 1.2rem; padding: 20px 0; outline: none; resize: none; margin-bottom: 30px; transition: 0.3s; }
        .publish-card textarea:focus { border-bottom-color: var(--auriu); }
        
        .publish-footer { display: flex; justify-content: space-between; align-items: center; }
        .user-tag { font-family: 'Cinzel'; font-size: 0.6rem; color: #444; letter-spacing: 2px; }
        .btn-publish { background: var(--auriu); color: #000; border: none; padding: 12px 40px; font-family: 'Cinzel'; font-weight: 900; font-size: 0.75rem; letter-spacing: 3px; cursor: pointer; transition: 0.4s; }
        .btn-publish:hover { background: #fff; transform: translateY(-2px); }
        .btn-publish:disabled { opacity: 0.3; cursor: not-allowed; }

        /* FEED POSTS */
        .post-entry { margin-bottom: 80px; border-left: 2px solid var(--auriu); padding-left: 40px; opacity: 0; transform: translateY(20px); animation: slideIn 0.8s ease forwards; }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }

        .post-meta { font-family: 'Cinzel'; font-size: 0.65rem; color: var(--auriu); letter-spacing: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; opacity: 0.6; }
        .post-body { color: #ccc; font-size: 1.25rem; font-weight: 200; line-height: 1.8; margin-bottom: 30px; white-space: pre-wrap; font-family: 'Inter'; }
        
        .post-actions { display: flex; gap: 30px; }
        .align-btn { background: transparent; border: 1px solid #1a1a1a; color: #555; padding: 8px 20px; font-size: 0.65rem; font-family: 'Cinzel'; letter-spacing: 2px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .align-btn:hover { border-color: var(--auriu); color: var(--auriu); }
        .align-btn.active { background: rgba(197, 160, 89, 0.1); border-color: var(--auriu); color: var(--auriu); }

        .empty-state { text-align: center; padding: 100px 0; color: #222; font-family: 'Cinzel'; letter-spacing: 8px; font-size: 0.8rem; }

        /* NOTIFICATIONS */
        #status-msg { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; background: var(--auriu); color: #000; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 2px; z-index: 10000; transform: translateY(100px); transition: 0.5s; font-weight: 900; }
        #status-msg.show { transform: translateY(0); }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html" class="brand-logo"><img src="images/logo1.svg" alt="Metanoia"></a>
        <a href="index.html" class="nav-back">← ÎNAPOI ÎN HUB</a>
    </header>

    <section class="forum-hero">
        <div class="hero-content">
            <h1>Jurnalul Rânduielii</h1>
            <p>ALINIERE SISTEMICĂ</p>
        </div>
    </section>

    <div class="forum-container">
        <!-- ZONA DE SCRIERE -->
        <div class="publish-card">
            <textarea id="post-text" rows="3" placeholder="Ce adevăr sistemic rânduim astăzi?"></textarea>
            <div class="publish-footer">
                <span id="user-display-id" class="user-tag">IDENTIFICARE...</span>
                <button id="btn-submit" class="btn-publish" disabled>PUBLICĂ</button>
            </div>
        </div>

        <!-- LISTA DE POSTĂRI -->
        <div id="posts-list">
            <div class="empty-state">CONECTARE LA SURSĂ...</div>
        </div>
    </div>

    <div id="status-msg">ACȚIUNE ÎNREGISTRATĂ</div>

    <!-- FIREBASE INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global environment vars
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'metanoia-forum';

        let user = null;

        // 1. Auth Orchestration (Rule 3)
        const startSession = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Eroare Auth:", err);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('user-display-id').innerText = `ARHITECT: ${user.uid.substring(0, 8)}`;
                document.getElementById('btn-submit').disabled = false;
                initFeed();
            }
        });

        startSession();

        // 2. Real-time Feed (Rule 1 & 2)
        function initFeed() {
            if (!user) return;
            const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
            
            // Manual sort in JS (Rule 2)
            onSnapshot(postsRef, (snapshot) => {
                const list = document.getElementById('posts-list');
                const posts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                                         .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                if (posts.length === 0) {
                    list.innerHTML = '<div class="empty-state">TĂCEREA ESTE PRIMA FORMĂ DE RÂNDUIALĂ.</div>';
                    return;
                }

                list.innerHTML = '';
                posts.forEach(post => {
                    const time = post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleDateString('ro-RO') : 'Acum';
                    const isAligned = post.alignments?.includes(user.uid);
                    
                    const postDiv = document.createElement('div');
                    postDiv.className = 'post-entry';
                    postDiv.innerHTML = `
                        <div class="post-meta">
                            <span>ID: ${post.authorId.substring(0, 6)}</span>
                            <span>${time}</span>
                        </div>
                        <div class="post-body">${post.content}</div>
                        <div class="post-actions">
                            <button class="align-btn ${isAligned ? 'active' : ''}" onclick="window.toggleAlign('${post.id}', ${isAligned})">
                                <i class="fas fa-link"></i> ${post.alignments?.length || 0} ALINIERI
                            </button>
                        </div>
                    `;
                    list.appendChild(postDiv);
                });
            }, (err) => {
                showMsg("EROARE CONECTARE FEED");
            });
        }

        // 3. Post Action
        document.getElementById('btn-submit').onclick = async () => {
            const textarea = document.getElementById('post-text');
            const content = textarea.value.trim();
            if (!content || !user) return;

            try {
                const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                await addDoc(postsRef, {
                    content: content,
                    authorId: user.uid,
                    createdAt: serverTimestamp(),
                    alignments: []
                });
                textarea.value = '';
                showMsg("GÂND RÂNDUIT");
            } catch (err) {
                showMsg("EROARE PUBLICARE");
            }
        };

        // 4. Alignment Interaction (Global Access)
        window.toggleAlign = async (id, active) => {
            if (!user) return;
            const postDoc = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
            try {
                await updateDoc(postDoc, {
                    alignments: active ? arrayRemove(user.uid) : arrayUnion(user.uid)
                });
            } catch (err) {
                console.error("Eroare aliniere");
            }
        };

        function showMsg(txt) {
            const m = document.getElementById('status-msg');
            m.innerText = txt;
            m.classList.add('show');
            setTimeout(() => m.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
