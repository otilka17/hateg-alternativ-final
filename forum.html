<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Metanoia | Hațeg Alternativ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --auriu: #c5a059; --negru: #000000; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER - Sincronizat cu restul site-ului */
        .site-header { position: relative; width: 100%; z-index: 9999; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .brand-logo { height: 50px; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.5)); }
        .brand-logo svg { height: 100%; width: auto; }

        /* FORUM HERO */
        .forum-hero { padding: 60px 20px; text-align: center; background: linear-gradient(to bottom, #0a0a0a, #000); }
        .forum-hero h1 { font-family: 'Playfair Display'; font-size: 3rem; color: var(--auriu); font-style: italic; margin-bottom: 10px; }
        .forum-hero p { font-family: 'Cinzel'; letter-spacing: 3px; font-size: 0.9rem; color: #888; }

        /* FEED CONTAINER - Unde apare widget-ul Elfsight */
        .feed-container { max-width: 1000px; margin: 20px auto 100px; padding: 0 20px; min-height: 400px; }

        /* FOOTER LEGAL */
        .footer-legal { padding: 60px 20px; background: #080808; border-top: 1px solid #1a1a1a; margin-top: 50px; }
        .footer-content { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-section h4 { color: var(--auriu); font-family: 'Cinzel'; margin-bottom: 20px; font-size: 0.8rem; letter-spacing: 2px; }
        .footer-section p, .footer-section a { font-size: 0.75rem; color: #888 !important; text-decoration: none; margin-bottom: 10px; display: block; }
        
        .anpc-links { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .anpc-links img { height: 40px; background: white; border-radius: 4px; padding: 2px; }
        .qr-box { background: white; padding: 8px; display: inline-block; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="brand-logo">
            <svg viewBox="0 0 800 500">
                <circle cx="400" cy="250" r="105" fill="none" stroke="#c5a059" stroke-width="4" opacity="0.6"/>
                <path d="M300 400 L400 200 L500 400 Z" fill="#c5a059"/>
            </svg>
        </div>
        <nav><a href="index.html" style="color:var(--auriu); text-decoration:none; font-family:'Cinzel'; font-size:0.7rem; letter-spacing:2px;">ÎNAPOI LA SITE</a></nav>
    </header>

    <section class="forum-hero">
        <h1>Gânduri & Experiențe</h1>
        <p>Ce spun oaspeții noștri</p>
    </section>

    <main class="feed-container">
        <script src="https://elfsightcdn.com/platform.js" async></script>
        <div class="elfsight-app-e204a27d-0a66-45bb-8486-27afa8a94a26" data-elfsight-app-lazy></div>
    </main>

    <footer class="footer-legal">
        <div class="footer-content">
            <div class="footer-section">
                <h4>DATE LEGALE</h4>
                <p><strong>DAKAMIGOS MARKT SRL</strong></p>
                <p>CUI: RO40767794</p>
                <p>Reg. Com: J20/386/2019</p>
            </div>
            <div class="footer-section">
                <h4>INFORMAȚII</h4>
                <a href="termeni-si-conditii.html">Termeni și Condiții</a>
                <a href="confidentialitate.html">Politica GDPR</a>
            </div>
            <div class="footer-section">
                <h4>ANPC</h4>
                <div class="anpc-links">
                    <a href="https://anpc.ro/ce-este-sal/" target="_blank">
                        <img src="images/anpc-sal.png" alt="SAL">
                    </a>
                    <a href="https://ec.europa.eu/consumers/odr/" target="_blank">
                        <img src="images/anpc-sol.png" alt="SOL">
                    </a>
                </div>
            </div>
            <div class="footer-section" style="text-align: center;">
                <h4>MENIU DIGITAL</h4>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://hategalternativ.ro/gastronomie.html" alt="QR Meniu">
                </div>
            </div>
        </div>
        <div style="text-align:center; margin-top:40px; border-top: 1px solid #111; padding-top: 20px; font-family:'Cinzel'; font-size:0.7rem; color:#444;">
            HAȚEG ALTERNATIV &copy; 2026 | TRIBUT PATRICIA
        </div>
    </footer>

</body>
</html>
