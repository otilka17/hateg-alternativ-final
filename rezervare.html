<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cere o ofertă | hațeg alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* DESIGN INTEGRAT - FĂRĂ LITERE MARI */
        :root { --verde: #1b3022; --auriu: #c5a059; --crem: #fdfcf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: none !important; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--verde); line-height: 1.6; padding-top: 40px; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        .site-header { background: white; padding: 20px 0; border-bottom: 1px solid #eee; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        .nav-wrap { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .brand { font-weight: 700; text-decoration: none; color: var(--verde); font-size: 1.2rem; }
        .main-nav a { text-decoration: none; color: #444; font-size: 0.9rem; margin-left: 20px; font-weight: 500; }

        /* Formular Box */
        .booking-box { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); margin-top: 60px; border: 1px solid #f0f0f0; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 10px; }
        p.subtitle { color: #64748b; margin-bottom: 40px; font-weight: 300; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--verde); margin-bottom: 8px; opacity: 0.8; }
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; font-family: 'Inter'; font-size: 0.95rem; background: #fafafa; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--auriu); background: white; }

        /* Experiente */
        .exp-section { background: #f9f7f2; padding: 30px; border-radius: 20px; margin: 30px 0; }
        .check-group { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.9rem; cursor: pointer; }
        .check-group input { width: auto; }

        /* Pret si Buton */
        .price-footer { background: var(--verde); color: white; padding: 35px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .price-footer h2 { font-size: 2rem; font-family: 'Inter'; }
        .btn-send { background: var(--auriu); color: white; padding: 18px 40px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.05); }

        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .price-footer { flex-direction: column; gap: 20px; text-align: center; } }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand">hațeg alternativ</a>
        <nav class="main-nav">
            <a href="pensiuni.html">pensiuni</a>
            <a href="retreat.html">retreat</a>
            <a href="gastronomic.html">gastro</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="booking-box">
        <h1>cere o ofertă</h1>
        <p class="subtitle">configurează-ți experiența gonomad & metanoia.</p>

        <form id="booking-form">
            <div class="form-grid">
                <div><label>nume complet</label><input type="text" id="from_name" required></div>
                <div><label>telefon</label><input type="tel" id="user_phone" required></div>
            </div>
            
            <div style="margin-bottom: 25px;">
                <label>email</label>
                <input type="email" id="reply_to" required>
            </div>

            <div class="form-grid">
                <div>
                    <label>locație</label>
                    <select id="location">
                        <option value="buliga">la buligă (2800 ron/noapte)</option>
                        <option value="selava">selava (550 ron/pers)</option>
                        <option value="natalia">natalia (250 ron/pers)</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>nopți</label><input type="number" id="nights" value="1" min="1"></div>
                    <div><label>persoane</label><input type="number" id="guests" value="1" min="1"></div>
                </div>
            </div>

            <div class="exp-section">
                <label style="color: var(--auriu); font-size: 0.85rem;">alege experiențele dorite:</label>
                <div class="check-group"><input type="checkbox" class="exp-item" value="150" data-label="tur gonomad"> tururi ghidate gonomad (+150 ron/pers)</div>
                <div class="check-group"><input type="checkbox" class="exp-item" value="100" data-label="atelier"> ateliere de creație (+100 ron/pers)</div>
                <div class="check-group"><input type="checkbox" class="exp-item" value="120" data-label="masa stana"> masă la stână (+120 ron/pers)</div>
                <div class="check-group"><input type="checkbox" class="exp-item" value="80" data-label="virsli"> la cuptorul cu virșli (+80 ron/pers)</div>
            </div>

            <label>mesaj / cerințe speciale</label>
            <textarea id="message" rows="3"></textarea>

            <div class="price-footer">
                <div>
                    <p style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 5px;">total estimativ</p>
                    <h2 id="total-val">0 ron</h2>
                </div>
                <button type="submit" id="submit-btn" class="btn-send">trimite cererea</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
    (function() { emailjs.init("KfAXAcZDiuFeeFZzj"); })();

    const basePrices = { buliga: 2800, selava: 550, natalia: 250 };

    function calculate() {
        const loc = document.getElementById('location').value;
        const n = parseInt(document.getElementById('nights').value) || 1;
        const g = parseInt(document.getElementById('guests').value) || 1;
        let total = (loc === 'buliga') ? (basePrices[loc] * n) : (basePrices[loc] * n * g);
        document.querySelectorAll('.exp-item:checked').forEach(item => { total += parseInt(item.value) * g; });
        document.getElementById('total-val').innerText = total.toLocaleString() + " ron";
    }

    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));

    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "se trimite...";

        let selectedExp = [];
        document.querySelectorAll('.exp-item:checked').forEach(cb => { selectedExp.push(cb.getAttribute('data-label')); });

        const params = {
            from_name: document.getElementById('from_name').value,
            user_phone: document.getElementById('user_phone').value,
            reply_to: document.getElementById('reply_to').value,
            location: document.getElementById('location').value,
            nights: document.getElementById('nights').value,
            guests: document.getElementById('guests').value,
            experience: selectedExp.join(", "),
            total_price: document.getElementById('total-val').innerText,
            message: document.getElementById('message').value
        };

        emailjs.send('service_iqnbicr', 'template_0j0ygug', params)
            .then(() => {
                alert("solicitare trimisă cu succes!");
                btn.innerText = "trimite cererea";
                document.getElementById('booking-form').reset();
                calculate();
            }, (err) => {
                alert("eroare: " + JSON.stringify(err));
            });
    });

    calculate();
</script>

</body>
</html>

</body>
</html>
