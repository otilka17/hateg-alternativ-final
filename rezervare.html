<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezervare | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand">Hațeg Alternativ</a>
        <nav class="main-nav">
            <a href="index.html">Acasă</a>
            <a href="pensiuni.html">Pensiuni</a>
            <a href="rezervare.html" class="active-link">Rezervare</a>
        </nav>
    </div>
</header>

<main class="container" style="padding: 80px 0;">
    <div class="booking-grid">
        <div class="booking-form-panel">
            <h2 class="metanoia-title" style="margin-bottom: 30px;">Cere o ofertă</h2>
            <form class="form-grid-complex">
                <div class="full"><input type="text" placeholder="Nume Complet" required></div>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Telefon" required>
                <select class="full">
                    <option>Alege locația...</option>
                    <option>Domeniile La Buligă</option>
                    <option>SELAva</option>
                    <option>Pensiunea Natalia</option>
                </select>
                <textarea class="full" rows="4" placeholder="Mesajul tău sau cerințe speciale"></textarea>
                <button type="submit" class="btn btn-forest full">Trimite Solicitarea</button>
            </form>
        </div>

        <div style="padding: 20px;">
            <h3 class="metanoia-title">De ce Hațeg Alternativ?</h3>
            <p style="margin: 20px 0; color: var(--muted);">Fiecare rezervare este procesată manual pentru a-ți oferi o experiență personalizată 1 la 1.</p>
            <ul style="list-style: none; color: var(--primary); font-weight: 600;">
                <li style="margin-bottom: 10px;">✓ Confirmare în 24h</li>
                <li style="margin-bottom: 10px;">✓ Fără avans obligatoriu</li>
                <li>✓ Suport local non-stop</li>
            </ul>
        </div>
    </div>
</main>
<script src="js/translations.js"></script>
</body>
</html>
