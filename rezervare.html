<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .booking-box { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .exp-section { background: #fafafa; padding: 25px; border-radius: 15px; border: 1px solid #eee; margin: 25px 0; }
        .price-display { background: #1b3022; color: white; padding: 30px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #1b3022; margin-bottom: 8px; display: block; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-family: 'Inter'; }
        .check-group { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; font-size: 0.9rem; }
        .check-group input { width: auto; }
    </style>
</head>
<body>

<header class="site-header"><div class="container nav-wrap"><a href="index.html" class="brand">HAȚEG ALTERNATIV</a></div></header>

<div class="container">
    <div class="booking-box">
        <h1 class="metanoia-title" style="font-size: 2.2rem;">Cere o ofertă</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Configurează-ți experiența GoNomad.</p>

        <form id="booking-form">
            <div class="form-grid">
                <div><label>Nume</label><input type="text" name="from_name" required></div>
                <div><label>Telefon</label><input type="tel" name="user_phone" required></div>
            </div>

            <div class="form-grid">
                <div>
                    <label>Locație</label>
                    <select id="location" name="location">
                        <option value="buliga">La Buligă (2800 RON/noapte)</option>
                        <option value="selava">SelAva (550 RON/pers)</option>
                        <option value="natalia">Natalia (250 RON/pers)</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Nopți</label><input type="number" id="nights" name="nights" value="1" min="1"></div>
                    <div><label>Persoane</label><input type="number" id="guests" name="guests" value="1" min="1"></div>
                </div>
            </div>

            <div class="exp-section">
                <label style="color: #c5a059;">Experiențe GoNomad & Gastro:</label>
                <div class="check-group"><input type="checkbox" class="exp-item" value="150"> Tururi ghidate GoNomad (+150 RON)</div>
                <div class="check-group"><input type="checkbox" class="exp-item" value="100"> Ateliere de creație (+100 RON)</div>
                <div class="check-group"><input type="checkbox" class="exp-item" value="120"> Masă la stână (+120 RON)</div>
                <div class="check-group"><input type="checkbox" class="exp-item" value="80"> Cuptorul cu Virșli (+80 RON)</div>
                <div class="check-group"><input type="checkbox" class="exp-item" value="150"> Bucătărie autentică (+150 RON)</div>
            </div>

            <div class="price-display">
                <div><span style="font-size: 0.6rem; text-transform: uppercase; opacity: 0.7;">Total Estimativ</span><h2 id="total-val">0 RON</h2></div>
                <button type="submit" class="btn-gold" id="submit-btn" style="padding: 15px 30px;">TRIMITE CEREREA</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
    (function() { emailjs.init("KfAXAcZDiuFeeFZzj"); })();

    const basePrices = { buliga: 2800, selava: 550, natalia: 250 };

    function calc() {
        const loc = document.getElementById('location').value;
        const n = parseInt(document.getElementById('nights').value) || 1;
        const g = parseInt(document.getElementById('guests').value) || 1;
        
        let total = (loc === 'buliga') ? (basePrices[loc] * n) : (basePrices[loc] * n * g);
        document.querySelectorAll('.exp-item:checked').forEach(i => { total += parseInt(i.value) * g; });

        document.getElementById('total-val').innerText = total.toLocaleString() + " RON";
    }

    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calc));
    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault();
        emailjs.sendForm('service_iqnbicr', 'template_0j0ygug', this).then(() => alert("Solicitare trimisă!"));
    });
    calc();
</script>
</body>
</html>
    calculate(); // Initial call
</script>
</body>
</html>
