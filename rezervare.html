<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare Inteligentă | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #fdfcf8; padding-top: 80px; }
        .booking-container { max-width: 850px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .exp-box { background: #fafafa; padding: 25px; border-radius: 15px; border: 1px solid #eee; margin: 25px 0; }
        .price-widget { background: #1b3022; color: white; padding: 30px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #1b3022; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 10px; font-family: 'Inter', sans-serif; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; cursor: pointer; margin-bottom: 10px; }
        .check-item input { width: auto; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .price-widget { flex-direction: column; text-align: center; gap: 15px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="booking-container">
        <h1 class="metanoia-title" style="font-size: 2.5rem; margin-bottom: 10px;">Configurator Sejur</h1>
        <p style="color: #64748b; margin-bottom: 40px;">Selectează opțiunile pentru o estimare instantanee.</p>

        <form id="booking-form">
            <div class="form-group" style="margin-bottom:20px;">
                <label>Nume Complet</label>
                <input type="text" name="from_name" required placeholder="Popescu Ion">
            </div>

            <div class="form-grid">
                <div><label>Email</label><input type="email" name="reply_to" required></div>
                <div><label>Telefon</label><input type="tel" name="user_phone" required></div>
            </div>

            <div class="form-grid">
                <div>
                    <label>Locație</label>
                    <select id="location" name="location">
                        <option value="buliga_integral">Domeniile La Buligă (2800 RON/noapte)</option>
                        <option value="selava_estate">SelAva Estate (550 RON/pers)</option>
                        <option value="pensiunea_natalia">Pensiunea Natalia (250 RON/pers)</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Nopți</label><input type="number" id="nights" name="nights" value="1" min="1"></div>
                    <div><label>Persoane</label><input type="number" id="guests" name="guests" value="1" min="1"></div>
                </div>
            </div>

            <div class="exp-box">
                <label style="color: #c5a059; margin-bottom: 15px;">Experiențe Marca GoNomad & Metanoia:</label>
                <div class="check-item"><input type="checkbox" class="exp-cb" value="150" data-name="Tur GoNomad"> Tururi ghidate GoNomad (+150 RON)</div>
                <div class="check-item"><input type="checkbox" class="exp-cb" value="100" data-name="Atelier"> Atelier de creație (+100 RON)</div>
                <div class="check-item"><input type="checkbox" class="exp-cb" value="120" data-name="Stana"> Masă la stână (+120 RON)</div>
                <div class="check-item"><input type="checkbox" class="exp-cb" value="80" data-name="Virsli"> La cuptorul cu Virșli (+80 RON)</div>
            </div>

            <textarea name="message" rows="3" placeholder="Alte mențiuni..."></textarea>

            <div class="price-widget">
                <div>
                    <span style="opacity: 0.7; font-size: 0.7rem; text-transform: uppercase;">Investiție Estimată</span>
                    <h2 id="display-total">0 RON</h2>
                </div>
                <button type="submit" id="submit-btn" style="background: #c5a059; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer;">TRIMITE CEREREA</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
    (function() { emailjs.init("KfAXAcZDiuFeeFZzj"); })();

    const prices = { buliga_integral: 2800, selava_estate: 550, pensiunea_natalia: 250 };

    function calculate() {
        const loc = document.getElementById('location').value;
        const n = parseInt(document.getElementById('nights').value) || 1;
        const g = parseInt(document.getElementById('guests').value) || 1;
        
        let base = prices[loc];
        let total = (loc === 'buliga_integral') ? (base * n) : (base * n * g);

        document.querySelectorAll('.exp-cb:checked').forEach(cb => {
            total += parseInt(cb.value) * g; // Experiențele sunt per om
        });

        document.getElementById('display-total').innerText = total.toLocaleString() + " RON";
    }

    // Listeners
    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));

    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "SE TRIMITE...";
        
        emailjs.sendForm('service_iqnbicr', 'template_0j0ygug', this)
            .then(() => {
                alert("Solicitare trimisă! Te contactăm în 24h.");
                btn.innerText = "TRIMITE CEREREA";
            });
    });

    calculate(); // Initial call
</script>
</body>
</html>
