  <style>

<body>
  <div class="wrap">
    <header class="header">
      <a class="brand" href="index.html">METANOIA</a>
      <nav class="nav"><a href="meniuri.html">Meniuri</a></nav>
    </header>

    <section class="section">
      <h2 class="brand">Rezervare</h2>
      <div class="card">
        <p class="small">Plan selectat: <b id="plan">—</b></p>
        <p class="small">Total estimat: <b id="total">—</b> RON</p>
        <div class="divider"></div>
        
        <form id="reservationForm" onsubmit="return trimite(event)">
          <input class="input" id="nume" placeholder="Nume" required>
          <div style="height:10px"></div>
          <input class="input" id="tel" placeholder="Telefon" required>
          <div style="height:10px"></div>
          <input class="input" id="email" type="email" placeholder="Email (opțional)">
          <div style="height:10px"></div>
          <textarea class="input" id="obs" placeholder="Observații / Preferințe de servire" rows="4"></textarea>
          <div style="height:14px"></div>
          
          <button type="submit" id="submitBtn" class="btn cta">Trimite rezervarea</button>
        </form>
        
        <div id="msg"></div>
      </div>
    </section>

    <footer>© Metanoia.</footer>
  </div>

  <script>
    // Configurare webhook primit de la tine
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/wwdii8stmyqdul6rnok4p44k2tvtohjt";

    // Citește parametrii din URL
    const sp = new URLSearchParams(location.search);
    const planSelectat = sp.get('plan') || '—';
    const totalEstimat = sp.get('total') || '—';

    document.getElementById('plan').textContent = planSelectat;
    document.getElementById('total').textContent = totalEstimat;

    async function trimite(event) {
      event.preventDefault(); // Prevenim reload-ul paginii
      
      const submitBtn = document.getElementById('submitBtn');
      const msgBox = document.getElementById('msg');
      
      const nume = document.getElementById('nume').value.trim();
      const tel = document.getElementById('tel').value.trim();
      const email = document.getElementById('email').value.trim();
      const obs = document.getElementById('obs').value.trim();

      // Schimbăm starea butonului
      submitBtn.disabled = true;
      submitBtn.textContent = 'Se trimite...';
      msgBox.className = '';
      msgBox.style.display = 'none';

      // Generare dată curentă în formatul local românesc (Europe/Bucharest) pentru Col A
      const acum = new Date();
      const dataCurentaStr = acum.toLocaleString('ro-RO', { timeZone: 'Europe/Bucharest' });

      // Organizăm datele conform structurii cerute de Google Sheet-ul tău din imagine
      const payload = {
        data: dataCurentaStr,                       // Coloana A: Data
        autor: nume,                                // Coloana B: Autor
        sandwich: planSelectat !== '—' ? planSelectat : '-', // Coloana C: sandwich (luat din planul curent)
        bautura: sp.get('bautura') || '-',         // Coloana D: băutură (dacă există în URL)
        specialitate_cafea: sp.get('cafea') || '-', // Coloana E: specialităţi/cafea (dacă există în URL)
        desert: sp.get('desert') || '-',            // Coloana F: desert (dacă există în URL)
        mesaj: obs || '-',                          // Coloana G: mesaj / Observații
        data_ora_servire: sp.get('servire') || 'Cât mai curând', // Coloana H: data/ora servire
        tel: tel,                                   // Coloana I: Nr tel
        email: email || '-',                        // Info suplimentar
        total: totalEstimat                         // Info suplimentar
      };

      try {
        const response = await fetch(MAKE_WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          msgBox.className = 'success';
          msgBox.textContent = '✓ Rezervarea ta a fost trimisă cu succes! Te contactăm în curând pentru confirmare.';
          submitBtn.textContent = 'Trimis cu succes!';
          
          // Resetăm formularul după succes
          document.getElementById('reservationForm').reset();
        } else {
          throw new Error('Eroare răspuns server.');
        }
      } catch (error) {
        msgBox.className = 'error';
        msgBox.textContent = 'A apărut o eroare la trimitere. Te rugăm să reîncerci sau să ne contactezi telefonic.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Trimite rezervarea';
      }

      return false;
    }
  </script>
</body>
</html>
