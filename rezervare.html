<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* DESIGN SIGNATURE - REGLAT PENTRU REZERVARE */
        :root { --verde: #1b3022; --auriu: #c5a059; --crem: #fdfcf8; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--verde); line-height: 1.6; padding-top: 80px; }
        
        h1, h2, h3, .metanoia-title, .brand { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: none; }
        .italic-style { font-style: italic; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header Fix & Blur */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 1500; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.03); }
        .nav-wrap { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .brand { text-decoration: none; color: var(--verde); font-size: 1.3rem; }
        .main-nav a { text-decoration: none; color: var(--verde); font-size: 1rem; font-family: 'Playfair Display', serif; font-style: italic; margin-left: 25px; }

        /* Hero Rezervare */
        .booking-hero {
            min-height: 40vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.2)),
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/images/feed-4.jpg') center/cover no-repeat;
        }
        .booking-hero h1 { font-size: clamp(3rem, 8vw, 5rem); font-style: italic; }

        /* Formularul Metanoia */
        .booking-section { transform: translateY(-60px); }
        .booking-box { background: var(--alb); padding: 80px 60px; border-radius: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.05); max-width: 900px; margin: 0 auto; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        label { display: block; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; margin-bottom: 10px; color: var(--verde); }
        input, select, textarea { width: 100%; padding: 15px 20px; border: 1px solid #eee; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 1rem; background: #fafafa; transition: 0.3s; }
        input:focus { border-color: var(--auriu); outline: none; background: #fff; }

        /* Experiențe Checkboxes */
        .exp-section { margin: 50px 0; padding-top: 40px; border-top: 1px solid #f0f0f0; }
        .check-group { display: block; position: relative; padding: 12px 0; cursor: pointer; font-size: 1rem; font-weight: 400; color: #555; }
        .check-group input { width: auto; margin-right: 15px; accent-color: var(--auriu); }

        /* Preț & Buton */
        .price-display { display: flex; justify-content: space-between; align-items: center; margin-top: 50px; padding-top: 40px; border-top: 2px solid var(--crem); }
        #total-val { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--auriu); font-style: italic; }
        
        .btn-gold { background: var(--auriu); color: white; padding: 18px 45px; border-radius: 60px; text-decoration: none; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; border: none; cursor: pointer; transition: 0.4s; }
        .btn-gold:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(197,160,89,0.25); }

        .wa-btn { position: fixed; bottom: 30px; left: 30px; background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-family: 'Playfair Display', serif; font-style: italic; }

        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .booking-box { padding: 40px 20px; } .price-display { flex-direction: column; gap: 30px; } }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand italic-style">Hațeg Alternativ</a>
        <nav class="main-nav">
            <a href="pensiuni.html">Pensiuni</a>
            <a href="experiente.html">Experiențe</a>
            <a href="rezervare.html" style="color: var(--auriu);">Rezervă</a>
        </nav>
        <div style="font-family: 'Playfair Display', serif; font-style: italic; color: var(--auriu);">Est. 2026</div>
    </div>
</header>

<section class="booking-hero">
    <div class="container">
        <h1 class="italic-style">Creează-ți sejurul.</h1>
        <p style="font-family: 'Playfair Display', serif; font-style: italic;">O experiență croită pe sufletul tău.</p>
    </div>
</section>

<section class="booking-section container">
    <div class="booking-box">
        <h2 class="metanoia-title italic-style" style="text-align: center; font-size: 2.5rem; margin-bottom: 50px;">Detalii Rezervare</h2>
        
        <form id="booking-form">
            <div class="form-grid">
                <div><label>Nume complet</label><input type="text" id="nume" required></div>
                <div><label>Telefon</label><input type="tel" id="telefon" required></div>
            </div>

            <div class="form-grid">
                <div><label>Email</label><input type="email" id="email" required></div>
                <div>
                    <label>Locație</label>
                    <select id="locatie" required>
                        <option value="Domeniile La Buligă">Domeniile La Buligă (2800 lei/noapte)</option>
                        <option value="SELAva">SELAva (550 lei/persoană)</option>
                        <option value="Pensiunea Natalia">Pensiunea Natalia (250 lei/persoană)</option>
                    </select>
                </div>
            </div>

            <div class="form-grid">
                <div><label>Check-in</label><input type="date" id="checkin" required></div>
                <div><label>Check-out</label><input type="date" id="checkout" required></div>
            </div>

            <div class="form-grid">
                <div><label>Oaspeți</label><input type="number" id="persoane" value="1" min="1" required></div>
                <div><label>Nopți</label><input type="text" id="nightsDisplay" value="1" readonly style="opacity: 0.6; cursor: not-allowed;"></div>
            </div>

            <div style="margin-top: 30px;">
                <label>Mesaj pentru gazdă</label>
                <textarea id="mesaj" rows="4" placeholder="Cerințe speciale sau gânduri..."></textarea>
            </div>

            <div class="exp-section">
                <h3 class="metanoia-title italic-style">Adaugă Experiențe</h3>
                <label class="check-group"><input type="checkbox" class="exp-item" data-name="Cină" value="120"> Cină Tradițională (+120 lei/pers)</label>
                <label class="check-group"><input type="checkbox" class="exp-item" data-name="Tur" value="150"> Tur Ghidat (+150 lei/pers)</label>
                <label class="check-group"><input type="checkbox" class="exp-item" data-name="Stână" value="120"> Masă la Stână (+120 lei/pers)</label>
            </div>

            <div class="price-display">
                <div>
                    <span style="font-family: 'Playfair Display', serif; font-style: italic; opacity: 0.6;">Total estimat</span>
                    <h2 id="total-val">0 lei</h2>
                </div>
                <button type="submit" class="btn-gold" id="submit-btn">Trimite solicitarea</button>
            </div>
            <div id="form-msg" style="text-align: center; margin-top: 20px;"></div>
        </form>
    </div>
</section>

<a href="https://wa.me/40749229686" class="wa-btn">WhatsApp Direct</a>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsI6M2Pvyn5giR8H6nWBs1RfnmBjq2rr3jSN_vEwYKfjXbcFWaJy-6TQpgSfdrmqss/exec";
    const basePrices = { "Domeniile La Buligă": 2800, "SELAva": 550, "Pensiunea Natalia": 250 };

    function calculateTotal() {
        const checkin = new Date(document.getElementById('checkin').value);
        const checkout = new Date(document.getElementById('checkout').value);
        const nights = Math.ceil((checkout - checkin) / (1000 * 60 * 60 * 24)) || 1;
        document.getElementById('nightsDisplay').value = nights > 0 ? nights : 1;

        const locatie = document.getElementById('locatie').value;
        const persoane = parseInt(document.getElementById('persoane').value) || 1;
        
        let total = 0;
        if (locatie === "Domeniile La Buligă") total = basePrices[locatie] * (nights > 0 ? nights : 1);
        else total = basePrices[locatie] * (nights > 0 ? nights : 1) * persoane;

        document.querySelectorAll('.exp-item:checked').forEach(item => {
            total += parseInt(item.value) * persoane;
        });

        document.getElementById('total-val').innerText = total.toLocaleString('ro-RO') + " lei";
        return total;
    }

    document.querySelectorAll('#locatie, #persoane, #checkin, #checkout, .exp-item').forEach(el => {
        el.addEventListener('change', calculateTotal);
    });

    document.getElementById('booking-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('form-msg');
        btn.innerText = "Se trimite..."; btn.disabled = true;

        const payload = {
            nume: document.getElementById('nume').value,
            telefon: document.getElementById('telefon').value,
            email: document.getElementById('email').value,
            locatie: document.getElementById('locatie').value,
            checkin: document.getElementById('checkin').value,
            checkout: document.getElementById('checkout').value,
            persoane: document.getElementById('persoane').value,
            total: `[TOTAL: ${calculateTotal()} lei]`
        };

        try {
            const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            msg.innerHTML = "✨ Solicitarea a fost trimisă. Revenim curând!";
            msg.style.color = "var(--auriu)";
            this.reset();
        } catch (error) {
            msg.innerHTML = "A apărut o eroare. Reîncearcă sau contactează-ne pe WhatsApp.";
            msg.style.color = "#ff6b6b";
        } finally {
            btn.innerText = "Trimite solicitarea"; btn.disabled = false;
        }
    });
</script>

</body>
</html>
