<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grilă Avansată Evaluare - SUN 2026</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Panou Central Scor Digital Fixed/Sticky -->
        <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700 flex flex-col md:flex-row justify-between items-center gap-6 shadow-xl sticky top-4 z-50 backdrop-blur-md bg-opacity-95">
            <div>
                <h1 class="text-xl font-black tracking-tight text-white">SIMULATOR OFICIAL GRILĂ PUNCTAJ</h1>
                <p class="text-xs text-slate-400 mt-1">Sistem de calcul conform procedurii metodologice actualizate</p>
            </div>
            
            <div class="flex items-center gap-4 w-full md:w-auto justify-end">
                <div id="status-badge" class="px-4 py-2 rounded-xl text-xs font-black bg-red-500/20 text-red-400 border border-red-500/30">RESPINS (&lt;60 pct)</div>
                <div class="bg-slate-950 px-6 py-3 rounded-2xl border border-slate-700 text-center min-w-[120px]">
                    <span class="block text-[10px] uppercase font-bold text-slate-500">Punctaj Real</span>
                    <span id="total-score" class="text-4xl font-black text-blue-400">0</span><span class="text-sm font-bold text-slate-400">/100</span>
                </div>
            </div>
        </div>

        <!-- Formular Criterii Evaluare Obligatorii -->
        <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-xl space-y-6">
            
            <!-- Criteriul 1 -->
            <div class="space-y-2">
                <label class="block text-xs font-black uppercase text-slate-400 tracking-wider">Criteriul I: Domeniu de activitate vizat (Ponderea investiției majoritare)</label>
                <select id="c1" onchange="runEvaluation()" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 outline-none focus:border-blue-500 transition-all">
                    <option value="0">Selectează codul CAEN aplicabil...</option>
                    <option value="40">Producție / Activități industriale prelucrătoare (40 Puncte)</option>
                    <option value="35">Industrii creative, IT, Soluții tehnologice avansate, Sănătate (35 Puncte)</option>
                    <option value="30">Servicii populație, Horeca, Construcții structuri (30 Puncte)</option>
                    <option value="20">Comerț, Distribuție și activități logistice conexe (20 Puncte)</option>
                </select>
            </div>

            <!-- Criteriul 2 -->
            <div class="space-y-2">
                <label class="block text-xs font-black uppercase text-slate-400 tracking-wider">Criteriul II: Crearea de noi locuri de muncă durabile</label>
                <select id="c2" onchange="runEvaluation()" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 outline-none focus:border-blue-500 transition-all">
                    <option value="0">Selectează numărul de norme întregi asumate...</option>
                    <option value="25">Crearea a minimum 2 locuri de muncă cu normă de 8h/zi (25 Puncte)</option>
                    <option value="15">Crearea unui singur loc de muncă cu normă de 8h/zi (15 Puncte)</option>
                </select>
            </div>

            <!-- Criteriul 3 -->
            <div class="space-y-2">
                <label class="block text-xs font-black uppercase text-slate-400 tracking-wider">Criteriul III: Investiții în tehnologii verzi (Sustenabilitate / Eco-eficient)</label>
                <select id="c3" onchange="runEvaluation()" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 outline-none focus:border-blue-500 transition-all">
                    <option value="0">Alege ponderea din echipamente tehnologice...</option>
                    <option value="20">Echipamente verzi / Panouri / Digitalizare &gt; 25% din valoarea grantului (20 Puncte)</option>
                    <option value="10">Echipamente verzi / Eficiență energetică între 10% și 25% din grant (10 Puncte)</option>
                    <option value="0">Fără investiție verde sau sub pragul de 10% (0 Puncte)</option>
                </select>
            </div>

            <!-- Criteriul 4 -->
            <div class="space-y-2">
                <label class="block text-xs font-black uppercase text-slate-400 tracking-wider">Criteriul IV: Cofinanțare monetară proprie asumată</label>
                <select id="c4" onchange="runEvaluation()" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 outline-none focus:border-blue-500 transition-all">
                    <option value="0">Alege nivelul aportului propriu în bani...</option>
                    <option value="10">Peste 10% cofinanțare din valoarea eligibilă a proiectului (10 Puncte)</option>
                    <option value="5">Între 5.01% și 10% cofinanțare asumată (5 Puncte)</option>
                    <option value="0">Pragul minim obligatoriu legal de 5% fix (0 Puncte)</option>
                </select>
            </div>

            <!-- Criteriul 5 -->
            <div class="space-y-2">
                <label class="block text-xs font-black uppercase text-slate-400 tracking-wider">Criteriul V: Profil Fondator (Grup Țintă Prioritar / Piloni)</label>
                <select id="c5" onchange="runEvaluation()" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 outline-none focus:border-blue-500 transition-all">
                    <option value="0">Alege profilul acționarului majoritar...</option>
                    <option value="5">Tânăr sub 30 ani / Mediu rural / Diaspora atestată oficial (5 Puncte)</option>
                    <option value="0">Profil standard antreprenorial (Fără punctaj suplimentar) (0 Puncte)</option>
                </select>
            </div>

        </div>
    </div>

    <!-- Script de evaluare dinamică bazat pe ponderi legislative -->
    <script>
        function runEvaluation() {
            const v1 = parseInt(document.getElementById('c1').value) || 0;
            const v2 = parseInt(document.getElementById('c2').value) || 0;
            const v3 = parseInt(document.getElementById('c3').value) || 0;
            const v4 = parseInt(document.getElementById('c4').value) || 0;
            const v5 = parseInt(document.getElementById('c5').value) || 0;

            const total = v1 + v2 + v3 + v4 + v5;
            document.getElementById('total-score').innerText = total;

            const badge = document.getElementById('status-badge');
            if(total >= 85) {
                badge.className = "px-4 py-2 rounded-xl text-xs font-black bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
                badge.innerText = "ȘANSE MARI DE FINANȚARE";
            } else if (total >= 60 && total < 85) {
                badge.className = "px-4 py-2 rounded-xl text-xs font-black bg-amber-500/20 text-amber-400 border border-amber-500/30";
                badge.innerText = "ZONĂ MEDIE (RISC DEPARTAJARE)";
            } else {
                badge.className = "px-4 py-2 rounded-xl text-xs font-black bg-red-500/20 text-red-400 border border-red-500/30";
                badge.innerText = "RESPINS / ȘANSE MINIME";
            }
        }
    </script>
</body>
</html>
