<html lang="ro">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; line-height: 1.6; }
        a { text-decoration: none !important; color: inherit !important; transition: 0.3s; }

        /* HEADER & MENU */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 9999; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(197,160,89,0.1); }
        .brand-logo svg { height: 60px; width: auto; }
        .burger { cursor: pointer; padding: 10px; }
        .burger div { width: 30px; height: 1px; background: var(--auriu); margin: 8px; }
        
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-transform: uppercase; letter-spacing: 5px; }

        /* HERO */
        .hero-small { height: 60vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('images/narcise.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; margin-top: 0; }
        .hero-small h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 8vw, 5rem); color: var(--auriu); font-style: italic; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* EVENTS FLOW (FARA CADRANE) */
        .container { max-width: 1000px; margin: 0 auto; padding: 100px 20px; }
        
        .event-entry { margin-bottom: 120px; text-align: center; position: relative; }
        .event-entry::after { content: ''; display: block; width: 40px; height: 1px; background: var(--auriu); margin: 80px auto; opacity: 0.3; }
        .event-entry:last-child::after { display: none; }

        .event-img-wrap { width: 100%; max-height: 500px; overflow: hidden; margin-bottom: 40px; border: 1px solid #111; padding: 10px; }
        .event-img-wrap img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 1s; }
        .event-entry:hover img { opacity: 0.9; }
        
        .label-date { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 6px; font-size: 0.9rem; margin-bottom: 20px; display: block; }
        .event-entry h2 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 5vw, 3.5rem); font-style: italic; color: #fff; margin-bottom: 30px; line-height: 1.1; }
        .event-entry p { font-size: 1.1rem; color: #999; line-height: 1.8; margin-bottom: 40px; }

        .btn-gold { display: inline-block; padding: 18px 45px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 3px; transition: 0.4s; background: transparent; text-transform: uppercase; cursor: pointer; }
        .btn-gold:hover { background: var(--auriu); color: #000 !important; box-shadow: 0 0 30px rgba(197, 160, 89, 0.2); }
