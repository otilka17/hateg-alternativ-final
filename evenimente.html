<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; background: #f9f9f9; }
        .ev-container { display: flex; width: 90%; max-width: 1400px; background: #fff; height: 80vh; box-shadow: 0 50px 100px rgba(0,0,0,0.05); }
        .ev-img { flex: 1.2; background: url('images/feed-1.jpg') center/cover; }
        .ev-text { flex: 0.8; padding: 80px; display: flex; flex-direction: column; justify-content: center; }
        .ev-text h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-style: italic; margin-bottom: 20px; font-weight: 400; }
        .ev-text p { font-weight: 300; color: #666; margin-bottom: 40px; }
        .btn { text-decoration: none; color: #000; border: 1px solid #000; padding: 15px 40px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; width: fit-content; }
        .btn:hover { background: #000; color: #fff; }
        @media (max-width: 900px) { .ev-container { flex-direction: column; height: auto; } .ev-img { height: 300px; } .ev-text { padding: 40px; } }
    </style>
</head>
<body>
    <div class="ev-container">
        <div class="ev-img"></div>
        <div class="ev-text">
            <span>01 / EVENTS</span>
            <h1>Retreats & Design.</h1>
            <p>Spații curatoriate pentru ateliere de creație, reuniuni discrete și momente care necesită o estetică deosebită.</p>
            <a href="rezervari.html" class="btn">Inquire Now</a>
        </div>
    </div>
</body>
</html>
