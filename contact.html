<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; padding-top: 120px; }

        /* HEADER UNIFICAT */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 10000; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(197,160,89,0.2); }
        .brand { font-family: 'Cinzel'; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; font-size: 0.9rem; color: #fff; text-decoration: none; }
        .burger { cursor: pointer; z-index: 10001; }
        .burger div { width: 25px; height: 2px; background: var(--auriu); margin: 5px; transition: 0.3s; }
        
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; z-index: 9999; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.5rem; font-family: 'Cinzel'; margin: 12px 0; color: var(--alb) !important; text-decoration: none; letter-spacing: 2px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .info-box h2 { font-family: 'Playfair Display'; font-style: italic; font-size: 3rem; color: var(--auriu); margin-bottom: 30px; }
        .contact-item { margin-bottom: 30px; }
        .contact-item h4 { font-family: 'Cinzel'; font-size: 0.7rem; color: var(--auriu); letter-spacing: 2px; margin-bottom: 5px; }
        
        .contact-form { background: #0a0a0a; padding: 40px; border: 1px solid #1a1a1a; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #222; color: #fff; font-family: 'Inter'; }
        .btn-gold { background: transparent; border: 1px solid var(--auriu); color: var(--auriu); padding: 18px; width: 100%; font-family: 'Cinzel'; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { background: var(--auriu); color: #000; }

        @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; gap: 40px; } }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand">HAȚEG ALTERNATIV</a>
        <div class="burger" id="burger"><div></div><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">ACASĂ</a>
            <a href="metanoia.html">METANOIA</a>
            <a href="gastronomie.html">GASTRONOMIE</a>
            <a href="evenimente.html">EVENIMENTE</a>
            <a href="contact.html">CONTACT</a>
            <a href="rezervari.html">REZERVARE</a>
        </nav>
    </header>

    <main class="container">
        <div class="contact-grid">
            <div class="info-box">
                <h2>Suntem aici.</h2>
                <p style="color: #888; margin-bottom: 40px;">Rânduiala noastră te așteaptă în Totești, Țara Hațegului.</p>
                <div class="contact-item"><h4>Telefon / WhatsApp</h4><p>+40 749 229 686</p></div>
                <div class="contact-item"><h4>Email</h4><p>hello@hateg-alternativ.ro</p></div>
            </div>
            <div class="contact-form">
                <form action="https://formspree.io/f/xjgpvbkj" method="POST">
                    <input type="text" name="Nume" placeholder="Nume" required>
                    <input type="email" name="Email" placeholder="Email" required>
                    <textarea name="Mesaj" placeholder="Mesaj" rows="5" required></textarea>
                    <button type="submit" class="btn-gold">TRIMITE</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        burger.onclick = () => nav.classList.toggle('active');
    </script>
</body>
</html>
