<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hațeg Alternativ - Domeniile la Buligă</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; }
        
        .site-header { position: fixed; top: 0; width: 100%; z-index: 9999; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.95); border-bottom: 1px solid rgba(197,160,89,0.1); }
        .brand { font-family: 'Cinzel'; color: var(--auriu); text-decoration: none; font-weight: 900; letter-spacing: 3px; font-size: 0.9rem; }
        .burger div { width: 25px; height: 1px; background: var(--auriu); margin: 6px; }

        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.5rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-transform: uppercase; letter-spacing: 4px; text-decoration: none; }

        .contact-wrap { max-width: 1000px; margin: 120px auto 80px; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        
        .contact-info h2 { font-family: 'Playfair Display'; font-size: 2.5rem; color: var(--auriu); font-style: italic; margin-bottom: 30px; }
        .info-item { margin-bottom: 25px; }
        .info-item h4 { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--auriu); letter-spacing: 2px; margin-bottom: 5px; }
        .info-item p { color: #ccc; font-weight: 300; }

        .contact-form-box { background: #0d0d0d; padding: 40px; border: 1px solid #1a1a1a; }
        .contact-form-box h3 { font-family: 'Cinzel'; color: var(--auriu); margin-bottom: 25px; letter-spacing: 2px; }
        
        .c-input { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 20px; outline: none; }
        .c-input:focus { border-color: var(--auriu); }
        .btn-gold { width: 100%; padding: 15px; border: 1px solid var(--auriu); background: transparent; color: var(--auriu); font-family: 'Cinzel'; cursor: pointer; transition: 0.4s; }
        .btn-gold:hover { background: var(--auriu); color: #000; }

        @media (max-width: 800px) { .contact-wrap { grid-template-columns: 1fr; margin-top: 100px; } }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand">HAȚEG ALTERNATIV</a>
        <div class="burger" id="burger" style="cursor:pointer;"><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">Acasă</a>
            <a href="pensiune.html">Pensiunea</a>
            <a href="gastronomie.html">Gastronomie</a>
            <a href="rezervare.html">Rezervare</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="contact-wrap">
        <div class="contact-info">
            <h2>Să rânduim o întâlnire.</h2>
            <div class="info-item">
                <h4>LOCAȚIE</h4>
                <p>Vadu Dobrii, Munții Poiana Ruscă, Hunedoara</p>
            </div>
            <div class="info-item">
                <h4>TELEFON / WHATSAPP</h4>
                <p>+40 749 229 686</p>
            </div>
            <div class="info-item">
                <h4>EMAIL</h4>
                <p>contact@hategalternativ.ro</p>
            </div>
        </div>

        <div class="contact-form-box">
            <h3>TRIMITE UN MESAJ</h3>
            <form action="https://formspree.io/f/xjgpvbkj" method="POST">
                <input type="text" name="name" class="c-input" placeholder="Numele tău" required>
                <input type="email" name="email" class="c-input" placeholder="Email" required>
                <textarea name="message" class="c-input" rows="5" placeholder="Mesajul tău" required></textarea>
                <button type="submit" class="btn-gold">TRIMITE ACUM</button>
            </form>
        </div>
    </div>

    <script>
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        if(burger) { burger.onclick = () => nav.classList.toggle('active'); }
    </script>
</body>
</html>
