<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --negru-mat: #242424; --auriu: #c5a059; --crem: #fdfcf8; --alb: #ffffff; --text-soft: #555555; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--negru-mat); padding-top: 140px; }

        /* HEADER UNIFICAT */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #eee; }
        .top-announcement { background: var(--auriu); color: #fff; text-align: center; padding: 8px 0; font-size: 0.6rem; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; }
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 90px; }
        .logo-wrapper { display: flex; align-items: center; text-decoration: none; color: var(--negru-mat); }
        .logo-wrapper img { height: 40px; margin-right: 10px; }
        .brand-text h1 { font-family: 'Playfair Display', serif; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin: 0; }
        .main-nav { display: flex; align-items: center; gap: 18px; }
        .main-nav a { text-decoration: none; color: var(--negru-mat); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .main-nav a:hover { color: var(--auriu); }
        .cta-nav { border: 1px solid var(--negru-mat); padding: 8px 15px !important; }
        .cta-nav:hover { background: var(--negru-mat); color: #fff !important; }

        /* CONTACT STYLE */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin: 60px 0; }
        .info-box h2 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.5rem; margin-bottom: 30px; }
        .contact-item { margin-bottom: 25px; }
        .contact-item h4 { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--auriu); }
        .contact-form { background: #fff; padding: 40px; border: 1px solid #eee; }
        .btn-gold { background: var(--auriu); color: white; padding: 18px; width: 100%; border: none; font-family: 'Playfair Display'; font-style: italic; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { opacity: 0.9; }

        @media (max-width: 992px) {
            .contact-grid { grid-template-columns: 1fr; gap: 40px; }
            body { padding-top: 190px; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="top-announcement">1 MAI 2026: LANSAREA MANIFEST METANOIA | TRIBUT PATRICIA</div>
    <div class="nav-container">
        <a href="index.html" class="logo-wrapper">
            <img src="images/logo-liniar-transparent.png" alt="Logo">
            <div class="brand-text"><h1>Hațeg Alternativ</h1></div>
        </a>
        <nav class="main-nav">
            <a href="index.html">Acasă</a>
            <a href="retreat.html">Metanoia</a>
            <a href="gastronomie.html">Gastronomie</a>
            <a href="experiente.html">Experiențe</a>
            <a href="obiective.html">Obiective</a>
            <a href="evenimente.html">Evenimente</a>
            <a href="forum.html">Comunitate</a>
            <a href="rezervari.html" class="cta-nav">Rezervări</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="contact-grid">
        <div class="info-box">
            <h2>Suntem aici.</h2>
            <p style="margin-bottom: 30px;">Găsește-ne în inima naturii, la Totești.</p>
            <div class="contact-item">
                <h4>Telefon / WhatsApp</h4>
                <p>+40 749 229 686</p>
            </div>
            <div class="contact-item">
                <h4>Email</h4>
                <p>hello@hateg-alternativ.ro</p>
            </div>
        </div>

        <div class="contact-form">
            <form>
                <input type="text" placeholder="Nume" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee;">
                <input type="email" placeholder="Email" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee;">
                <textarea placeholder="Mesaj" rows="5" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee;"></textarea>
                <button type="submit" class="btn-gold">Trimite</button>
            </form>
        </div>
    </div>
</main>

<script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
        var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
        s1.async=true; s1.src='https://embed.tawk.to/642944b54247f20fefea97df/1gsvek60a'; 
        s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
        s0.parentNode.insertBefore(s1,s0);
    })();
</script>
</body>
</html>
