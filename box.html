<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>METANOIA | Box Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .card-zi { border: 1px solid #1a1a1a; background: #000; transition: 0.3s; }
        .btn-meniu { cursor: pointer; border: 1px solid #c5a059; padding: 10px 20px; color: #c5a059; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .btn-meniu:hover { background: #c5a059; color: #000; }
    </style>
</head>
<body class="p-8 pb-32">

    <main class="max-w-4xl mx-auto">
        <h1 class="font-cinzel text-3xl text-[#c5a059] mb-12 text-center">CONFIGURARE BOX</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="meniu-grid">
            <div class="card-zi p-6" data-nume="Meniu Luni" data-pret="20.5">
                <h2 class="font-cinzel text-lg mb-2">LUNI</h2>
                <p class="text-sm text-gray-400 mb-6">Supă pui, Ceaun cu piure</p>
                <button class="btn-meniu w-full" onclick="adaugaProdus(this)">Adaugă (20.5 RON)</button>
            </div>

            <div class="card-zi p-6" data-nume="Doza Proteică" data-pret="15.0">
                <h2 class="font-cinzel text-lg mb-2">ENERGIE</h2>
                <p class="text-sm text-gray-400 mb-6">Doza Proteică „Metanoia”</p>
                <button class="btn-meniu w-full" onclick="adaugaProdus(this)">Adaugă (15.0 RON)</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-[#0a0a0a] border-t border-[#c5a059] p-6 text-center">
        <p class="text-[10px] uppercase text-gray-500 tracking-[3px]">Total Selectat</p>
        <p id="total-box" class="font-cinzel text-2xl text-[#c5a059]">0 RON</p>
    </div>

    <script>
        let total = 0;
        function adaugaProdus(btn) {
            const card = btn.parentElement;
            const pret = parseFloat(card.getAttribute('data-pret'));
            total += pret;
            document.getElementById('total-box').innerText = total.toFixed(2) + ' RON';
            
            // Efect vizual de confirmare
            btn.innerText = "Adăugat!";
            setTimeout(() => btn.innerText = "Adaugă (" + pret + " RON)", 1000);
        }
    </script>
</body>
</html>
