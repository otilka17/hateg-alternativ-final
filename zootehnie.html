<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Motor DR-30 Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-8">
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <section class="bg-slate-900 p-8 rounded-3xl border border-slate-700">
            <h1 class="text-2xl font-black text-amber-500 mb-6">MOTOR ANALIZĂ DR-30</h1>
            <div class="space-y-4">
                <input type="text" id="nume" placeholder="Nume Solicitant" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                <input type="number" id="vaci" oninput="calc()" placeholder="Nr. Vaci (1200 SO)" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                <input type="number" id="ovine" oninput="calc()" placeholder="Nr. Ovine (50 SO)" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                <div class="p-6 bg-slate-950 rounded-2xl text-center border border-slate-800">
                    <div id="soResult" class="text-4xl font-black text-amber-500">0 €</div>
                    <div class="text-[10px] uppercase font-bold text-slate-500 mt-2">Standard Output (SO)</div>
                </div>
                <button onclick="saveAnalysis()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500 transition">SALVEAZĂ ANALIZA</button>
            </div>
        </section>

        <section class="bg-slate-900 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-emerald-500 font-black mb-6 uppercase text-[10px]">Istoric Analize (LocalStorage)</h2>
            <div id="istoric" class="space-y-3">
                </div>
            <button onclick="clearHistory()" class="mt-6 w-full text-slate-500 text-[10px] uppercase font-bold underline">Șterge Istoric</button>
        </section>
    </div>

    <script>
        function calc() {
            const v = document.getElementById('vaci').value * 1200;
            const o = document.getElementById('ovine').value * 50;
            const total = v + o;
            document.getElementById('soResult').innerText = total.toLocaleString() + " €";
            return total;
        }

        function saveAnalysis() {
            const nume = document.getElementById('nume').value;
            const total = calc();
            if(!nume) return alert("Introdu numele!");

            const data = JSON.parse(localStorage.getItem('dr30_data') || "[]");
            data.push({nume, total, data: new Date().toLocaleTimeString()});
            localStorage.setItem('dr30_data', JSON.stringify(data));
            renderHistory();
        }

        function renderHistory() {
            const istoricDiv = document.getElementById('istoric');
            istoricDiv.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('dr30_data') || "[]");
            data.forEach((item, i) => {
                istoricDiv.innerHTML += `
                    <div class="flex justify-between p-4 bg-slate-950 rounded-xl border border-slate-800">
                        <div><div class="font-bold">${item.nume}</div><div class="text-[10px] text-slate-500">${item.data}</div></div>
                        <div class="font-black text-amber-500">${item.total.toLocaleString()} €</div>
                    </div>
                `;
            });
        }

        function clearHistory() { localStorage.removeItem('dr30_data'); renderHistory(); }
        window.onload = renderHistory;
    </script>
</body>
</html>
