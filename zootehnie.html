<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sistem Expert DR-30 (Pro-Consultant)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-6">
    <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 bg-slate-900 p-6 rounded-3xl border border-slate-700">
            <h1 class="text-xl font-black text-amber-500 mb-6">DIAGNOSTIC FERMĂ DR-30</h1>
            
            <div class="space-y-4">
                <input type="text" id="nume" placeholder="Nume Fermier" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="vaci" oninput="runEngine()" placeholder="Nr. Vaci" class="bg-slate-950 p-4 rounded-xl border border-slate-700">
                    <input type="number" id="ovine" oninput="runEngine()" placeholder="Nr. Ovine" class="bg-slate-950 p-4 rounded-xl border border-slate-700">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <select id="taran" onchange="runEngine()" class="bg-slate-950 p-4 rounded-xl border border-slate-700">
                        <option value="20">Tânăr Fermier (+20p)</option>
                        <option value="0">Fără bonificație vârstă</option>
                    </select>
                    <select id="bio" onchange="runEngine()" class="bg-slate-950 p-4 rounded-xl border border-slate-700">
                        <option value="15">Certificare BIO (+15p)</option>
                        <option value="0">Producție convențională</option>
                    </select>
                </div>

                <textarea id="note" placeholder="Observații despre utilaje/investiții vizate..." class="w-full bg-slate-950 p-4 rounded-xl border border-slate-700 h-24"></textarea>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-700 flex flex-col justify-between">
            <div>
                <h2 class="text-slate-400 font-bold text-xs uppercase mb-4">Metrici Performanță</h2>
                <div class="space-y-4">
                    <div class="p-4 bg-slate-950 rounded-2xl border border-slate-800">
                        <div id="so-total" class="text-3xl font-black text-amber-500">0 €</div>
                        <div class="text-[9px] text-slate-500 uppercase font-bold">SO (Standard Output)</div>
                    </div>
                    <div class="p-4 bg-slate-950 rounded-2xl border border-slate-800">
                        <div id="puncte-total" class="text-3xl font-black text-emerald-500">0 p</div>
                        <div class="text-[9px] text-slate-500 uppercase font-bold">Punctaj Selectare AFIR</div>
                    </div>
                </div>
            </div>
            
            <button onclick="trimiteWhatsApp()" class="mt-6 w-full bg-green-600 p-4 rounded-xl font-bold hover:bg-green-500 transition">TRIMITE ANALIZĂ COMPLETĂ</button>
        </div>
    </div>

    <script>
        function runEngine() {
            const v = document.getElementById('vaci').value * 1200;
            const o = document.getElementById('ovine').value * 50;
            const taran = parseInt(document.getElementById('taran').value);
            const bio = parseInt(document.getElementById('bio').value);
            
            const totalSO = v + o;
            const totalPuncte = taran + bio + (totalSO > 12000 ? 10 : 0);
            
            document.getElementById('so-total').innerText = totalSO.toLocaleString() + " €";
            document.getElementById('puncte-total').innerText = totalPuncte + " p";
            return { totalSO, totalPuncte };
        }

        function trimiteWhatsApp() {
            const res = runEngine();
            const nume = document.getElementById('nume').value;
            const note = document.getElementById('note').value;
            const status = res.totalSO >= 12000 ? '✅ ELIGIBIL' : '❌ SUB PRAG';
            
            const msg = `*EVALUARE COMPLEXĂ DR-30*%0A%0A` +
                        `*Fermier:* ${nume}%0A` +
                        `*SO:* ${res.totalSO.toLocaleString()} € (${status})%0A` +
                        `*Punctaj AFIR:* ${res.totalPuncte} puncte%0A` +
                        `*Note:* ${note}%0A%0A` +
                        `---%0A` +
                        `Aceasta este fișa tehnică de calificare. Analizează dacă investim în suplimentarea efectivului pentru a crește SO-ul.`;
            
            window.open(`https://wa.me/40749229686?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
