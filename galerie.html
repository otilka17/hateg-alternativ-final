<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        header {
            background: #000;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 9999;
            box-sizing: border-box;
            border-bottom: 1px solid #D4AF37;
        }

        .logo { color: #D4AF37; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .hero {
            height: 80vh;
            /* CALE REPARATĂ: images/hero.jpg */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images/hero.jpg') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 70px;
        }

        .hero h1 { font-size: 60px; color: #D4AF37; margin: 0; font-style: italic; }
        .hero p { letter-spacing: 5px; text-transform: uppercase; opacity: 0.8; }

        .galerie-titlu { padding: 40px 20px 10px; font-size: 28px; color: #fff; font-weight: 300; }
        
        .viewport {
            width: 100%;
            height: 450px;
            overflow: hidden;
            position: relative;
        }

        .track {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .track img {
            width: 100vw;
            height: 100%;
            object-fit: cover;
        }

        .info-poza {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-left: 3px solid #D4AF37;
            backdrop-filter: blur(5px);
        }

        .wa {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #25d366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">▲ HAȚEG ALTERNATIV</div>
    <i class="fas fa-bars" style="color:#D4AF37; font-size:24px;"></i>
</header>

<section class="hero">
    <h1>Simte.</h1>
    <p>Rânduială & Tăcere</p>
</section>

<div class="galerie-titlu">Galerie Cinematică</div>

<div class="viewport">
    <div class="track" id="slider">
        <img src="images/1.jpg" alt="Răsărit">
        <img src="images/2.jpg" alt="Metanoia">
        <img src="images/hero.jpg" alt="Viziune">
    </div>
    <div class="info-poza" id="text-poza">Răsărit Monumental</div>
</div>

<a href="https://wa.me/407XXXXXXXX" class="wa">
    <i class="fab fa-whatsapp" style="color:#fff; font-size:30px;"></i>
</a>

<script>
    let pas = 0;
    const slider = document.getElementById('slider');
    const texte = ["Răsărit Monumental", "Metanoia", "Viziune Alternativă"];
    const textElement = document.getElementById('text-poza');

    setInterval(() => {
        pas++;
        if (pas > 2) pas = 0;
        slider.style.transform = `translateX(-${pas * 100}vw)`;
        textElement.innerHTML = texte[pas];
    }, 5000);
</script>

</body>
</html>
