<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Cinematică | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #000000; --auriu: #D4AF37; --alb: #ffffff; --gri: #1a1a1a; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Montserrat', sans-serif; background: var(--negru); color: var(--alb); line-height: 1.6; }

        /* HEADER ERMES - Identic cu Indexul */
        .site-header { 
            position: fixed; top: 0; width: 100%; z-index: 5000; 
            background: rgba(0,0,0,0.98); padding: 20px 0; 
            border-bottom: 1px solid #222; 
        }
        .nav-container { 
            max-width: 1200px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px; 
        }
        
        /* Logo-ul tău cu Munte și Aripi */
        .brand-logo { height: 50px; filter: brightness(0) invert(1); transition: 0.3s; }
        
        .desktop-nav a { 
            text-decoration: none; color: var(--alb); font-size: 0.65rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px; 
            margin-left: 20px; opacity: 0.6; 
        }
        .desktop-nav a:hover { opacity: 1; color: var(--auriu); }

        /* TITLU CINEMATIC */
        .gallery-intro { margin-top: 150px; text-align: center; padding: 0 20px; }
        .gallery-intro h1 { 
            font-family: 'Playfair Display', serif; font-size: 3.5rem; 
            font-style: italic; font-weight: 400; margin-bottom: 10px; 
        }
        .gallery-intro p { color: var(--auriu); letter-spacing: 4px; font-size: 0.8rem; text-transform: uppercase; }

        /* GRID CINEMATIC - Rezolvă problema imaginilor rupte */
        .gallery-grid { 
            max-width: 1400px; margin: 60px auto; 
            display: grid; grid-template-columns: 1fr; gap: 40px; padding: 0 40px; 
        }

        .gallery-item { position: relative; overflow: hidden; background: var(--gri); }
        .gallery-img { 
            width: 100%; height: 70vh; object-fit: cover; 
            display: block; transition: 0.6s; filter: brightness(0.7); 
        }
        .gallery-item:hover .gallery-img { transform: scale(1.03); filter: brightness(1); }

        .caption { 
            position: absolute; bottom: 40px; left: 40px; 
            border-left: 2px solid var(--auriu); padding-left: 20px; 
        }
        .caption h3 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem; }

        /* WHATSAPP FLOAT */
        .whatsapp-btn { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; z-index: 9999; 
        }

        @media (max-width: 768px) {
            .gallery-intro h1 { font-size: 2.5rem; }
            .gallery-img { height: 50vh; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">
            <a href="index.html">
                <img src="images/hateg-logo.svg" alt="Hațeg Alternativ" class="brand-logo">
            </a>
            <nav class="desktop-nav">
                <a href="index.html">Acasă</a>
                <a href="obiective.html">Obiective</a>
                <a href="gastronomie.html">Gastronomie</a>
                <a href="rezervari.html">Rezervări</a>
            </nav>
        </div>
    </header>

    <div class="gallery-intro">
        <h1>Galerie Cinematică</h1>
        <p>FRAGMENTE DIN ISIHIA RETEZATULUI</p>
    </div>

    <section class="gallery-grid">
        <div class="gallery-item">
            <img src="images/rasarit.jpg" alt="Răsărit" class="gallery-img">
            <div class="caption"><h3>Răsărit la ora 5.</h3></div>
        </div>

        <div class="gallery-item">
            <img src="images/monumental.jpg" alt="Monumental" class="gallery-img">
            <div class="caption"><h3>Monumental.</h3></div>
        </div>

        <div class="gallery-item">
            <img src="images/detaliu.jpg" alt="Detaliu" class="gallery-img">
            <div class="caption"><h3>Detaliul care vindecă.</h3></div>
        </div>
    </section>

    <a href="https://wa.me/40749000000" class="whatsapp-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="width: 35px;">
    </a>

    <footer style="padding: 100px 20px; text-align: center; opacity: 0.3; font-size: 0.6rem; letter-spacing: 4px;">
        <p>© 2026 HAȚEG ALTERNATIV — MANAGEMENTUL ISIHIEI</p>
    </footer>

</body>
</html>
