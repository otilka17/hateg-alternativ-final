<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Cinematică | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --negru: #000000; 
            --auriu: #D4AF37; /* Auriul tău din screenshot */
            --alb: #ffffff; 
            --gri-inchis: #1a1a1a; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { height: 100%; width: 100%; background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* HEADER UNITAR - ADOPTAT DIN INDEX */
        .site-header { 
            position: fixed; top: 0; width: 100%; z-index: 5000; 
            background: rgba(0,0,0,0.95); border-bottom: 1px solid #222; padding: 20px 0; 
        }
        .nav-container { 
            max-width: 1600px; margin: 0 auto; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 40px; 
        }
        
        /* LOGO TEXT DIN INDEX */
        .brand { 
            font-weight: 700; font-size: 1.1rem; text-decoration: none; 
            color: var(--auriu); text-transform: uppercase; letter-spacing: 5px; 
            display: flex; align-items: center; gap: 10px;
        }
        .brand span { font-size: 0.8rem; } /* Pentru triunghiul mic ▲ */
        
        .desktop-nav { display: flex; gap: 25px; }
        .desktop-nav a { 
            text-decoration: none; color: var(--alb); font-size: 0.7rem; 
            font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
            opacity: 0.6; transition: 0.3s; 
        }
        .desktop-nav a:hover { opacity: 1; color: var(--auriu); }

        /* SLIDESHOW FULL SCREEN (ERMES STYLE) */
        .slideshow-wrapper { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            transition: opacity 2.5s ease-in-out; z-index: 1; 
        }
        .slide.active { opacity: 1; z-index: 10; }

        /* EFECTUL KEN BURNS (ZOOM LENT) */
        .slide-img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.6); /* Isihie vizuală */
            animation: zoomEffect 20s linear infinite; 
        }

        @keyframes zoomEffect {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* CAPTIONS CINEMATICE */
        .caption { 
            position: absolute; bottom: 100px; left: 80px; z-index: 20;
            border-left: 2px solid var(--auriu); padding-left: 35px;
        }
        .caption h2 { 
            font-family: 'Playfair Display', serif; font-style: italic; 
            font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 10px; 
        }
        .caption p { color: var(--auriu); letter-spacing: 5px; font-size: 0.7rem; text-transform: uppercase; }

        /* WHATSAPP FLOAT */
        .wa-float { 
            position: fixed; bottom: 40px; right: 40px; z-index: 9999; 
            background: #25d366; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">
            <a href="index.html" class="brand"><span>▲</span> Hațeg Alternativ</a>
            <nav class="desktop-nav">
                <a href="index.html">Acasă</a>
                <a href="obiective.html">Obiective</a>
                <a href="gastronomie.html">Gastronomie</a>
                <a href="rezervari.html">Rezervări</a>
            </nav>
        </div>
    </header>

    <div class="slideshow-wrapper">
        <div class="slide active">
            <img src="images/hero-camp-munti.jpg" class="slide-img" alt="Munte">
            <div class="caption">
                <h2>Răsărit la ora 5.</h2>
                <p>FRAGMENT DIN ISIHIA RETEZATULUI</p>
            </div>
        </div>

        <div class="slide">
            <img src="images/apus.jpg" class="slide-img" alt="Apus">
            <div class="caption">
                <h2>Monumental.</h2>
                <p>STABILITATE ÎN MODERNITATE LICHIDĂ</p>
            </div>
        </div>

        <div class="slide">
            <img src="images/narcise.jpg" class="slide-img" alt="Narcise">
            <div class="caption">
                <h2>Detaliul care vindecă.</h2>
                <p>PRACTICA NEPSISULUI VIZUAL</p>
            </div>
        </div>
    </div>

    <a href="https://wa.me/40749000000" class="wa-float">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width: 32px;" alt="WA">
    </a>

    <script>
        const slides = document.querySelectorAll('.slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 7000); // Schimbă slide-ul la fiecare 7 secunde
    </script>

</body>
</html>
