<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Cinematică | Hațeg Alternativ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000000; }
        body { margin: 0; background: var(--black); color: #fff; font-family: sans-serif; overflow-x: hidden; }

        /* HEADER & LOGO */
        header {
            background: rgba(0,0,0,0.9);
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo-box { display: flex; align-items: center; }
        .logo-icon { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 18px solid var(--gold); margin-right: 10px; }
        .logo-text { color: var(--gold); font-size: 14px; letter-spacing: 2px; font-weight: bold; }

        /* MENIU SANDWICH REFORMATAT */
        .menu-icon { color: var(--gold); cursor: pointer; font-size: 24px; z-index: 1002; }
        
        .nav-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: var(--black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
            z-index: 1001;
        }

        .nav-overlay.open { right: 0; }
        .nav-overlay a {
            color: var(--white);
            text-decoration: none;
            font-size: 24px;
            margin: 20px;
            letter-spacing: 3px;
            font-family: 'Playfair Display', serif;
        }

        /* GALERIE - REGLAJ IMAGINI TĂIATE */
        .viewport {
            width: 100%;
            height: 100vh; /* Ocupă tot ecranul */
            position: relative;
            overflow: hidden;
            margin-top: 0;
        }

        .track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 1s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .slide img {
            width: 100%;
            height: 100%;
            /* 'contain' asigură că imaginea se vede TOATĂ, fără să fie tăiată */
            object-fit: contain; 
            background: #000;
        }

        /* TEXT PESTE IMAGINE */
        .caption {
            position: absolute;
            bottom: 100px;
            left: 5%;
            border-left: 3px solid var(--gold);
            padding-left: 20px;
            background: rgba(0,0,0,0.5);
        }

        .caption h3 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin: 0;
            font-style: italic;
        }

        .caption p {
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .wa-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="logo-icon"></div>
        <div class="logo-text">HAȚEG ALTERNATIV</div>
    </div>
    <div class="menu-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
</header>

<nav class="nav-overlay" id="navMenu">
    <a href="#" onclick="toggleMenu()">ACASĂ</a>
    <a href="#galerie" onclick="toggleMenu()">GALERIE</a>
    <a href="#" onclick="toggleMenu()">REZERVARE</a>
</nav>

<div class="viewport">
    <div class="track" id="slider">
        <div class="slide">
            <img src="images/hero-sat.jpg">
            <div class="caption">
                <p>Fragment din Retezat</p>
                <h3>Răsărit la ora 5.</h3>
            </div>
        </div>
        <div class="slide">
            <img src="images/feed-buliga.jpg">
            <div class="caption">
                <p>Retreat</p>
                <h3>Metanoia.</h3>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/407XXXXXXXX" class="wa-float"><i class="fab fa-whatsapp" style="color:#fff; font-size:30px;"></i></a>

<script>
    function toggleMenu() {
        document.getElementById('navMenu').classList.toggle('open');
    }

    let pas = 0;
    const slider = document.getElementById('slider');
    setInterval(() => {
        pas++;
        if (pas > 1) pas = 0;
        slider.style.transform = `translateX(-${pas * 100}%)`;
    }, 5000);
</script>

</body>
</html>
