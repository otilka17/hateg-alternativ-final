<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; }
        
        .gallery-section {
            background-color: #000;
            padding: 80px 0;
            overflow: hidden;
        }

        .gallery-header {
            padding: 0 5%;
            margin-bottom: 40px;
        }

        .gallery-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            color: #fff;
            margin: 0;
        }

        .gallery-header p {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .slider-viewport {
            position: relative;
            width: 100%;
            height: 600px; 
            overflow: hidden;
        }

        .slider-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-item {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .slide-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
        }

        .slide-info {
            position: absolute;
            bottom: 60px;
            left: 5%;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-left: 3px solid #D4AF37;
            backdrop-filter: blur(5px);
        }

        .slide-tag {
            color: #D4AF37;
            font-size: 12px;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 10px;
        }

        .slide-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #fff;
            margin: 0;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #D4AF37;
            padding: 20px 15px;
            cursor: pointer;
            z-index: 20;
            transition: 0.3s;
        }

        .slider-btn:hover { background: #D4AF37; color: #000; }
        .prev { left: 0; border-radius: 0 5px 5px 0; }
        .next { right: 0; border-radius: 5px 0 0 5px; }

        @media (max-width: 768px) {
            .slider-viewport { height: 450px; }
            .slide-info h3 { font-size: 24px; }
            .gallery-header h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

<section id="galerie" class="gallery-section">
    <div class="gallery-header">
        <h2>Galerie Cinematică</h2>
        <p>Rânduială vizuală la 1000m altitudine</p>
    </div>

    <div class="slider-viewport">
        <div class="slider-track" id="sliderTrack">
            <div class="slide-item">
                <img src="https://otilka17.github.io/1.jpg" alt="Răsărit Monumental">
                <div class="slide-info">
                    <span class="slide-tag">01. DIMINEȚI</span>
                    <h3>Răsărit Monumental</h3>
                </div>
            </div>
            <div class="slide-item">
                <img src="https://otilka17.github.io/2.jpg" alt="Metanoia">
                <div class="slide-info">
                    <span class="slide-tag">03. SPIRIT</span>
                    <h3>Metanoia</h3>
                </div>
            </div>
            <div class="slide-item">
                <img src="https://otilka17.github.io/hero.jpg" alt="Viziune">
                <div class="slide-info">
                    <span class="slide-tag">02. ORIZONT</span>
                    <h3>Viziune Alternativă</h3>
                </div>
            </div>
        </div>

        <button class="slider-btn prev" onclick="moveManual(-1)">&#10094;</button>
        <button class="slider-btn next" onclick="moveManual(1)">&#10095;</button>
    </div>
</section>

<script>
    let currentIdx = 0;
    const track = document.getElementById('sliderTrack');
    const allItems = document.querySelectorAll('.slide-item');
    const totalItems = allItems.length;

    function updateGallery() {
        track.style.transform = `translateX(-${currentIdx * 100}%)`;
    }

    function moveManual(direction) {
        currentIdx = (currentIdx + direction + totalItems) % totalItems;
        updateGallery();
    }

    let autoInterval = setInterval(() => { moveManual(1); }, 6000);
</script>

</body>
</html>
