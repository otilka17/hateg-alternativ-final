<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizare Sejur | Domeniile la Buligă</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #1a1a1a; --auriu: #c5a059; --crem: #fdfcf8; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--negru); margin: 0; padding: 40px 20px; }
        
        .config-container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-style: italic; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--auriu); letter-spacing: 2px; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; margin-bottom: 40px; }

        .section-title { font-weight: 700; font-size: 1.1rem; margin: 30px 0 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }

        /* Selector Nopți */
        .nights-selector { display: flex; gap: 15px; margin-bottom: 30px; }
        .night-opt { flex: 1; padding: 15px; border: 2px solid #eee; text-align: center; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .night-opt.active { border-color: var(--auriu); background: #fffcf5; }

        /* Checkbox-uri pentru Ateliere */
        .addon-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 1px solid #f9f9f9; margin-bottom: 10px; transition: 0.3s; cursor: pointer; }
        .addon-item:hover { background: #fdfcf8; border-color: #eee; }
        .addon-item input { width: 20px; height: 20px; accent-color: var(--auriu); cursor: pointer; }
        .addon-info { flex-grow: 1; margin-left: 15px; }
        .addon-price { font-weight: 700; color: var(--auriu); }

        /* Sumar Final */
        .total-box { background: var(--negru); color: white; padding: 30px; margin-top: 40px; text-align: center; }
        .total-box span { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .total-box h2 { font-size: 2.5rem; margin: 10px 0; color: var(--auriu); }

        .btn-send { display: block; background: var(--auriu); color: white; text-decoration: none; padding: 20px; font-weight: 700; margin-top: 20px; transition: 0.3s; }
        .btn-send:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="config-container">
    <h1>Personalizează-ți Sejurul</h1>
    <p class="subtitle">Domeniile la Buligă</p>

    <div class="section-title">1. Câte nopți doriți să rămâneți?</div>
    <div class="nights-selector">
        <div class="night-opt active" onclick="setNights(this, 1)">1 Noapte</div>
        <div class="night-opt" onclick="setNights(this, 2)">2 Nopți</div>
        <div class="night-opt" onclick="setNights(this, 3)">3 Nopți</div>
    </div>

    <div class="section-title">2. Adăugați Ateliere & Experiențe (Opțional)</div>
    
    <label class="addon-item">
        <input type="checkbox" class="addon-check" value="150" data-name="Atelier Gastronomic" onchange="calculate()">
        <div class="addon-info">
            <strong>Atelier Gastronomic</strong><br>
            <small>Pâine, sarmale sau ruladă de post</small>
        </div>
        <div class="addon-price">+150 RON / pers.</div>
    </label>

    <label class="addon-item">
        <input type="checkbox" class="addon-check" value="150" data-name="Terapie prin Artă" onchange="calculate()">
        <div class="addon-info">
            <strong>Terapie prin Artă</strong><br>
            <small>Pictură sau Diamond Painting</small>
        </div>
        <div class="addon-price">+150 RON / pers.</div>
    </label>

    <label class="addon-item">
        <input type="checkbox" class="addon-check" value="350" data-name="Tur Ghidat" onchange="calculate()">
        <div class="addon-info">
            <strong>Tur Ghidat GoNomad</strong><br>
            <small>Explorare personalizată în Hațeg</small>
        </div>
        <div class="addon-price">+350 RON / grup</div>
    </label>

    <div class="total-box">
        <span>Estimare Totală:</span>
        <h2 id="totalDisplay">2000 RON</h2>
        <a href="#" id="waLink" class="btn-send">Trimite Configurația pe WhatsApp</a>
    </div>
</div>

<script>
    let nights = 1;
    const pricePerNight = 2000;

    function setNights(el, n) {
        document.querySelectorAll('.night-opt').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        nights = n;
        calculate();
    }

    function calculate() {
        let addonTotal = 0;
        let selectedAddons = [];
        
        document.querySelectorAll('.addon-check:checked').forEach(check => {
            addonTotal += parseInt(check.value);
            selectedAddons.push(check.getAttribute('data-name'));
        });

        const total = (nights * pricePerNight) + addonTotal;
        document.getElementById('totalDisplay').innerText = total + " RON";

        // Update Link WhatsApp
        const waBase = "https://wa.me/40749229686?text=";
        const addonText = selectedAddons.length > 0 ? " + " + selectedAddons.join(", ") : "";
        const message = `Bună ziua! Doresc o rezervare personalizată: Cazare ${nights} nopți${addonText}. Estimare totală: ${total} RON.`;
        document.getElementById('waLink').href = waBase + encodeURIComponent(message);
    }

    calculate(); // Init
</script>

</body>
</html>
