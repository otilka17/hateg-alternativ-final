<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiences | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; padding: 40px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 5vw; font-style: italic; font-weight: 400; margin: 100px 0; text-align: center; }
        .exp-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; max-width: 1600px; margin: 0 auto; }
        .exp-card { margin-bottom: 100px; }
        .exp-img { width: 100%; height: 600px; background-size: cover; background-position: center; filter: grayscale(20%); transition: 0.5s; }
        .exp-img:hover { filter: grayscale(0%); }
        .exp-info { padding: 30px 0; }
        .exp-info span { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: #9d8665; }
        .exp-info h3 { font-family: 'Playfair Display', serif; font-size: 2rem; font-style: italic; margin-top: 10px; font-weight: 400; }
        @media (max-width: 900px) { .exp-grid { grid-template-columns: 1fr; } .exp-img { height: 400px; } }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; text-transform:uppercase; font-size:0.7rem; letter-spacing:3px;">
        <a href="index.html" style="color:#000; text-decoration:none;">Hațeg Alternativ</a>
        <span>Curated Experiences</span>
    </div>
    <h1>Explore the Unseen.</h1>
    <div class="exp-grid">
        <div class="exp-card">
            <div class="exp-img" style="background-image: url('images/exp-lac.jpg');"></div>
            <div class="exp-info"><span>Nature</span><h3>Liniștea lacurilor montane.</h3></div>
        </div>
        <div class="exp-card" style="margin-top: 100px;">
            <div class="exp-img" style="background-image: url('images/exp-biserica-ext.jpg');"></div>
            <div class="exp-info"><span>Heritage</span><h3>Istorie sculptată în piatră.</h3></div>
        </div>
    </div>
</body>
</html>
