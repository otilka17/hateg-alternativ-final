<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorare E-Bike | Metanoia Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset și stil general */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* Protecție Logo - Rezolvă problema din IMG20260429193638.jpg */
        .site-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 5%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }
        .main-logo {
            max-height: 75px; 
            display: block;
        }

        /* Hero Section cu Slider */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .experience-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Imaginile care rulează (Bike și E-bike) */
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slide.active { opacity: 0.5; } /* Opacitate setată pentru lizibilitatea titlului */

        /* Conținutul (Titlu, Date, Buton) */
        .hero-content {
            position: relative;
            z-index: 10;
            padding: 0 20px;
            margin-top: 80px; /* Siguranță sub logo */
        }

        .expedition-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-style: italic;
            color: #FFD700;
            margin-bottom: 30px;
            line-height: 1.1;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.9);
        }

        /* Stats - Datele tehnice din screenshot */
        .stats-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .stat-box span { display: block; color: #FFD700; font-weight: bold; font-size: 1.1rem; margin-top: 5px; }

        /* Butonul REZERVĂ ACUM */
        .btn-reserve {
            display: inline-block;
            padding: 18px 40px;
            background: #FFD700;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            border-radius: 2px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .btn-reserve:hover { background: #fff; transform: translateY(-3px); }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="metanoia-logo.png" alt="Metanoia" class="main-logo">
    </header>

    <section class="hero-section">
        <div class="experience-slider">
            <!-- Înlocuiește cu path-urile tale de imagini reale -->
            <div class="slide active" style="background-image: url('bike-vadu-dobrii.jpg');"></div>
            <div class="slide" style="background-image: url('ebike-experience.jpg');"></div>
        </div>

        <div class="hero-content">
            <h1 class="expedition-title">
                Vadu Dobrii spre Roșcani:<br>
                Explorare în Ținutul Pădurenilor
            </h1>

            <div class="stats-row">
                <div class="stat-box">DISTANȚĂ <span>45 KM</span></div>
                <div class="stat-box">DIFICULTATE <span>MODERAT</span></div>
                <div class="stat-box">ALTITUDINE <span>POIANA RUSCĂ</span></div>
                <div class="stat-box">DURATĂ <span>1 ZI (9-10 MAI)</span></div>
            </div>
            
            <a href="https://corvinebike.ro/traseu/tinutul-padurenilor/" class="btn-reserve">
                REZERVĂ ACUM
            </a>
        </div>
    </section>

    <script>
        // Script pentru rularea imaginilor (E-bike Experiences)
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 4000); // Rulează la 4 secunde
    </script>
</body>
</html>
