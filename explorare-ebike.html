<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorare E-Bike | Metanoia Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; }

        /* HEADER: Spațiu dedicat pentru logo ca să nu mai suprapună titlul */
        .site-header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center; /* Centrat pentru mobil, cum e în screenshot */
            background: #000;
            position: relative;
            z-index: 100;
        }

        .main-logo {
            height: 80px; /* Dimensiune echilibrată */
            width: auto;
        }

        /* HERO: Secțiunea cu slider și text */
        .hero-section {
            position: relative;
            min-height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* SLIDER: Imaginile care rulează în fundal */
        .experience-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slide.active { opacity: 0.4; } /* Fundal întunecat pentru contrast */

        /* CONTENT: Titlul și datele tehnice */
        .hero-content {
            position: relative;
            z-index: 10;
            padding: 20px;
            width: 100%;
        }

        .expedition-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-style: italic;
            color: #d4a017;
            margin-bottom: 40px;
            line-height: 1.2;
        }

        /* STATS: Aranjate frumos ca în screenshot-ul "aproape bine" */
        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-item {
            border-left: 2px solid #d4a017;
            padding-left: 15px;
            text-align: left;
            max-width: 250px;
            margin: 0 auto;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d4a017;
            margin-top: 5px;
        }

        /* BUTON REZERVARE */
        .btn-reserve {
            display: inline-block;
            width: 80%;
            max-width: 300px;
            padding: 18px;
            background: #d4a017;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <!-- Logo-ul tău fixat să nu mai "mănânce" din titlu -->
        <img src="logo1_4.svg" alt="Metanoia Logo" class="main-logo">
    </header>

    <section class="hero-section">
        <!-- Slider fundal -->
        <div class="experience-slider">
            <div class="slide active" style="background-image: url('fundal1.jpg');"></div>
            <div class="slide" style="background-image: url('fundal2.jpg');"></div>
        </div>

        <div class="hero-content">
            <h1 class="expedition-title">
                Vadu Dobrii spre Roșcani:<br>
                Explorare în Ținutul Pădurenilor
            </h1>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Distanță</div>
                    <div class="stat-value">45 KM</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Dificultate</div>
                    <div class="stat-value">MODERAT</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Altitudine</div>
                    <div class="stat-value">POIANA RUSCĂ</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Durată</div>
                    <div class="stat-value">1 ZI (9-10 MAI)</div>
                </div>
            </div>

            <a href="https://corvinebike.ro/traseu/tinutul-padurenilor/" class="btn-reserve">
                Rezervă Acum
            </a>
        </div>
    </section>

    <script>
        const slides = document.querySelectorAll('.slide');
        let current = 0;

        function nextSlide() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }
        setInterval(nextSlide, 4000);
    </script>
</body>
</html>
