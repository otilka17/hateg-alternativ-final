<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorare E-Bike | Metanoia Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset și baze stilistice */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* Protecție Logo Metanoia - Rezolvă suprapunerea semnalată */
        .site-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 5%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
        }
        
        .main-logo {
            height: 100px; /* Dimensiune optimă pentru noul logo circular */
            width: auto;
            filter: drop-shadow(0px 0px 8px rgba(212, 160, 23, 0.6));
            transition: transform 0.3s ease;
        }
        
        .main-logo:hover { transform: scale(1.05); }

        /* Hero Section cu Slider pentru Experiențe */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .experience-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        
        /* Opacitate optimizată pentru contrastul textului */
        .slide.active { opacity: 0.45; } 

        /* Conținut (Titlu, Date, Buton Rezervare) */
        .hero-content {
            position: relative;
            z-index: 10;
            padding: 0 20px;
            margin-top: 120px; /* Spațiu tampon vital pentru a evita logo-ul */
        }

        .expedition-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5.5vw, 4.2rem);
            font-style: italic;
            color: #d4a017; /* Auriul specific logo-ului Metanoia */
            margin-bottom: 35px;
            line-height: 1.1;
            text-shadow: 2px 2px 20px rgba(0,0,0,1);
        }

        /* Stats Row - Datele din screenshot-ul original */
        .stats-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-bottom: 45px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        
        .stat-box { border-left: 1px solid rgba(212, 160, 23, 0.4); padding-left: 15px; text-align: left; }
        .stat-box span { display: block; color: #d4a017; font-weight: bold; font-size: 1.1rem; margin-top: 5px; }

        /* Butonul de Conversie Digitală */
        .btn-reserve {
            display: inline-block;
            padding: 20px 50px;
            background: #d4a017;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .btn-reserve:hover { 
            background: #fff; 
            transform: translateY(-5px); 
            box-shadow: 0 15px 40px rgba(212, 160, 23, 0.4);
        }
    </style>
</head>
<body>

    <header class="site-header">
        <!-- Noul Logo Metanoia inserat corect -->
        <img src="input_file_0.png" alt="Metanoia Logo" class="main-logo">
    </header>

    <section class="hero-section">
        <div class="experience-slider">
            <!-- Imaginile experiențelor care rulează automat -->
            <div class="slide active" style="background-image: url('bike-vadu-dobrii.jpg');"></div>
            <div class="slide" style="background-image: url('ebike-experience-2.jpg');"></div>
            <div class="slide" style="background-image: url('punti-padureni.jpg');"></div>
        </div>

        <div class="hero-content">
            <h1 class="expedition-title">
                Vadu Dobrii spre Roșcani:<br>
                Explorare în Ținutul Pădurenilor
            </h1>

            <!-- Date tehnice preluate din strategia de teren -->
            <div class="stats-row">
                <div class="stat-box">DISTANȚĂ <span>45 KM</span></div>
                <div class="stat-box">DIFICULTATE <span>MODERAT</span></div>
                <div class="stat-box">ALTITUDINE <span>POIANA RUSCĂ</span></div>
                <div class="stat-box">DURATĂ <span>1 ZI (9-10 MAI)</span></div>
            </div>
            
            <!-- Link direct către rezervarea traseului -->
            <a href="https://corvinebike.ro/traseu/tinutul-padurenilor/" class="btn-reserve">
                REZERVĂ ACUM
            </a>
        </div>
    </section>

    <script>
        // Script pentru managementul slider-ului de imagini
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        
        // Interval de rulare fluidă pentru experiențe (4 secunde)
        setInterval(nextSlide, 4000);
    </script>
</body>
</html>
