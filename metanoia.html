<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiențe Metanoia | Rânduiala Veche | Hațeg Alternativ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --auriu-gold: #c5a059; 
            --negru-pur: #0a0a0a; 
            --alb: #ffffff;
            --gri-text: #aaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru-pur); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; line-height: 1.6; }

        /* HEADER */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .brand svg { height: 100px; width: auto; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.4)); }
        .burger { cursor: pointer; z-index: 10000; padding: 10px; }
        .burger div { width: 35px; height: 2px; background: var(--auriu-gold); margin: 8px; }

        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); z-index: 9500; }
        .main-nav.active { right: 0; }
        .main-nav a { text-decoration: none; color: #fff; font-size: 2.5rem; font-family: 'Cinzel'; margin: 15px 0; letter-spacing: 5px; opacity: 0.7; transition: 0.3s; }
        .main-nav a:hover { opacity: 1; color: var(--auriu-gold); }

        /* HERO */
        .hero-sub { height: 60vh; position: relative; display: flex; align-items: center; justify-content: center; background: url('images/rasarit.jpg') center/cover; }
        .hero-sub::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .hero-content { position: relative; z-index: 10; text-align: center; max-width: 800px; padding: 0 20px; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 8vw, 6rem); font-style: italic; color: var(--auriu-gold); text-shadow: 0 5px 25px rgba(0,0,0,0.8); }
        .hero-content p { font-family: 'Cinzel'; font-size: 1rem; color: #fff; letter-spacing: 6px; text-transform: uppercase; margin-top: 10px; }

        /* GRID EXPERIENTE */
        .exp-container { padding: 100px 50px; max-width: 1400px; margin: 0 auto; }
        .section-label { text-align: center; margin-bottom: 60px; }
        .section-label span { font-family: 'Cinzel'; color: var(--auriu-gold); letter-spacing: 8px; font-size: 0.8rem; text-transform: uppercase; }
        .section-label h2 { font-family: 'Playfair Display'; font-style: italic; font-size: 3rem; margin-top: 10px; }

        .exp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; }
        .exp-card { background: #080808; border: 1px solid #1a1a1a; position: relative; transition: 0.4s; overflow: hidden; display: flex; flex-direction: column; }
        .exp-card:hover { border-color: var(--auriu-gold); transform: translateY(-10px); }
        
        .exp-img { height: 350px; overflow: hidden; position: relative; }
        .exp-img img { width: 100%; height: 100%; object-fit: cover; transition: 1s; filter: grayscale(30%); }
        .exp-card:hover .exp-img img { transform: scale(1.1); filter: grayscale(0%); }

        .exp-info { padding: 40px; flex-grow: 1; display: flex; flex-direction: column; }
        .exp-info h3 { font-family: 'Cinzel'; color: var(--auriu-gold); font-size: 1.4rem; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase; }
        .exp-info p { color: #ccc; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.8; }

        /* BUTON WHATSAPP CARD */
        .btn-wa-card {
            margin-top: auto;
            padding: 15px 30px;
            border: 1px solid var(--auriu-gold);
            color: var(--auriu-gold);
            text-decoration: none;
            font-family: 'Cinzel';
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-align: center;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-wa-card:hover { background: var(--auriu-gold); color: #000; box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }

        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background-color: #25d366; color: #FFF; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 10000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        footer { padding: 60px; text-align: center; opacity: 0.5; font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 2px; border-top: 1px solid #111; color: #666; }

        @media (max-width: 768px) {
            .exp-grid { grid-template-columns: 1fr; }
            .exp-container { padding: 60px 20px; }
            .site-header { padding: 20px; }
        }
    </style>
</head>
