<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomie | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Inter:wght@300;400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--negru); color: var(--alb); }

        .site-header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px 50px; background: rgba(5,5,5,0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(197,160,89,0.1); }
        .brand { font-family: 'Cinzel'; color: var(--auriu); text-decoration: none; font-weight: 900; letter-spacing: 5px; }
        
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-decoration: none; text-transform: uppercase; letter-spacing: 4px; }

        .hero-gastro { height: 50vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('images/gast-cafea-inima.jpg') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-gastro h1 { font-family: 'Playfair Display'; font-size: 4rem; font-style: italic; color: var(--auriu); }

        .menu-container { max-width: 1000px; margin: 50px auto; padding: 0 20px; }
        .category-header { height: 350px; overflow: hidden; position: relative; margin-bottom: 30px; border: 1px solid #1a1a1a; }
        .category-header img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .category-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px; background: linear-gradient(to top, var(--negru), transparent); }
        .category-overlay h2 { font-family: 'Playfair Display'; font-size: 2.5rem; font-style: italic; color: var(--auriu); }

        .menu-item { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .item-info h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        .item-price { font-family: 'Playfair Display'; color: var(--auriu); font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html" class="brand">HAȚEG ALTERNATIV</a>
        <div class="burger" id="burger" style="cursor:pointer;">
            <div style="width:30px; height:2px; background:var(--auriu); margin:6px;"></div>
            <div style="width:30px; height:2px; background:var(--auriu); margin:6px;"></div>
            <div style="width:30px; height:2px; background:var(--auriu); margin:6px;"></div>
        </div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">ACASĂ</a>
            <a href="pensiune.html">PENSIUNEA</a>
            <a href="gastronomie.html">GASTRONOMIE</a>
            <a href="metanoia.html">METANOIA</a>
            <a href="evenimente.html">EVENIMENTE</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <section class="hero-gastro"><h1>Gustul de Aur.</h1></section>

    <main class="menu-container">
        <div class="menu-category">
            <div class="category-header">
                <img src="images/pasta-ai-signature.jpg" alt="Signature Pasta">
                <div class="category-overlay"><h2>Paste Signature</h2></div>
            </div>
            <div class="menu-item"><div class="item-info"><h3>Somon sau Creveți</h3></div><div class="item-price">55-65 RON</div></div>
        </div>

        <div class="menu-category">
            <div class="category-header">
                <img src="images/garnituri-hateg-alternativ-ai.jpg" alt="Garnituri AI">
                <div class="category-overlay"><h2>Garnituri</h2></div>
            </div>
            <div class="menu-item"><div class="item-info"><h3>Cartofi Aurii</h3></div><div class="item-price">15 RON</div></div>
        </div>
    </main>

    <script>
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        if(burger) { burger.onclick = () => { nav.classList.toggle('active'); } }
    </script>
</body>
</html>
