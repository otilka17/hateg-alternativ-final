    <style>
        :root { --gold: #c5a059; --dark: #000000; --accent: #1a1a1a; --text-muted: #888; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* CINEMATIC OVERLAY */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05; pointer-events: none; z-index: 9999;
        }

        /* HERO SECTION */
        .hero-cinematic {
            height: 100vh; position: relative; display: flex; align-items: center; justify-content: center;
            /* Modificat aici să citească direct din folderul principal */
            background: linear-gradient(rgba(0,0,0,0.3), var(--dark)), url('foc.jpg') center/cover no-repeat;
            text-align: center; overflow: hidden;
        }
        .hero-content h1 {
            font-family: 'Playfair Display'; font-style: italic; font-size: clamp(3rem, 12vw, 8rem);
            color: var(--gold); line-height: 1; margin-bottom: 20px; text-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .hero-content p { font-family: 'Cinzel'; letter-spacing: 8px; font-size: 0.8rem; color: var(--gold); }

        /* SECTION HEADINGS */
        .cinematic-label {
            text-align: center; margin: 100px 0 50px; position: relative;
        }
        .cinematic-label span {
            font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 10px; color: var(--gold); text-transform: uppercase;
        }
        .cinematic-label h2 {
            font-family: 'Playfair Display'; font-style: italic; font-size: 3rem; margin-top: 10px; opacity: 0.9;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 5%; }

        /* GRID SYSTEM */
        .cinematic-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 100px;
        }
        @media (max-width: 600px) { .cinematic-grid { grid-template-columns: 1fr; } }

        .scene-card {
            position: relative; height: 600px; overflow: hidden; background: var(--accent); border-radius: 2px;
        }
        .scene-card img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 1.5s ease, filter 1s ease;
            filter: brightness(0.6) grayscale(20%);
        }
        .scene-card:hover img { transform: scale(1.05); filter: brightness(0.8) grayscale(0%); }

        .scene-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
