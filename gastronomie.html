<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomy | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #000; --auriu: #9d8665; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: var(--negru); }
        .nav { padding: 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .nav a { text-decoration: none; color: #000; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }
        
        .content { max-width: 1200px; margin: 100px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .menu-img { height: 80vh; background: url('images/bucura.jpg') center/cover; }
        
        .menu-text h1 { font-family: 'Playfair Display', serif; font-size: 4rem; font-style: italic; margin-bottom: 40px; font-weight: 400; }
        .menu-item { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #eee; font-weight: 300; }
        .menu-item span:last-child { color: var(--auriu); font-weight: 400; }
        
        @media (max-width: 900px) { .content { grid-template-columns: 1fr; } .menu-img { height: 400px; } }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" style="font-weight: 600;">Hațeg Alternativ</a>
        <a href="index.html">← Back</a>
    </nav>
    <section class="content">
        <div class="menu-img"></div>
        <div class="menu-text">
            <h1>Punct<br>Gastronomic.</h1>
            <p style="margin-bottom: 40px; color: #666; font-weight: 300;">O experiență culinară onestă, bazată pe ingrediente locale și rețete uitate. Gătim pentru suflet, nu pentru viteză.</p>
            <div class="menu-item"><span>Ruladă de Post Specială</span><span>45 RON</span></div>
            <div class="menu-item"><span>Ciorbă cu tăiței de casă</span><span>25 RON</span></div>
            <div class="menu-item"><span>Prăjitura Albinuța</span><span>20 RON</span></div>
        </div>
    </section>
</body>
</html>
