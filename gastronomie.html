<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meniul Gospodăriei | Rânduială Sistemică</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --auriu: #c5a059; --negru: #000000; --gri-card: #0a0a0a; --alb: #f9f9f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; line-height: 1.6; }

        .site-header { position: absolute; top: 0; width: 100%; z-index: 999; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo img { height: 45px; }

        .menu-section { padding: 120px 10% 80px; }
        .section-title { font-family: 'Cinzel'; color: var(--auriu); text-align: center; margin-bottom: 60px; letter-spacing: 5px; }

        /* TABEL PREȚURI */
        .price-banner { 
            text-align: center; margin-bottom: 60px; font-family: 'Cinzel'; 
            border: 1px solid var(--auriu); padding: 30px; background: rgba(197, 160, 89, 0.05);
        }
        .price-item { display: inline-block; margin: 0 30px; font-size: 0.9rem; letter-spacing: 2px; }
        .price-val { color: var(--auriu); font-weight: 700; margin-left: 10px; }

        /* GRID CONȚINUT */
        .menu-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: #050505; border: 1px solid #111; padding: 40px; transition: 0.4s; }
        .card h3 { font-family: 'Playfair Display'; font-style: italic; color: var(--auriu); font-size: 1.8rem; margin-bottom: 25px; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; }
        
        .course-wrap { margin-bottom: 25px; }
        .course-label { font-family: 'Cinzel'; font-size: 0.65rem; color: #444; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        .course-name { font-family: 'Playfair Display'; font-style: italic; font-size: 1.2rem; color: #fff; display: block; }

        /* DOZE & SPECIALITĂȚI */
        .extra-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 60px; }
        .extra-item { border: 1px solid #111; padding: 20px; text-align: center; font-family: 'Cinzel'; font-size: 0.7rem; color: #666; letter-spacing: 2px; }

        .btn-order { display: block; text-align: center; padding: 25px; background: var(--auriu); color: #000; font-family: 'Cinzel'; font-weight: 900; text-decoration: none; margin-top: 60px; letter-spacing: 4px; transition: 0.3s; }
        .btn-order:hover { background: #fff; }

        @media (max-width: 900px) {
            .menu-grid { grid-template-columns: 1fr; }
            .price-item { display: block; margin: 15px 0; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html" class="brand-logo"><img src="images/logo1.svg" alt="Metanoia"></a>
        <a href="index.html" style="color:var(--auriu); font-family:'Cinzel'; text-decoration:none; font-size:0.7rem; letter-spacing:2px;">← HUB</a>
    </header>

    <main class="menu-section">
        <h2 class="section-title">MENIUL GOSPODĂRIEI</h2>

        <div class="price-banner">
            <div class="price-item">PREȚ FIX MENIU: <span id="pret-meniu" class="price-val">-- RON</span></div>
            <div class="price-item">ABONAMENT (5 ZILE): <span id="pret-abonament" class="price-val">-- RON</span></div>
        </div>

        <div class="menu-grid">
            <div class="card">
                <h3>Mic Dejun</h3>
                <div id="mic-dejun" class="course-name" style="font-size: 1rem; color: #aaa; font-weight: 200;">Se încarcă rânduiala...</div>
            </div>

            <div class="card">
                <h3>Meniul Zilei</h3>
                <div class="course-wrap">
                    <span class="course-label">Ciorbă / Supă</span>
                    <span id="ciorba" class="course-name">--</span>
                </div>
                <div class="course-wrap">
                    <span class="course-label">Fel Principal</span>
                    <span id="fel-principal" class="course-name">--</span>
                </div>
                <div class="course-wrap">
                    <span class="course-label">Desert</span>
                    <span id="desert" class="course-name">--</span>
                </div>
            </div>
        </div>

        <div class="extra-grid">
            <div class="extra-item">CAFEA DOZĂ / 18 RON</div>
            <div class="extra-item">LIMONADĂ DOZĂ / 15 RON</div>
            <div class="extra-item">APĂ CU AROME / 12 RON</div>
            <div class="extra-item">SPECIALITATEA CASEI / 22 RON</div>
        </div>

        <a href="https://www.paypal.com/ncp/payment/MH54VF92TC364" class="btn-order">COMANDĂ COȘUL METANOIA</a>
    </main>

    <script>
        // Legătura cu Pipeline-ul din Make
        async function actualizeazaMeniul() {
            try {
                // Înlocuiește cu URL-ul Webhook-ului tău din Make
                const response = await fetch('URL_WEBHOOK_MAKE'); 
                const data = await response.json();
                
                // Mapare exactă pe structura ta din Google Sheet
                document.getElementById('mic-dejun').innerText = data["Mic Dejun"];
                document.getElementById('ciorba').innerText = data["Ciorba"];
                document.getElementById('fel-principal').innerText = data["Fel Principal"];
                document.getElementById('desert').innerText = data["Desert"];
                document.getElementById('pret-meniu').innerText = data["Pret Meniu"] + " RON";
                document.getElementById('pret-abonament').innerText = data["Pret Abonament"] + " RON";
            } catch (error) {
                console.log("Rânduiala necesită verificare manuală.");
            }
        }
        window.onload = actualizeazaMeniul;
    </script>
</body>
</html>
