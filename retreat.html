<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metanoia Retreat | Hațeg Alternativ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --auriu-gold: #ffd700; 
            --negru-pur: #000000; 
            --alb: #ffffff;
            --gri-text: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        a, a:visited, a:hover, a:active { text-decoration: none !important; color: inherit !important; }

        body { background: var(--negru-pur); color: var(--alb); font-family: 'Inter', sans-serif; line-height: 1.8; overflow-x: hidden; }

        /* HEADER & LOGO */
        .site-header { position: relative; width: 100%; z-index: 9999; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .brand svg { height: 70px; width: auto; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
        
        .burger { cursor: pointer; z-index: 10000; padding: 10px; }
        .burger div { width: 25px; height: 2px; background: var(--auriu-gold); margin: 5px; transition: 0.3s; }

        .main-nav { 
            position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; 
            background: rgba(0,0,0,0.98); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: 0.5s ease; z-index: 9500; 
        }
        .main-nav.active { right: 0; }
        .main-nav a { font-family: 'Cinzel'; font-size: 1.5rem; letter-spacing: 4px; margin: 15px 0; color: var(--alb) !important; }

        /* HERO RETREAT */
        .hero-retreat { 
            height: 70vh; width: 100%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('images/hero-camp-munti.jpg'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero-retreat span { font-family: 'Cinzel'; color: var(--auriu-gold); letter-spacing: 5px; font-size: 0.8rem; }
        .hero-retreat h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 5rem); font-style: italic; margin-top: 10px; }

        /* CONTENT */
        .content-section { max-width: 900px; margin: 0 auto; padding: 80px 20px; text-align: center; }
        .content-section h2 { font-family: 'Cinzel'; color: var(--auriu-gold); letter-spacing: 3px; margin-bottom: 30px; font-size: 1.5rem; }
        .content-section p { font-size: 1.2rem; color: #d0d0d0; font-weight: 300; margin-bottom: 40px; font-style: italic; }

        /* GALLERY GRID */
        .gallery-retreat { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .gallery-retreat img { width: 100%; height: 400px; object-fit: cover; border: 1px solid #1a1a1a; transition: 0.4s; }
        .gallery-retreat img:hover { border-color: var(--auriu-gold); }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid #1a1a1a; opacity: 0.4; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 5px; color: var(--auriu-gold); }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html" class="brand">
            <svg viewBox="0 0 800 800">
                <defs><linearGradient id="mtnGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#ffd700;stop-opacity:1"/><stop offset="100%" style="stop-color:#b8860b;stop-opacity:1"/></linearGradient></defs>
                <circle cx="400" cy="280" r="105" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.4"/>
                <path d="M300 450 L400 250 L500 450 Z" fill="url(#mtnGrad)"/>
                <text x="400" y="765" font-family="'Cinzel', serif" text-anchor="middle" font-size="45" font-weight="900" letter-spacing="2" fill="#ffd700">HAȚEG ALTERNATIV</text>
            </svg>
        </a>
        <div class="burger" id="burger"><div></div><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">ACASĂ</a>
            <a href="pensiune.html">PENSIUNEA</a>
            <a href="retreat.html" style="color: var(--auriu-gold) !important;">METANOIA</a>
            <a href="gastronomie.html">GASTRONOMIE</a>
            <a href="forum.html">JURNAL</a>
        </nav>
    </header>

    <section class="hero-retreat">
        <span>EXPERIENȚA METANOIA</span>
        <h1>Tăcerea Munților.</h1>
    </section>

    <main class="content-section">
        <h2>SCHIMBAREA MINȚII</h2>
        <p>"Metanoia nu este doar un retreat, este o întoarcere la esență. Sus, unde cerul atinge crestele, învățăm să lăsăm zgomotul lumii în urmă și să ascultăm rânduiala tăcerii."</p>
    </main>

    <section class="gallery-retreat">
        <img src="images/hero-camp-munti.jpg" alt="Camp Metanoia">
        <img src="images/rasarit.jpg" alt="Răsărit în munte">
        <img src="images/narcise.jpg" alt="Natură sălbatică">
    </section>

    <footer>HAȚEG ALTERNATIV &copy; 2026</footer>

    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true; s1.src='https://embed.tawk.to/642944b54247f20fefea97df/1gsvek60a';
            s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>

    <script>
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        burger.addEventListener('click', () => {
            nav.classList.toggle('active');
        });
    </script>
</body>
</html>
