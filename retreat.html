<head>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --auriu-gold: #ffd700; 
            --negru-pur: #0a0a0a; 
            --alb: #ffffff;
            --overlay-card: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.85) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru-pur); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .brand svg { height: 100px; width: auto; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
        .burger { cursor: pointer; z-index: 10000; padding: 10px; }
        .burger div { width: 35px; height: 2px; background: var(--auriu-gold); margin: 8px; }

        /* NAV */
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); z-index: 9500; }
        .main-nav.active { right: 0; }
        .main-nav a { text-decoration: none; color: #fff; font-size: 2.5rem; font-family: 'Cinzel'; margin: 15px 0; letter-spacing: 5px; opacity: 0.7; transition: 0.3s; }
        .main-nav a:hover { opacity: 1; color: var(--auriu-gold); }

        /* HERO */
        .hero-sub { height: 70vh; position: relative; display: flex; align-items: center; justify-content: center; background: url('images/apus.jpg') center/cover; }
        .hero-sub::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .hero-content { position: relative; z-index: 10; text-align: center; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 8vw, 7rem); font-style: italic; color: var(--auriu-gold); text-shadow: 0 5px 20px rgba(0,0,0,0.8); }

        /* CONTENT SECTION */
        .experience-details { padding: 100px 50px; max-width: 1000px; margin: 0 auto; text-align: center; }
        .experience-details h2 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--auriu-gold); letter-spacing: 10px; margin-bottom: 30px; }
        .experience-details p { font-family: 'Playfair Display'; font-size: clamp(1.5rem, 3vw, 2.5rem); font-style: italic; line-height: 1.4; margin-bottom: 50px; }

        /* GRILA IMAGINI (Vibe-ul retreat-ului) */
        .grid-vibe { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 0 50px 100px; max-width: 1400px; margin: 0 auto; }
        .img-item { height: 400px; background-size: cover; background-position: center; border: 1px solid #222; transition: 0.5s; }
        .img-item:hover { border-color: var(--auriu-gold); transform: scale(1.02); }

        /* FORUM REZERVARE (Mutat Jos) */
        .forum-section { padding: 100px 50px; background: #080808; border-top: 1px solid #1a1a1a; }
        .forum-container { max-width: 700px; margin: 0 auto; }
        .forum-container h2 { font-family: 'Cinzel'; font-size: 1.8rem; color: var(--auriu-gold); text-align: center; margin-bottom: 40px; letter-spacing: 5px; }
        .forum-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .forum-form input, .forum-form select, .forum-form textarea { background: #000; border: 1.5px solid #333; padding: 18px; color: #fff; font-family: 'Inter', sans-serif; outline: none; transition: 0.3s; }
        .forum-form input:focus, .forum-form select:focus, .forum-form textarea:focus { border-color: var(--auriu-gold); }
        .forum-form textarea { grid-column: span 2; }
        .forum-form button { grid-column: span 2; cursor: pointer; }

        .btn-gold { display: inline-block; padding: 15px 40px; border: 1.5px solid var(--auriu-gold); color: var(--auriu-gold); text-decoration: none; font-family: 'Cinzel'; letter-spacing: 3px; font-size: 0.8rem; transition: 0.4s; background: transparent; text-align: center; }
        .btn-gold:hover { background: var(--auriu-gold); color: #000; }

        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background-color: #25d366; color: #FFF; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 10000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        footer { padding: 60px; text-align: center; opacity: 0.4; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .forum-form { grid-template-columns: 1fr; }
            .forum-form textarea, .forum-form button { grid-column: 1; }
            .site-header { padding: 20px; }
            .grid-vibe { padding: 20px; }
        }
    </style>
</head>
