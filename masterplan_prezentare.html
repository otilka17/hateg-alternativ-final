<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Metanoia Boutique - Pitch Strategic</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital@0;1&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* CSS-ul tău stilizat pentru Metanoia Boutique + Logica schemei interactive */
        :root { --hermes-orange: #E65527; --luxury-gold: #C5A059; --soft-cream: #FDFCF0; }
        body { background: #000; color: #111; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Schema Interactivă (Modelul din Screenshot) */
        .schema-container { display: flex; gap: 15px; margin: 30px 0; }
        .pas { width: 200px; background: var(--soft-cream); border: 2px solid var(--luxury-gold); padding: 20px; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; }
        .pas:hover { border-color: var(--hermes-orange); transform: scale(1.05); }
        .pas h3 { color: var(--luxury-gold); font-family: 'Bodoni Moda'; }
        
        .slide-container { width: 1000px; height: 600px; background: var(--soft-cream); padding: 50px; position: relative; border-top: 10px solid var(--hermes-orange); }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--soft-cream); padding: 40px; max-width: 600px; border: 3px solid var(--luxury-gold); text-align: center; }
    </style>
</head>
<body>

<h1>Metanoia Boutique</h1>

<div class="schema-container">
    <div class="pas" onclick="openModal('Managementul Timpului', 'Livrări precise din Totești. Standarde Nespresso pentru eficiență.')">
        <h3>01. Timp</h3>
    </div>
    <div class="pas" onclick="openModal('Idei Inovatoare', '80% ingrediente proprii. Slow cooking tehnologizat în doze etanșe.')">
        <h3>02. Inovație</h3>
    </div>
    <div class="pas" onclick="openModal('Brainstorming', 'Parteneriate pentru grădinițe și instituții publice fără risipă.')">
        <h3>03. Consultanță</h3>
    </div>
    <div class="pas" onclick="openModal('Succes', 'Investiție 65.000 RON pentru Hub Gastronomic ISHO Timișoara.')">
        <h3>04. Succes</h3>
    </div>
</div>

<div class="slide-container">
    <h2>Strategia de Business</h2>
    <p>Aceasta este arhitectura rânduielii tale. Apasă pe pașii de sus pentru a vedea detaliile fiecărei etape.</p>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content">
        <h2 id="m-title" style="color: var(--hermes-orange);"></h2>
        <p id="m-text" style="font-size: 1.2rem;"></p>
    </div>
</div>

<script>
    function openModal(t, txt) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-text').innerText = txt;
        document.getElementById('modal').style.display = 'flex';
    }
</script>

</body>
</html>
