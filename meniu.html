<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Meniu Hațeg Alternativ | Prezentare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter'; }
        .lux-card { border: 1px solid #1a1a1a; background: #050505; transition: 0.3s; }
        .gold { color: #c5a059; }
        .page { display: none; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl italic font-serif text-center mb-10 gold">Meniu Săptămânal</h1>
        
        <div id="container-zile">
            <script>
                // Aici stocăm meniul tău. Editezi o singură dată și totul se actualizează.
                const meniu = [
                    { zi: "LUNI", fel1: "Ciorbă de găină cu tăieței", calorii1: "150 kcal", p1: "12g", g1: "5g", fel2: "Tocăniță de porc", calorii2: "650 kcal", p2: "45g", g2: "25g", img: "romanian-food" },
                    { zi: "MARȚI", fel1: "Ciorbă de văcuță", calorii1: "180 kcal", p1: "15g", g1: "6g", fel2: "Pulpă de pui la ceaun", calorii2: "580 kcal", p2: "48g", g2: "20g", img: "roasted-chicken" },
                    { zi: "MIERCURI", fel1: "Supă cremă de legume", calorii1: "120 kcal", p1: "5g", g1: "3g", fel2: "Mușchiuleț grătar", calorii2: "450 kcal", p2: "42g", g2: "10g", img: "grilled-meat" },
                    { zi: "JOI", fel1: "Ciorbă rădăuțeană", calorii1: "220 kcal", p1: "18g", g1: "9g", fel2: "Sărmăluțe în varză", calorii2: "620 kcal", p2: "35g", g2: "30g", img: "cabbage-rolls" },
                    { zi: "VINERI", fel1: "Ciorbă de burtă", calorii1: "250 kcal", p1: "20g", g1: "12g", fel2: "Pui cu smântână", calorii2: "550 kcal", p2: "40g", g2: "22g", img: "tripe-soup" }
                ];

                meniu.forEach((m, index) => {
                    document.write(`
                        <div id="page-${index + 1}" class="page ${index === 0 ? 'active' : ''}">
                            <div class="lux-card p-8">
                                <h2 class="text-3xl text-gold mb-8 font-cinzel italic">${m.zi}</h2>
                                <img src="https://source.unsplash.com/800x400/?${m.img}" class="w-full h-64 object-cover mb-8 grayscale hover:grayscale-0 transition">
                                
                                <div class="space-y-6">
                                    <div class="flex justify-between border-b border-[#1a1a1a] pb-4">
                                        <div><h3 class="font-bold">${m.fel1}</h3><p class="text-[10px] uppercase text-gray-500">Gramaj: 400g</p></div>
                                        <div class="text-[10px] text-right uppercase gold">${m.calorii1} | ${m.p1} Proteine | ${m.g1} Grăsimi</div>
                                    </div>
                                    <div class="flex justify-between border-b border-[#1a1a1a] pb-4">
                                        <div><h3 class="font-bold">${m.fel2}</h3><p class="text-[10px] uppercase text-gray-500">Gramaj: 300g</p></div>
                                        <div class="text-[10px] text-right uppercase gold">${m.calorii2} | ${m.p2} Proteine | ${m.g2} Grăsimi</div>
                                    </div>
                                </div>
                                <a href="rezervare.html?zi=${m.zi}&pret=40" class="block mt-10 text-center border border-gold py-4 text-gold hover:bg-gold hover:text-black transition uppercase text-xs tracking-widest font-bold">
                                    COMANDĂ PENTRU ${m.zi}
                                </a>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="flex justify-center gap-4 mt-10">
            <button class="border border-gold px-8 py-3 text-gold hover:bg-gold hover:text-black uppercase text-xs" onclick="schimbaZi(-1)">ÎNAPOI</button>
            <button class="border border-gold px-8 py-3 text-gold hover:bg-gold hover:text-black uppercase text-xs" onclick="schimbaZi(1)">ZIUA URMĂTOARE</button>
        </div>
    </div>

    <script>
        let pag = 1;
        function schimbaZi(step) {
            document.getElementById('page-' + pag).classList.remove('active');
            pag += step;
            if(pag > 5) pag = 1;
            if(pag < 1) pag = 5;
            document.getElementById('page-' + pag).classList.add('active');
        }
    </script>
</body>
</html>
