<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metanoia | Meniul Gospodăriei</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #f9f9f9; font-family: 'Inter', sans-serif; }
        .auriu { color: #c5a059; }
        .bg-auriu { background-color: #c5a059; }
        .card-gastro { border: 1px solid #1a1a1a; background: #050505; padding: 40px; }
        .btn-comanda { background: #c5a059; color: #000; padding: 20px 40px; font-family: 'Cinzel'; font-weight: 900; text-transform: uppercase; transition: 0.4s; display: inline-block; }
        .btn-comanda:hover { background: #fff; transform: translateY(-3px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="flex justify-between items-center mb-16">
        <a href="index.html" class="font-cinzel text-2xl font-black text-[#c5a059] tracking-[5px]">METANOIA</a>
        <a href="index.html" class="text-xs tracking-widest text-gray-500 hover:text-[#c5a059]">← ÎNAPOI</a>
    </header>

    <main class="max-w-4xl mx-auto">
        <h1 id="titlu-meniu" class="text-4xl italic font-playfair mb-10 text-center">Se încarcă meniul...</h1>

        <div class="card-gastro mb-10">
            <div class="space-y-6 text-center">
                <div><span class="text-[10px] text-gray-500 uppercase tracking-widest">Mic Dejun</span><div id="mic-dejun" class="text-xl italic mt-1">-</div></div>
                <div><span class="text-[10px] text-gray-500 uppercase tracking-widest">Ciorbă</span><div id="ciorba" class="text-xl italic mt-1">-</div></div>
                <div><span class="text-[10px] text-gray-500 uppercase tracking-widest">Fel Principal</span><div id="fel-principal" class="text-xl italic mt-1">-</div></div>
                <div><span class="text-[10px] text-gray-500 uppercase tracking-widest">Desert</span><div id="desert" class="text-xl italic mt-1">-</div></div>
            </div>
        </div>

        <div class="bg-[#050505] p-8 border border-[#1a1a1a] text-center">
            <div class="mb-6">
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Număr porții:</label>
                <input type="number" id="qty-input" value="1" min="1" onchange="updateLink()" class="bg-[#111] border border-[#333] text-white p-3 w-20 text-center">
            </div>
            <a id="btn-comanda" href="#" class="btn-comanda">ACHITĂ 1 PORȚIE</a>
        </div>
    </main>

    <script>
        let pretBaza = 85; // Prețul standard al meniului

        async function incarcaMeniul() {
            try {
                const response = await fetch('https://hook.eu1.make.com/0z9yl1g4qy7ej57zlqpm8cp8o9mczvxj'); 
                const data = await response.json();
                
                let targetDate = new Date();
                if (targetDate.getDay() === 0) targetDate.setDate(targetDate.getDate() + 1); // Duminică -> Luni
                if (targetDate.getDay() === 6) targetDate.setDate(targetDate.getDate() + 2); // Sâmbătă -> Luni
                
                const numeZi = targetDate.toLocaleDateString('ro-RO', { weekday: 'long' });
                const zi = numeZi.charAt(0).toUpperCase() + numeZi.slice(1);
                const dataFormatata = targetDate.toLocaleDateString('ro-RO');

                document.getElementById('titlu-meniu').innerText = `Meniul pentru ${zi} (${dataFormatata})`;
                
                if (data[zi]) {
                    const m = data[zi];
                    document.getElementById('mic-dejun').innerText = m["Mic Dejun"];
                    document.getElementById('ciorba').innerText = m["Ciorba"];
                    document.getElementById('fel-principal').innerText = m["Fel Principal"];
                    document.getElementById('desert').innerText = m["Desert"];
                    pretBaza = parseInt(m["Pret"] || 85);
                    updateLink();
                }
            } catch (e) {
                document.getElementById('titlu-meniu').innerText = "Meniul se pregătește...";
            }
        }

        function updateLink() {
            const cant = document.getElementById('qty-input').value;
            const total = pretBaza * cant;
            const btn = document.getElementById('btn-comanda');
            btn.innerText = `ACHITĂ ${cant} PORȚII (${total} RON)`;
            // Link-ul PayPal cu suma calculată
            btn.href = `https://www.paypal.com/ncp/payment/MH54VF92TC364?amount=${total}`;
        }

        window.onload = incarcaMeniul;
    </script>
</body>
</html>
