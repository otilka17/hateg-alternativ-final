<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Hațeg Alternativ | Meniu Săptămânal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .active { display: block; }
        .lux-card { border: 1px solid #1a1a1a; background: #000; padding: 20px; margin-bottom: 20px; }
        .gold { color: #c5a059; }
        .nav-btn { cursor: pointer; border: 1px solid #c5a059; padding: 12px 24px; color: #c5a059; font-family: 'Cinzel'; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .nav-btn:hover { background: #c5a059; color: #000; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-4xl italic font-serif text-center mb-10 gold">Rânduiala Săptămânală</h1>

        <div id="container-zile">
            <script>
                const zile = ["Luni", "Marti", "Miercuri", "Joi", "Vineri"];
                zile.forEach((zi, index) => {
                    document.write(`
                        <div id="page-${index + 1}" class="page ${index === 0 ? 'active' : ''}">
                            <h2 class="text-3xl text-gold mb-6 font-cinzel italic">${zi}</h2>
                            <div class="lux-card">
                                <h3 class="text-xl font-bold italic mb-2">Mic Dejun</h3>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-[10px] text-gray-400 uppercase">
                                    <span>Gramaj: 180g</span> <span>Calorii: 310 kcal</span> <span>Proteine: 22g</span> <span>Grăsimi: 11g</span>
                                </div>
                            </div>
                            <div class="lux-card">
                                <h3 class="text-xl font-bold italic mb-2">Prânz (Fel 1 + 2)</h3>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-[10px] text-gray-400 uppercase">
                                    <span>Gramaj: 400g</span> <span>Calorii: 650 kcal</span> <span>Proteine: 45g</span> <span>Grăsimi: 25g</span>
                                </div>
                            </div>
                            <div class="mt-8 p-6 border-gold border text-center">
                                <p class="text-xl font-serif italic mb-4">Total: 40 RON</p>
                                <a href="rezervare.html?zi=${zi}&pret=40" class="block w-full bg-[#c5a059] text-black font-bold py-4 uppercase tracking-widest hover:bg-white">
                                    COMANDĂ PENTRU ${zi.toUpperCase()}
                                </a>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="flex justify-center gap-4 mt-10">
            <button class="nav-btn" onclick="schimbaZi(-1)">← ZIUA ANTERIOARĂ</button>
            <button class="nav-btn" onclick="schimbaZi(1)">ZIUA URMĂTOARE →</button>
        </div>
    </div>

    <script>
        let pagCurenta = 1;
        function schimbaZi(step) {
            document.getElementById('page-' + pagCurenta).classList.remove('active');
            pagCurenta += step;
            if(pagCurenta > 5) pagCurenta = 1;
            if(pagCurenta < 1) pagCurenta = 5;
            document.getElementById('page-' + pagCurenta).classList.add('active');
        }
    </script>
</body>
</html>
