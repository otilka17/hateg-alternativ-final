<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meniu Săptămânal · Metanoia · Hațeg Alternativ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,300;1,300&family=Karla:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --v1:#1e3d1a; --v2:#2d5a27; --v3:#4a7c3f; --v4:#7aaa6a; --v5:#d4edcc;
  --c1:#faf5ec; --c2:#f2e8d0; --c3:#e8d5b0;
  --t1:#c4622d; --t2:#e07840; --t3:#f5a06a; --t4:#fde8d8;
  --e1:#1e1108; --e2:#2e1a0a; --e3:#5c3517; --e4:#a0622a;
  --tx1:#1a1208; --tx2:#3d2e1a; --tx3:#7a6048; --tx4:rgba(26,18,8,.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Karla',sans-serif;background:var(--c1);color:var(--tx1);overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--v2)}

/* ── NAV ── */
.nav{
  background:var(--e1);
  border-bottom:2px solid var(--v2);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:64px;
  position:sticky;top:0;z-index:100;
}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:38px;height:38px}
.nav-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.nav-sub{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:1px}
.nav-back{
  background:var(--v2);color:#fff;border:none;
  padding:8px 18px;font-family:'Karla',sans-serif;
  font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:background .2s;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-back:hover{background:var(--v3)}

/* ── HEADER ── */
.pg-header{
  background:linear-gradient(150deg,var(--v1) 0%,#2d4a20 60%,var(--e2) 100%);
  padding:48px 5% 40px;
  position:relative;overflow:hidden;
}
.pg-header::before{
  content:'MENIU';
  position:absolute;right:-1%;top:50%;transform:translateY(-50%);
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(80px,15vw,180px);
  color:rgba(255,255,255,.04);pointer-events:none;
}
.pg-tag{font-size:.62rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--v4);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.pg-tag::before{content:'';width:20px;height:2px;background:var(--t2)}
.pg-title{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(2rem,4vw,3.2rem);color:#fff;line-height:1.05;margin-bottom:10px}
.pg-title em{font-style:italic;color:var(--t3)}
.pg-desc{font-family:'Source Serif 4',serif;font-style:italic;font-size:.98rem;color:rgba(255,255,255,.55);max-width:560px;line-height:1.7}

/* ── CONTROLS ── */
.controls{
  background:var(--c2);
  border-bottom:2px solid var(--c3);
  padding:20px 5%;
  display:flex;flex-direction:column;gap:12px;
  position:sticky;top:64px;z-index:99;
}
.ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl-lbl{font-size:.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);white-space:nowrap;min-width:80px}
.tab-row{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1}
.tab-row::-webkit-scrollbar{display:none}
.tab{
  padding:7px 16px;cursor:pointer;
  font-family:'Karla',sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;white-space:nowrap;
  border:2px solid var(--c3);background:transparent;color:var(--tx3);
  transition:all .15s;
}
.tab.w-on{background:var(--e1);color:var(--t3);border-color:var(--e1)}
.tab.d-on{background:var(--v2);color:#fff;border-color:var(--v2)}
.tab:hover:not(.w-on):not(.d-on){background:var(--c1);border-color:var(--v3)}
.kp{
  padding:6px 14px;cursor:pointer;
  font-family:'Karla',sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  border:2px solid var(--c3);background:transparent;color:var(--tx3);
  transition:all .15s;
}
.kp.on{background:var(--t1);color:#fff;border-color:var(--t1)}
.kp:hover:not(.on){border-color:var(--t1);color:var(--t1)}

/* ── DAY SUMMARY BAR ── */
.day-summary{
  background:var(--e1);
  padding:14px 5%;
  display:flex;align-items:center;gap:0;flex-wrap:wrap;
}
.ds-item{
  display:flex;flex-direction:column;align-items:center;
  padding:0 20px;border-right:1px solid rgba(255,255,255,.08);
}
.ds-item:last-child{border-right:none}
.ds-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--t3);line-height:1}
.ds-lbl{font-size:.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:2px}
.ds-note{margin-left:auto;font-family:'Source Serif 4',serif;font-style:italic;font-size:.82rem;color:rgba(255,255,255,.35)}

/* ── MEAL GRID ── */
.meals-wrap{padding:28px 5% 60px;display:flex;flex-direction:column;gap:16px}
.meal-card{
  background:#fff;border:2px solid var(--c3);
  overflow:hidden;transition:all .2s;
}
.meal-card:hover{border-color:var(--v3);box-shadow:0 6px 24px rgba(30,61,26,.08)}

.meal-header{
  display:flex;align-items:stretch;
  border-bottom:2px solid var(--c3);
}
.meal-time-col{
  width:90px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 8px;
  border-right:2px solid var(--c3);
}
.meal-emoji{font-size:2rem;margin-bottom:6px}
.meal-time{font-size:.6rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx4);text-align:center}
.meal-type-col{
  flex:1;padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
}
.meal-type{font-size:.65rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--v3)}
.meal-name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--tx1);margin-top:2px}
.meal-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge-vacuum{
  background:var(--v5);color:var(--v1);
  font-size:.55rem;font-weight:800;letter-spacing:1.5px;
  padding:3px 9px;text-transform:uppercase;
}
.badge-capsat{
  background:var(--t4);color:var(--t1);
  font-size:.55rem;font-weight:800;letter-spacing:1.5px;
  padding:3px 9px;text-transform:uppercase;
}

.meal-body{display:grid;grid-template-columns:1fr auto}
.meal-main{padding:16px 20px;border-right:2px solid var(--c3)}
.meal-desc{
  font-family:'Source Serif 4',serif;font-style:italic;
  font-size:.9rem;color:var(--tx3);line-height:1.65;margin-bottom:14px;
}

/* MACRO TABLE */
.macro-table{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:1px;background:var(--c3);border:2px solid var(--c3);
  margin-bottom:14px;
}
.mt-cell{background:var(--c1);padding:8px 6px;text-align:center}
.mt-val{font-size:.88rem;font-weight:800;line-height:1}
.mt-lbl{font-size:.52rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx4);margin-top:2px}
.mt-kcal .mt-val{color:var(--t1)}
.mt-gr   .mt-val{color:var(--tx2)}
.mt-prot .mt-val{color:var(--v2)}
.mt-carb .mt-val{color:var(--e3)}
.mt-fat  .mt-val{color:var(--e4)}

/* PAIRING */
.pair{
  background:var(--e1);padding:12px 16px;
  display:flex;align-items:center;gap:12px;
}
.pair-ico{font-size:1.3rem}
.pair-info{flex:1}
.pair-name{font-size:.78rem;font-weight:700;color:var(--t3)}
.pair-sub{font-size:.66rem;color:rgba(255,255,255,.3);margin-top:1px}
.pair-int{display:flex;gap:3px}
.di{width:6px;height:6px;border-radius:50%}

/* meal side — price / order */
.meal-side{
  width:140px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 16px;gap:10px;
}
.meal-price{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--t1);line-height:1}
.meal-price-sub{font-size:.6rem;color:var(--tx4);text-align:center;margin-top:2px}
.meal-btn{
  width:100%;background:var(--v2);color:#fff;border:none;
  padding:10px;font-family:'Karla',sans-serif;
  font-size:.65rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:background .2s;
}
.meal-btn:hover{background:var(--v1)}
.meal-btn-sec{background:transparent;color:var(--v2);border:2px solid var(--v2)}
.meal-btn-sec:hover{background:var(--v2);color:#fff}

/* ── NAVIGARE ZIUA ── */
.day-nav{
  background:var(--c2);border-top:2px solid var(--c3);
  padding:20px 5%;
  display:flex;align-items:center;justify-content:space-between;
}
.day-nav-btn{
  background:var(--e1);color:var(--t3);border:none;
  padding:12px 28px;font-family:'Karla',sans-serif;
  font-size:.72rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;
}
.day-nav-btn:hover{background:var(--v1);color:#fff}
.day-nav-info{text-align:center}
.day-nav-name{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--tx1)}
.day-nav-date{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--tx4);margin-top:2px}

/* ── DESKTOP ONLY COLUMNS ── */
@media(max-width:768px){
  .meal-body{grid-template-columns:1fr}
  .meal-main{border-right:none;border-bottom:2px solid var(--c3)}
  .meal-side{width:100%;flex-direction:row;justify-content:space-between;padding:14px 16px}
  .macro-table{grid-template-columns:repeat(3,1fr)}
  .controls{top:0}
  .day-summary{gap:0}
  .ds-note{display:none}
  .nav{position:relative}
}
</style>
</head>

const PLANURI = [1000, 1500, 2000, 2500];
const PLAN_IDX = { 1000:0, 1500:1, 2000:2, 2500:3 };

let ziCurenta = 0;
let planCurent = 1500;

// Randare dot intensitate
function dots(int) {
  let h = '';
  for(let i=0;i<5;i++){
    const on = i < int ? 'background:var(--t3)' : 'background:rgba(255,255,255,.12)';
    h += `<div class="di" style="${on}"></div>`;
  }
  return h;
}

function render() {
  const zi = MENIU[ziCurenta];
  const pidx = PLAN_IDX[planCurent];

  // Calculează totaluri zi
  let totKcal=0, totProt=0, totCarb=0, totFat=0;
  zi.mese.forEach(m => {
    const v = m.variante[pidx];
    totKcal += v.kcal; totProt += v.prot;
    totCarb += v.carb; totFat += v.fat;
  });

  // Summary bar
  document.getElementById('daySummary').innerHTML = `
    <div class="ds-item"><div class="ds-val">${totKcal}</div><div class="ds-lbl">kcal total</div></div>
    <div class="ds-item"><div class="ds-val">${totProt}g</div><div class="ds-lbl">proteine</div></div>
    <div class="ds-item"><div class="ds-val">${totCarb}g</div><div class="ds-lbl">carbohidrați</div></div>
    <div class="ds-item"><div class="ds-val">${totFat}g</div><div class="ds-lbl">grăsimi</div></div>
    <div class="ds-item"><div class="ds-val">5</div><div class="ds-lbl">mese/zi</div></div>
    <span class="ds-note">📅 ${zi.zi} · ${DATES[ziCurenta]} · Plan ${planCurent} kcal</span>
  `;

  // Meal cards
  const wrap = document.getElementById('mealsWrap');
  wrap.innerHTML = '';

  zi.mese.forEach(masa => {
    const v = masa.variante[pidx];
    const p = PAIR[v.pair];
    const intVal = p.int;

    const card = document.createElement('div');
    card.className = 'meal-card';
    card.innerHTML = `
      <div class="meal-header">
        <div class="meal-time-col">
          <div class="meal-emoji">${masa.emoji}</div>
          <div class="meal-time">${masa.ora}</div>
        </div>
        <div class="meal-type-col">
          <div>
            <div class="meal-type">${masa.tip}</div>
            <div class="meal-name">${v.name}</div>
          </div>
          <div class="meal-badges">
            <span class="${masa.ambalaj === 'vacuum' ? 'badge-vacuum' : 'badge-capsat'}">
              ${masa.ambalaj === 'vacuum' ? '🫙 Vacuum' : '📦 Capsată'}
            </span>
          </div>
        </div>
      </div>
      <div class="meal-body">
        <div class="meal-main">
          <p class="meal-desc">${v.desc}</p>
          <div class="macro-table">
            <div class="mt-cell mt-kcal">
              <div class="mt-val">${v.kcal}</div>
              <div class="mt-lbl">kcal</div>
            </div>
            <div class="mt-cell mt-gr">
              <div class="mt-val">${v.gr}g</div>
              <div class="mt-lbl">gramaj</div>
            </div>
            <div class="mt-cell mt-prot">
              <div class="mt-val">${v.prot}g</div>
              <div class="mt-lbl">prot</div>
            </div>
            <div class="mt-cell mt-carb">
              <div class="mt-val">${v.carb}g</div>
              <div class="mt-lbl">carb</div>
            </div>
            <div class="mt-cell mt-fat">
              <div class="mt-val">${v.fat}g</div>
              <div class="mt-lbl">grăs</div>
            </div>
          </div>
          <div class="pair">
            <div class="pair-ico">☕</div>
            <div class="pair-info">
              <div class="pair-name">${p.name}</div>
              <div class="pair-sub">${p.sub}</div>
            </div>
            <div class="pair-int">${dots(intVal)}</div>
          </div>
        </div>
        <div class="meal-side">
          <div>
            <div class="meal-price">${v.pret} lei</div>
            <div class="meal-price-sub">per porție</div>
          </div>
          <button class="meal-btn" onclick="precomanda('${v.name}')">Adaugă →</button>
          <button class="meal-btn meal-btn-sec" onclick="precomanda('${v.name} + ${p.name.split('·')[0].trim()}')">+ Cafea</button>
        </div>
      </div>
    `;
    wrap.appendChild(card);
  });

  // Day nav
  document.getElementById('dayNavName').textContent = zi.zi;
}

function precomanda(produs) {
  const msg = 'Buna ziua! Vreau sa comand: ' + produs + ' pentru ' + ZILE[ziCurenta];
  window.open('https://wa.me/40749229686?text=' + encodeURIComponent(msg), '_blank');
}

// Week tabs
document.querySelectorAll('#wTabs .tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('#wTabs .tab').forEach(function(x){ x.classList.remove('w-on'); });
    t.classList.add('w-on');
  });
});

// Day tabs
document.querySelectorAll('#dTabs .tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('#dTabs .tab').forEach(function(x){ x.classList.remove('d-on'); });
    t.classList.add('d-on');
    ziCurenta = parseInt(t.getAttribute('data-zi'));
    render();
  });
});

// Kcal tabs
document.querySelectorAll('.kp').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.kp').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on');
    planCurent = parseInt(b.getAttribute('data-plan'));
    render();
  });
});

// Nav buttons
document.getElementById('btnPrev').addEventListener('click', function() {
  ziCurenta = (ziCurenta - 1 + 7) % 7;
  document.querySelectorAll('#dTabs .tab').forEach(function(t, i) {
    t.classList.toggle('d-on', i === ziCurenta);
  });
  render();
});
document.getElementById('btnNext').addEventListener('click', function() {
  ziCurenta = (ziCurenta + 1) % 7;
  document.querySelectorAll('#dTabs .tab').forEach(function(t, i) {
    t.classList.toggle('d-on', i === ziCurenta);
  });
  render();
});

// Init
render();
</script>
