    <title>Hațeg Alternativ | Portal Hub Turistic</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --auriu: #c5a059; --negru: #050505; --portocaliu: #e65100; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none !important; color: inherit !important; outline: none; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo img { height: clamp(70px, 12vw, 100px); width: auto; filter: drop-shadow(0 0 20px rgba(0,0,0,1)); }
        
        .burger { cursor: pointer; z-index: 10001; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid var(--auriu); }
        .burger div { width: 28px; height: 2px; background: var(--auriu); margin: 6px; }

        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 12px 0; letter-spacing: 4px; text-transform: uppercase; }
        .nav-res-btn { border: 2px solid var(--auriu); padding: 10px 35px; margin-top: 20px !important; color: var(--auriu) !important; font-weight: 900; }

        .hero { 
            height: 100vh; position: relative; display: flex; align-items: center; justify-content: flex-start; 
            background: linear-gradient(to right, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.3) 100%), url('images/rasarit.jpg') center/cover no-repeat;
            padding: 0 10%;
        }
        .hero-content { max-width: 800px; padding-top: 100px; }
        .hero-content h1 { 
            font-family: 'Playfair Display'; font-size: clamp(2.5rem, 6vw, 4.5rem); font-style: italic; 
            line-height: 1.1; margin-bottom: 20px;
            text-shadow: 2px 2px 30px rgba(0,0,0,1);
        }
        .hero-description { color: #ccc; font-size: 1.1rem; margin-bottom: 30px; max-width: 600px; line-height: 1.5; }
        .btn-portal { display: inline-block; padding: 18px 45px; background: var(--portocaliu); color: #fff !important; font-family: 'Cinzel'; font-weight: 700; letter-spacing: 2px; }

        .hub-advisory { background: #080808; border-top: 1px solid var(--auriu); padding: 80px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; align-items: center; }
        .hub-text h3 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 3px; margin-bottom: 20px; font-size: 1.8rem; }
        .hub-text p { color: #aaa; line-height: 1.8; margin-bottom: 30px; }
        .hub-img img { width: 100%; max-height: 450px; object-fit: cover; border: 1px solid var(--auriu); padding: 8px; background: #000; }

        .container { max-width: 1450px; margin: 80px auto; padding: 0 20px; }
        .grid-hub { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .card-item { height: 450px; position: relative; overflow: hidden; border: 1px solid #1a1a1a; display: block; }
        .card-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.8s; }
        .card-item:hover img { opacity: 0.8; transform: scale(1.05); }
        .card-info { position: absolute; bottom: 0; padding: 30px; width: 100%; background: linear-gradient(to top, #000 60%, transparent); }
        .card-info h4 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 3px; margin-bottom: 10px; font-size: 1.2rem; }
        .card-info p { font-size: 0.85rem; color: #bbb; font-weight: 200; line-height: 1.5; }

        .event-section { background: #050505; padding: 80px 5%; border-top: 1px solid #111; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1300px; margin: 0 auto; }
        .event-card { border: 1px solid #222; padding: 30px; transition: 0.3s; }
        .event-card:hover { border-color: var(--auriu); }
        .event-card h3 { font-family: 'Playfair Display'; font-style: italic; font-size: 1.8rem; margin-bottom: 10px; color: var(--auriu); }
        .event-card p { color: #888; font-size: 0.9rem; line-height: 1.6; }

        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; border-radius: 50%; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 35px; z-index: 9999; color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

        footer { padding: 80px 20px; text-align: center; border-top: 1px solid #111; background: #000; }
        .footer-logo { height: 60px; margin-bottom: 30px; opacity: 0.8; }
        .footer-legal { margin-bottom: 30px; }
        .footer-legal a { color: #444; margin: 0 10px; font-size: 0.75rem; text-transform: uppercase; font-family: 'Cinzel'; }
        .legal-badges { margin: 40px 0; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
        .legal-badges img { height: 45px; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; }
        .legal-badges img:hover { filter: grayscale(0%); opacity: 1; }
        .tribute { color: var(--auriu); font-weight: 900; margin-top: 40px; font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 5px; opacity: 0.7; }

        @media (max-width: 768px) {
            .hero { justify-content: center; text-align: center; padding: 0 20px; }
            .hero-content { padding-top: 120px; }
        }
    </style>
</head>
