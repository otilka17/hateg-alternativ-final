<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | La Buligă</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --auriu-crem: #c5a059; 
            --negru: #000000; 
            --alb: #ffffff;
            --overlay: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        .header { position: absolute; top: 0; width: 100%; z-index: 1000; padding: 40px; display: flex; justify-content: space-between; align-items: center; }
        .brand svg { height: 120px; width: auto; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.3)); }
        
        .burger { cursor: pointer; z-index: 1001; }
        .burger div { width: 30px; height: 1px; background: var(--auriu-crem); margin: 8px; transition: 0.3s; }

        .nav-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; background: var(--negru); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); }
        .nav-overlay.active { right: 0; }
        .nav-overlay a { font-family: 'Cinzel'; font-size: 2rem; color: var(--alb); text-decoration: none; margin: 20px 0; letter-spacing: 5px; opacity: 0.6; transition: 0.3s; }
        .nav-overlay a:hover { opacity: 1; color: var(--auriu-crem); }

        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .hero-content { position: relative; z-index: 10; text-align: center; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(4rem, 15vw, 12rem); font-style: italic; line-height: 0.8; color: var(--auriu-crem); margin-bottom: 30px; }
        .hero-content p { font-family: 'Cinzel'; font-size: 1.2rem; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 50px; }

        .btn-gold { padding: 20px 50px; border: 1px solid var(--auriu-crem); color: var(--auriu-crem); text-decoration: none; font-family: 'Cinzel'; letter-spacing: 5px; font-size: 0.8rem; transition: 0.5s; display: inline-block; background: transparent; }
        .btn-gold:hover { background: var(--auriu-crem); color: var(--negru); box-shadow: 0 0 30px rgba(197, 160, 89, 0.4); }

        .grid-lux { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); background: var(--negru); }
        .card-lux { height: 80vh; position: relative; display: flex; align-items: flex-end; padding: 80px; background-size: cover; background-position: center; border: 0.5px solid rgba(255,255,255,0.05); transition: 0.8s; overflow: hidden; }
        .card-lux::before { content: ''; position: absolute; inset: 0; background: var(--overlay); opacity: 0.6; transition: 0.5s; }
        .card-lux:hover::before { opacity: 0.9; }
        .card-content { position: relative; z-index: 2; width: 100%; }
        .card-lux h3 { font-family: 'Playfair Display'; font-size: 3.5rem; font-style: italic; margin-bottom: 25px; transform: translateY(20px); transition: 0.5s; }
        .card-lux:hover h3 { transform: translateY(0); }

        footer { padding: 100px 50px; text-align: center; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 5px; color: #444; border-top: 1px solid #111; }

        @media (max-width: 768px) {
            .grid-lux { grid-template-columns: 1fr; }
            .card-lux { height: 60vh; padding: 40px; }
            .card-lux h3 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="brand">
            <svg viewBox="0 0 800 800">
                <circle cx="400" cy="300" r="120" fill="none" stroke="#c5a059" stroke-width="1" opacity="0.3"/>
                <path d="M300 450 L400 250 L500 450" fill="none" stroke="#c5a059" stroke-width="2"/>
                <text x="400" y="700" font-family="'Cinzel'" text-anchor="middle" font-size="42" fill="#c5a059" letter-spacing="15">HAȚEG ALTERNATIV</text>
            </svg>
        </a>
        <div class="burger" id="burger">
            <div></div>
            <div></div>
        </div>
    </header>

    <nav class="nav-overlay" id="nav-links">
        <a href="index.html">ACASĂ</a>
        <a href="experiente.html">EXPERIENȚE</a>
        <a href="experiente.html">TARIFE</a>
        <a href="index.html">CONTACT</a>
    </nav>

    <section class="hero">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="images/hero-bg.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <p>Destinație de Bioreglare</p>
            <h1>Metanoia</h1>
            <a href="experiente.html" class="btn-gold">DESCOPERĂ PACHETELE</a>
        </div>
    </section>

    <div class="grid-lux">
        <div class="card-lux" style="background-image: url('images/sura.jpg');">
            <div class="card-content">
                <h3>RÂNDUIALA</h3>
                <a href="experiente.html" class="btn-gold">VEZI DETALII</a>
            </div>
        </div>

        <div class="card-lux" style="background-image: url('images/IMG_20260330_160344.jpg');">
            <div class="card-content">
                <h3>EXPERIENȚE</h3>
                <a href="experiente.html" class="btn-gold">ALEGE PACHETUL</a>
            </div>
        </div>

        <div class="card-lux" style="background-image: url('images/index-mancare.jpg');">
            <div class="card-content">
                <h3>GASTRONOMIE</h3>
                <a href="experiente.html" class="btn-gold">MENIU BIO</a>
            </div>
        </div>

        <div class="card-lux" style="background-image: url('images/jeep.jpg');">
            <div class="card-content">
                <h3>REZERVARE</h3>
                <a href="experiente.html" class="btn-gold">CONTACTEAZĂ-NE</a>
            </div>
        </div>
    </div>

    <footer>HAȚEG ALTERNATIV &copy; 2026 | TRIBUT PATRICIA</footer>

        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();

            s1.async=true; s1.src='https://embed.tawk.to/65c5607435e8d61c3a875f21/1hklg1i9s';
            s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');

        // MENU BURGER
        const burger = document.getElementById('burger');

            });
        }
    </script>
</body>
</html>
