<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
    (function() { 
        emailjs.init("KfAXAcZDiuFeeFZzj"); 
    })();

    document.getElementById('membership-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        const emailInput = document.getElementById('member-email');
        const msg = document.getElementById('form-msg');
        
        btn.innerText = "TRIMITERE...";
        btn.disabled = true;

        const templateParams = {
            name: emailInput.value,
            email: emailInput.value,
            time: new Date().toLocaleString('ro-RO'),
            message: "Solicitare nouă de înscriere în comunitatea Premium Hațeg Alternativ.",
            title: "Membru Nou"
        };

        // AM ACTUALIZAT ID-ul TEMPLATE-ULUI AICI:
        emailjs.send("service_iqnbicr", "template_0j0ygug", templateParams)
            .then(function() {
                msg.innerHTML = "✨ Bun venit în comunitate!";
                msg.style.color = "#c5a059";
                emailInput.value = "";
                btn.style.display = "none";
            }, function(error) {
                console.error('FAILED...', error);
                msg.innerHTML = "Eroare: " + JSON.stringify(error.text);
                msg.style.color = "#ff6b6b";
                btn.disabled = false;
                btn.innerText = "ÎNSCRIE-TE";
            });
    });
</script>
