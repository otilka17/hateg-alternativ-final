<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METANOIA | Meniu Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel:wght@400;700&display=swap');
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .font-brand { font-family: 'Cinzel', serif; }
        .bg-card { background: #0c0c0c; }
        .gold-border { border: 1px solid #c5a059; }
        .gold-text { color: #c5a059; }
        .bg-gold { background: #c5a059; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 text-center border-b border-[#1a1a1a] bg-[#050505] sticky top-0 z-50">
        <h1 class="text-xl tracking-[0.2em] font-brand gold-text">METANOIA</h1>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div class="h-56 rounded-2xl bg-[#111] overflow-hidden relative shadow-2xl">
            <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent z-10"></div>
            <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=800" class="w-full h-full object-cover opacity-80" alt="Metanoia Signature">
            <div class="absolute bottom-6 left-6 z-20">
                <h2 class="text-2xl font-bold font-brand">Gustul Rânduielii</h2>
                <p class="text-xs text-gray-300">Gătit artizanal cu ingrediente locale.</p>
            </div>
        </div>

        <h2 class="text-xs uppercase tracking-widest text-gray-500 font-bold pl-1">Selecția Săptămânii</h2>
        
        <div id="product-list" class="space-y-4">
            <div class="bg-card p-4 rounded-2xl border border-[#1a1a1a] flex justify-between items-center transition-all hover:border-[#c5a059]">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-[#1a1a1a] rounded-lg"></div>
                    <div>
                        <h3 class="font-semibold text-sm">Ceaun de Pui</h3>
                        <p class="gold-text text-xs">20.50 RON</p>
                    </div>
                </div>
                <button onclick="add(20.50, 'Ceaun de Pui')" class="gold-border px-4 py-1 text-[10px] uppercase hover:bg-[#c5a059] hover:text-black transition-all rounded-full">Adaugă</button>
            </div>
            
            <div class="bg-card p-4 rounded-2xl border border-[#1a1a1a] flex justify-between items-center transition-all hover:border-[#c5a059]">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-[#1a1a1a] rounded-lg"></div>
                    <div>
                        <h3 class="font-semibold text-sm">Tochitură Metanoia</h3>
                        <p class="gold-text text-xs">25.00 RON</p>
                    </div>
                </div>
                <button onclick="add(25.00, 'Tochitură')" class="gold-border px-4 py-1 text-[10px] uppercase hover:bg-[#c5a059] hover:text-black transition-all rounded-full">Adaugă</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 w-full bg-[#050505]/90 backdrop-blur-md border-t border-[#1a1a1a] p-6 flex justify-between items-center z-50">
        <div>
            <p class="text-[9px] text-gray-500 uppercase">Total Comandă</p>
            <p class="text-xl font-bold"><span id="total" class="gold-text">0.00</span> RON</p>
        </div>
        <button onclick="finalizare()" class="bg-[#c5a059] text-black font-bold px-8 py-3 rounded-full text-xs uppercase hover:opacity-90 transition-all">Finalizare</button>
    </div>

    <script>
        let total = 0;
        let produse = [];

        function add(p, n) {
            total += p;
            produse.push(n);
            document.getElementById('total').innerText = total.toFixed(2);
        }

        async function finalizare() {
            if(total === 0) return alert("Selectează măcar un produs!");
            
            const payload = {
                total: total,
                produse: produse.join(", "),
                data: new Date().toLocaleString()
            };

            // AICI PUI LINKUL DE WEBHOOK DIN MAKE
            const webhookUrl = "AICI_PUII_LINKUL_DE_LA_MAKE";

            try {
                const res = await fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if(res.ok) alert("Comanda a plecat spre bucătărie!");
            } catch(e) {
                alert("Eroare trimitere.");
            }
        }
    </script>
</body>
</html>
