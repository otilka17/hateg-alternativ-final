<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Moștenirea de Aur</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #ffd700; --negru: #000000; --overlay: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .site-header { position: absolute; top: 0; width: 100%; z-index: 999; padding: 20px; text-align: center; }
        .brand svg { height: 70px; filter: drop-shadow(0 0 10px var(--auriu)); }
        
        .grid-lux { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .card-lux { 
            height: 450px; display: flex; flex-direction: column; justify-content: flex-end; 
            padding: 30px; border: 1px solid #1a1a1a; position: relative; overflow: hidden; 
            background-size: cover !important; background-position: center !important; text-decoration: none;
        }
        .card-lux::before { content: ""; position: absolute; inset:0; background: var(--overlay); z-index: 1; }
        .card-content { position: relative; z-index: 5; }
        .card-lux h3 { font-family: 'Playfair Display'; font-size: 2rem; color: var(--auriu); font-style: italic; }
        .btn-gold { display: inline-block; padding: 8px 15px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-size: 0.7rem; margin-top: 10px; }

        footer { padding: 40px; text-align: center; opacity: 0.5; font-family: 'Cinzel'; color: var(--auriu); font-size: 0.7rem; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <svg viewBox="0 0 800 800"><path d="M300 450 L400 250 L500 450 Z" fill="#ffd700"/><text x="400" y="700" font-family="'Cinzel'" text-anchor="middle" font-size="40" fill="#ffd700">HAȚEG ALTERNATIV</text></svg>
        </div>
    </header>

    <div style="height: 60vh; background: url('hero-premium.jpg') center/cover; display:flex; align-items:center; justify-content:center; text-align:center;">
        <h1 style="font-family:'Playfair Display'; font-style:italic; font-size: 3.5rem; color:var(--auriu);">Simte. Explorează.</h1>
    </div>

    <div class="grid-lux">
        <a href="pensiune.html" class="card-lux" style="background-image: url('la-buliga-pensiune.jpg');">
            <div class="card-content"><h3>Izolare la Buligă</h3><div class="btn-gold">DETALII</div></div>
        </a>
        <a href="retreat.html" class="card-lux" style="background-image: url('hero-camp-munti.jpg');">
            <div class="card-content"><h3>Metanoia</h3><div class="btn-gold">DESCOPERĂ</div></div>
        </a>
        <a href="experiente.html" class="card-lux" style="background-image: url('jeep.jpg');">
            <div class="card-content"><h3>Aventură</h3><div class="btn-gold">EXPLOREAZĂ</div></div>
        </a>
        <a href="gastronomie.html" class="card-lux" style="background-image: url('index-mancare.jpg');">
            <div class="card-content"><h3>Gastronomie</h3><div class="btn-gold">GUSTĂ</div></div>
        </a>
        <a href="experiente.html" class="card-lux" style="background-image: url('floripepanza.JPG');">
            <div class="card-content"><h3>Atelier Creație</h3><div class="btn-gold">CREEAZĂ</div></div>
        </a>
    </div>

    <footer>HAȚEG ALTERNATIV &copy; 2026</footer>

    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true; s1.src='https://embed.tawk.to/642944b54247f20fefea97df/1gsvek60a';
            s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>
</body>
</html>
