<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hațeg Alternativ | Experiențe Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a href="index.html" class="brand">
                <span style="font-weight: 300; letter-spacing: 2px;">HAȚEG</span>
                <span style="font-weight: 800;">ALTERNATIV</span>
            </a>
            <nav class="main-nav">
                <a href="pensiuni.html">Pensiuni</a>
                <a href="retreat.html">Retreat</a>
                <a href="gastronomic.html">Gastronomic</a>
            </nav>
            <div class="nav-actions">
                <a href="#join" class="btn btn-gold" style="padding: 10px 20px; font-size: 0.8rem;">Cont Membru</a>
            </div>
        </div>
    </header>

    <section class="hero-premium" style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/hero-premium.jpg') center/cover;">
        <div class="container">
            <h1 class="metanoia-title" style="color: white; font-size: clamp(3rem, 8vw, 5rem);">Acolo unde tăcerea are voce.</h1>
            <p style="color: white; max-width: 600px; margin: 30px auto; font-size: 1.2rem; font-weight: 300;">O platformă curatoriată pentru călătorul modern care caută luxul în simplitate.</p>
            <a href="pensiuni.html" class="btn btn-gold">Descoperă Colecția</a>
        </div>
    </section>

    <section class="container" style="padding: 100px 0;">
        <div class="section-intro" style="text-align: center; margin-bottom: 60px;">
            <h2 class="metanoia-title" style="font-size: 3rem;">Vibe-ul Locului</h2>
        </div>
        <div class="feed-grid">
            <div class="feed-item"><img src="images/feed-1.jpg"></div>
            <div class="feed-item"><img src="images/feed-2.jpg"></div>
            <div class="feed-item"><img src="images/feed-3.jpg"></div>
            <div class="feed-item"><img src="images/feed-4.jpg"></div>
        </div>
    </section>

    <section id="join" class="container" style="margin-bottom: 100px;">
        <div class="membership-card" style="background: var(--primary); color: white; padding: 60px; border-radius: 20px; display: flex; align-items: center; gap: 40px;">
            <div style="flex: 1;">
                <h2 class="metanoia-title" style="color: white; font-size: 2.5rem;">Devino membru</h2>
                <p style="margin: 20px 0 40px; font-weight: 300; opacity: 0.8;">Acces prioritar la retreat-uri și cine secrete.</p>
                <form id="membership-form" style="display: flex; gap: 10px;">
                    <input type="email" id="member-email" placeholder="Email-ul tău" required style="flex: 1; padding: 15px; border-radius: 10px; border: none;">
                    <button type="submit" class="btn btn-gold">Creează Cont</button>
                </form>
                <p id="form-msg" style="margin-top: 15px; font-size: 0.9rem; color: #c5a059;"></p>
            </div>
            <div style="flex: 0.6;"><img src="images/membership-key.png" style="width: 100%; border-radius: 15px;"></div>
        </div>
    </section>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function(){ emailjs.init("YOUR_PUBLIC_KEY"); })();
        document.getElementById('membership-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('form-msg');
            msg.innerText = "Se trimite...";
            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", { new_member_email: document.getElementById('member-email').value })
                .then(() => { msg.innerText = "✨ Bun venit în comunitate!"; document.getElementById('membership-form').reset(); });
        });
    </script>
</body>
</html>
