<head>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --auriu: #c5a059; /* Am unificat auriul cu cel din paginile de contact pentru subtilitate premium */
            --auriu-bright: #ffd700; 
            --negru: #0a0a0a; 
            --gri-card: #141414;
            --alb: #ffffff;
            --overlay: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER UNIFICAT DAR PE NEGRU */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 10000; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; }
        .top-announcement { background: var(--auriu); color: #000; text-align: center; padding: 8px 0; font-size: 0.6rem; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; }
        
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; height: 80px; }
        .logo-wrapper { display: flex; align-items: center; text-decoration: none; color: var(--auriu-bright); }
        .logo-wrapper svg { height: 50px; margin-right: 12px; }
        .brand-text h1 { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        
        .main-nav { display: flex; align-items: center; gap: 20px; }
        .main-nav a { text-decoration: none; color: #fff; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; opacity: 0.8; }
        .main-nav a:hover { color: var(--auriu-bright); opacity: 1; }
        .cta-nav { border: 1px solid var(--auriu-bright); padding: 8px 15px !important; color: var(--auriu-bright) !important; }

        /* HERO */
        .hero { height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; padding-top: 100px; }
        .hero-bg { position: absolute; width: 100%; height: 100%; background: url('images/rasarit.jpg') center/cover; transform: scale(1.05); }
        .hero-overlay { position: absolute; width: 100%; height: 100%; background: var(--overlay); }
        .hero-content { position: relative; z-index: 10; text-align: center; }
        .hero-content h1 { font-family: 'Playfair Display'; font-size: clamp(3.5rem, 12vw, 7rem); font-style: italic; color: var(--auriu-bright); line-height: 0.9; }
        .hero-content p { font-family: 'Cinzel'; letter-spacing: 10px; font-size: 0.8rem; margin-top: 25px; color: rgba(255,255,255,0.6); }

        .btn-hero-galerie { display: inline-block; margin-top: 35px; padding: 15px 30px; border: 1px solid var(--auriu-bright); color: var(--auriu-bright); text-decoration: none; font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 3px; transition: 0.4s; text-transform: uppercase; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        .btn-hero-galerie:hover { background: var(--auriu-bright); color: #000; }

        /* GRILA IMPACT */
        .grid-impact { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); background: #000; }
        .card-impact { height: 80vh; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 40px; text-decoration: none; border: 0.5px solid #111; }
        .card-bg { position: absolute; top:0; left:0; width:100%; height:100%; background-size: cover; background-position: center; transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .card-impact:hover .card-bg { transform: scale(1.1); }
        .card-impact::after { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 70%); z-index: 1; }
        .card-content { position: relative; z-index: 5; }
        .card-content span { font-family: 'Cinzel'; font-size: 0.7rem; color: var(--auriu-bright); letter-spacing: 3px; display: block; margin-bottom: 10px; }
        .card-content h3 { font-family: 'Playfair Display'; font-size: 3rem; font-style: italic; color: var(--auriu-bright); line-height: 1; margin-bottom: 10px; }
        .card-content p { font-size: 0.95rem; color: #ccc; max-width: 280px; line-height: 1.4; }

        /* REZERVARE */
        .booking-wrap { padding: 120px 20px; background: #050505; }
        .booking-grid { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 50px; }
        .form-side { flex: 1; min-width: 320px; }
        .summary-side { flex: 0.6; min-width: 300px; background: var(--gri-card); border: 1px solid #333; padding: 40px; height: fit-content; border-radius: 4px; }

        .early-booking-bar { display: block; background: linear-gradient(90deg, #1a1a1a, #000); border: 1px solid var(--auriu-bright); padding: 20px; margin-bottom: 35px; text-decoration: none; transition: 0.3s; }
        .early-booking-bar:hover { border-color: #fff; transform: translateY(-2px); }

        input, select, textarea { width: 100%; background: transparent; border: 1px solid #222; padding: 18px; color: white; font-family: 'Inter'; margin-bottom: 20px; outline: none; transition: 0.3s; color-scheme: dark; }
        input:focus, select:focus { border-color: var(--auriu-bright); }
        label { font-size: 0.7rem; color: var(--auriu-bright); margin-bottom: 5px; font-family: 'Cinzel'; letter-spacing: 2px; display: block; }
        
        .btn-reserve { width: 100%; background: transparent; border: 1px solid var(--auriu-bright); color: var(--auriu-bright); padding: 20px; font-family: 'Cinzel'; letter-spacing: 3px; cursor: pointer; transition: 0.4s; font-weight: bold; }
        .btn-reserve:hover { background: var(--auriu-bright); color: #000; }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        #pachet-details { background: #0a0a0a; border-left: 3px solid var(--auriu-bright); padding: 20px; margin-bottom: 25px; font-size: 0.85rem; color: #aaa; line-height: 1.6; }

        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 9999; transition: 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1); }

        @media (max-width: 992px) {
            .nav-container { flex-direction: column; height: auto; padding: 20px; gap: 15px; }
            .main-nav { gap: 10px; flex-wrap: wrap; justify-content: center; }
            .hero { padding-top: 160px; }
            .card-impact { height: 65vh; padding: 30px; }
        }
    </style>
</head>
