    <title>Metanoia - Portal Gastronomic de Elită</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --auriu: #c5a059; 
            --auriu-soft: #f4e3c1;
            --auriu-metalic: linear-gradient(135deg, #f3e5ab 0%, #c5a059 50%, #947435 100%);
            --negru-lux: #050505; 
            --negru-pur: #000000; 
            --negru-card: #0a0a0a;
            --alb-mat: #f5f5f7; 
            --text-muted: #86868b; 
            --border-culoare: rgba(197, 160, 89, 0.15);
            --verde-lux: #122116;
            --verde-text: #25d366;
            --rosu-lux: #2c1414;
            --rosu-text: #ff453a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; background-color: var(--negru-pur); }
        body { background: var(--negru-pur); color: var(--alb-mat); font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }

        /* SCROLLBAR PREMIUM */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--negru-pur); }
        ::-webkit-scrollbar-thumb { background: var(--auriu); }

        /* HEADER EDITORIAL LUX */
        .site-header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 9999; 
            padding: 20px 25px; 
            display: flex; 
            flex-direction: column;
            gap: 15px;
            align-items: center; 
            background: rgba(0, 0, 0, 0.94); 
            backdrop-filter: blur(30px); 
            border-bottom: 1px solid #111; 
        }
        
        .brand-logo-container {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            cursor: pointer;
        }

        .metanoia-logo-svg {
            width: 50px;
            height: 50px;
            fill: none;
            stroke: url(#goldGradient);
            stroke-width: 2.3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand-logo { 
            text-transform: uppercase; 
            font-size: 1.3rem; 
            font-family: 'Cinzel'; 
            font-weight: 900; 
            letter-spacing: 6px; 
            color: #fff; 
        }

        .main-nav { 
            display: flex; 
            gap: 22px; 
            max-width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 15px;
            scrollbar-width: none;
        }
        .main-nav::-webkit-scrollbar { display: none; }

        .main-nav span { 
            font-size: 0.65rem; 
            font-family: 'Cinzel'; 
            color: var(--text-muted); 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            text-decoration: none; 
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 700;
            display: inline-block;
            cursor: pointer;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
        }
        .main-nav span:hover, .main-nav span.active { 
            color: var(--auriu) !important; 
            border-bottom-color: var(--auriu);
        }

        /* MULTI-PAGE SPA VIEW ROTATOR */
        .spa-view {
            display: none;
            animation: viewFadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .spa-view.active-view {
            display: block;
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HERO */
        .hero { 
            min-height: 90vh;
            min-height: 90dvh; 
            position: relative; 
            display: flex; 
            align-items: center; 
            padding: 200px 25px 80px; 
            overflow: hidden;
            background: #000;
        }

        .hero-bg-container {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: 1;
            overflow: hidden;
            will-change: transform;
            pointer-events: none;
        }

        .hero-bg-image {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1543007630-9710e4a00a20?q=80&w=1600');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) contrast(1.1);
            animation: hermesSlowZoom 45s ease-in-out infinite alternate;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.95) 100%);
            z-index: 2;
        }

        @keyframes hermesSlowZoom {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.08) translate(-1.5%, -1%); }
        }

        .hero-content { 
            position: relative; 
            z-index: 10; 
            max-width: 700px; 
            border-left: 2px solid var(--auriu); 
            padding-left: 30px; 
            margin: 0 auto; 
        }
        
        .hero h1 { 
            font-family: 'Playfair Display'; 
            font-size: clamp(2rem, 7vw, 3.6rem); 
            font-style: italic; 
            color: #fff; 
            line-height: 1.25; 
            margin-bottom: 25px; 
            font-weight: 400; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.8); 
        }
        .hero p { 
            font-size: clamp(0.95rem, 3.5vw, 1.1rem); 
            font-weight: 300; 
            color: #ccc; 
            margin-bottom: 40px; 
            line-height: 1.7;
        }
        .tagline { 
            font-family: 'Cinzel'; 
            color: var(--auriu); 
            letter-spacing: 7px; 
            font-size: 0.75rem; 
            display: block; 
            font-weight: 700; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
        }

        /* ELIGIBILITY INTERACTIVE SURVEY COMPONENT (NEW) */
        .survey-container { max-width: 900px; margin: 160px auto 100px; padding: 0 24px; }
        .survey-card { background: var(--negru-card); border: 1px solid var(--border-culoare); border-radius: 32px; padding: 50px 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        .survey-step { margin-bottom: 40px; display: flex; flex-direction: column; gap: 15px; }
        .survey-step label { font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 2px; color: var(--auriu); font-weight: 900; }
        
        .checkbox-option { background: #050505; border: 1px solid #1f1f1f; border-radius: 18px; padding: 22px 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .checkbox-option:hover { border-color: rgba(197, 160, 89, 0.4); background: #0c0c0c; }
        .checkbox-option.selected { border-color: var(--auriu); background: #13100a; }
        
        .option-text h4 { font-size: 1.05rem; color: #fff; margin-bottom: 4px; font-weight: 600; }
        .option-text p { font-size: 0.85rem; color: var(--text-muted); }
        
        .radio-dot { width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .radio-dot span { width: 10px; height: 10px; background: var(--auriu); border-radius: 50%; opacity: 0; transition: 0.2s; }
        .checkbox-option.selected .radio-dot { border-color: var(--auriu); }
        .checkbox-option.selected .radio-dot span { opacity: 1; }

        /* Rezultat Dinamic Diagnostic */
        .diagnostic-box { display: none; background: #090909; border-radius: 24px; padding: 35px; border: 1px solid #1a1a1a; margin-top: 40px; animation: viewFadeIn 0.5s ease-out; }
        .diagnostic-box.active { display: block; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 2px; font-weight: 900; padding: 8px 20px; border-radius: 50px; margin-bottom: 20px; }
        
        .status-badge.success { background: var(--verde-lux); color: var(--verde-text); border: 1px solid var(--verde-text); }
        .status-badge.warning { background: var(--rosu-lux); color: var(--rosu-text); border: 1px solid var(--rosu-text); }
        
        .diagnostic-box h3 { font-family: 'Playfair Display'; font-style: italic; font-size: 1.8rem; color: #fff; margin-bottom: 12px; }
        .diagnostic-box p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 25px; }

        /* ROADMAP HOME GRID */
        .roadmap-section { padding: 120px 25px; max-width: 1100px; margin: 0 auto; }
        .section-title { text-align: center; margin-bottom: 80px; }
        .section-title h2 { font-family: 'Playfair Display'; font-style: italic; font-size: clamp(2.2rem, 5vw, 3.2rem); color: #fff; margin-bottom: 15px; }
        .section-title p { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 4px; font-size: 0.8rem; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }

        /* VIEWS STYLE COMMONS */
        .tihna-container, .manifest-container, .masterplan-container, .oferta-container, .jurnal-container { max-width: 1100px; margin: 160px auto 100px; padding: 0 20px; }
        .manifest-header { text-align: center; margin-bottom: 60px; }
        .manifest-header h2 { font-family: 'Playfair Display'; font-style: italic; font-size: clamp(2.4rem, 6vw, 3.8rem); line-height: 1.2; margin-bottom: 15px; }
        .manifest-header p { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 4px; font-size: 0.8rem; }

        /* ACCORDION */
        .manifest-accordion { display: flex; flex-direction: column; gap: 20px; margin-top: 60px; }
        .accordion-item { background: var(--negru-card); border: 1px solid var(--border-culoare); border-radius: 20px; overflow: hidden; transition: 0.4s; }
        .accordion-item.active { border-color: var(--auriu); background: #080808; }
        .accordion-header { padding: 30px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .accordion-header h3 { font-family: 'Cinzel'; font-size: 0.95rem; letter-spacing: 2px; font-weight: 700; color: #fff; }
        .accordion-header i { color: var(--auriu); transition: 0.3s; }
        .accordion-item.active .accordion-header i { transform: rotate(180deg); }
        .accordion-content { padding: 0 30px 30px; display: none; color: var(--text-muted); font-size: 0.95rem; line-height: 1.75; }
        .accordion-item.active .accordion-content { display: block; }

        /* PITCH DECK TABS */
        .deck-tabs-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .deck-tab { background: #080808; border: 1px solid var(--border-culoare); padding: 18px 35px; border-radius: 50px; color: var(--text-muted); font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .deck-tab.active { background: var(--auriu); color: #000; border-color: var(--auriu); font-weight: bold; }
        .deck-content-card { background: var(--negru-card); border: 1px solid var(--border-culoare); border-radius: 28px; padding: 50px; display: none; }
        .deck-content-card.active { display: block; }
        .deck-grid { display: grid; grid-template-columns: 1fr; gap: 50px; align-items: center; }
        @media (min-width: 768px) { .deck-grid { grid-template-columns: 1fr 1fr; } }
        .deck-text h3 { font-family: 'Playfair Display'; font-style: italic; font-size: 2.4rem; color: #fff; margin-bottom: 25px; }
        .deck-text p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.75; }

        /* LUNCH TIHNA APP COMPONENT */
        .app-container { background: var(--negru-lux); border: 1px solid var(--border-culoare); border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .app-calendar { background: #0a0a0a; padding: 30px 20px; border-bottom: 1px solid var(--border-culoare); display: flex; justify-content: space-around; overflow-x: auto; scrollbar-width: none; gap: 12px; }
        .app-calendar::-webkit-scrollbar { display: none; }
        .calendar-day { display: flex; flex-direction: column; align-items: center; padding: 15px 25px; border-radius: 20px; border: 1px solid transparent; cursor: pointer; transition: all 0.3s; min-width: 90px; }
        .calendar-day span:first-child { font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; }
        .calendar-day span:last-child { font-family: 'Inter'; font-size: 1.15rem; font-weight: 800; color: #fff; margin-top: 4px; }
        .calendar-day.active { background: #181510; border-color: var(--auriu); }
        .calendar-day.active span:first-child { color: var(--auriu); }
        
        .app-workspace { display: grid; grid-template-columns: 1fr; gap: 40px; padding: 50px 35px; }
        @media (min-width: 992px) { .app-workspace { grid-template-columns: 1.4fr 1fr; } }
        .meal-category-title { font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 3px; color: var(--auriu); margin-bottom: 15px; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 8px; font-weight: 900; }
        .meal-category-block { margin-bottom: 35px; }
        
        .menu-card { background: var(--negru-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 25px; cursor: pointer; transition: 0.3s; }
        .menu-card:hover { border-color: var(--auriu); background: #0c0c0c; }
        .menu-card-img { width: 100px; height: 100px; border-radius: 16px; object-fit: cover; }
        .menu-card-details { flex: 1; }
        .menu-card-details h4 { font-family: 'Playfair Display'; font-style: italic; font-size: 1.25rem; color: #fff; margin-bottom: 6px; }
        .menu-card-details p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
        .menu-card.selected { border-color: var(--auriu); background: #0d0c0a; }
        
        .app-checkout-panel { background: #080808; border: 1px solid var(--border-culoare); border-radius: 28px; padding: 35px; display: flex; flex-direction: column; justify-content: space-between; height: fit-content; position: sticky; top: 160px; }
        .checkout-header { margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 25px; }
        .checkout-header h3 { font-family: 'Cinzel'; font-size: 1.15rem; letter-spacing: 2px; color: #fff; margin-bottom: 8px; }
        .checkout-stats { display: flex; flex-direction: column; gap: 20px; margin-bottom: 35px; }
        .checkout-stat-row { display: flex; justify-content: space-between; align-items: center; }
        .checkout-stat-row span:first-child { font-size: 0.85rem; color: var(--text-muted); }
        .checkout-stat-row span:last-child { font-family: 'Cinzel'; font-size: 1.05rem; color: #fff; font-weight: 700; }
        .checkout-stat-row.total { margin-top: 25px; border-top: 1px solid #1a1a1a; padding-top: 20px; }
        .checkout-stat-row.total span:last-child { font-size: 2rem; color: var(--auriu); font-weight: 900; }

        /* CAN SIMULATOR */
        .generator-grid { display: grid; grid-template-columns: 1fr; gap: 50px; margin-top: 60px; }
        @media (min-width: 768px) { .generator-grid { grid-template-columns: 1.2fr 1fr; } }
        .can-preview-box { background: radial-gradient(circle, #1a1a1a 0%, #030303 100%); border: 1px solid var(--border-culoare); border-radius: 28px; height: 520px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .glowing-orbs { position: absolute; width: 320px; height: 320px; background: rgba(197, 160, 89, 0.12); filter: blur(70px); border-radius: 50%; z-index: 1; }
        .simulated-can { position: relative; width: 170px; height: 340px; background: linear-gradient(90deg, #444 0%, #bbb 30%, #fff 50%, #bbb 70%, #444 100%); border-radius: 44px 44px 34px 34px; z-index: 2; border: 2px solid #999; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 45px 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.85); }
        .can-cap { position: absolute; top: -10px; width: 148px; height: 12px; background: #888; border-radius: 50% 50% 0 0; }
        .can-label { width: 100%; height: 210px; background: #000; border-radius: 14px; border: 1px solid var(--auriu); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; padding: 25px 10px; transition: 0.4s; }
        .can-label-title { font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 3px; font-weight: 900; color: #fff; text-align: center; }
        .generator-controls { background: var(--negru-card); border: 1px solid var(--border-culoare); border-radius: 28px; padding: 40px; }
        .option-pills { display: flex; flex-wrap: wrap; gap: 12px; }
        .option-pill { background: #080808; border: 1px solid #222; padding: 14px 24px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; font-family: 'Cinzel'; letter-spacing: 1px; color: var(--text-muted); }
        .option-pill.active { border-color: var(--auriu); background: #1a150f; color: var(--auriu); }

        /* LEGAL FOOTER */
        footer { padding: 80px 25px 60px; background: #000; color: #555; font-size: 0.75rem; border-top: 1px solid #111; }
        .footer-grid { display: flex; flex-direction: column; gap: 40px; max-width: 1100px; margin: 0 auto; }
        .legal-links { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 15px; }
        .legal-links a { color: #555 !important; text-decoration: none !important; font-family: 'Cinzel'; letter-spacing: 2px; font-size: 0.65rem; }
        .cui-info { font-family: 'Cinzel'; letter-spacing: 2px; line-height: 1.8; font-size: 0.65rem; }
        .footer-logos { display: flex; gap: 20px; margin-top: 10px; }
        .footer-logos img { height: 32px; opacity: 0.25; filter: grayscale(1); }
        .tribute { font-family: 'Cinzel'; color: #161616; font-size: 0.55rem; letter-spacing: 8px; margin-top: 50px; display: block; text-align: center; font-weight: 700; }

        .btn-app-action { background: var(--auriu); color: var(--negru-pur); border: none; padding: 18px; border-radius: 50px; font-family: 'Cinzel'; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; width: 100%; transition: 0.3s; text-align: center; text-decoration: none; }
        .btn-app-action:hover { background: #fff; transform: translateY(-2px); }
