<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Simte. Explorează. Trăiește.</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black-deep: #000000;
            --gold-warm: #D4AF37;
            --white-pure: #ffffff;
            --gray-soft: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--black-deep);
            color: var(--white-pure);
            font-family: 'Montserrat', sans-serif;
        }

        /* Navigația Restaurată - Toate paginile tale sunt aici */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px 5%;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
        }

        nav a:hover { color: var(--gold-warm); }

        /* Secțiunea Logo cu noul fișier hateg-logo.svg */
        header {
            padding: 40px 0;
            text-align: center;
        }

        .hateg-logo-vector {
            height: 120px;
            filter: brightness(0) invert(1); /* Îl face alb pentru Isihie Digitală */
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hateg-logo-vector:hover {
            transform: scale(1.1);
            filter: brightness(0) invert(1) drop-shadow(0 0 10px var(--gold-warm));
        }

        /* Hero Sections conform screenshot-urilor tale */
        .hero {
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('images/hero-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 5rem;
        }

        .section-buliga {
            padding: 80px 10%;
            text-align: center;
            background: url('images/casa-buliga.jpg') no-repeat center; /* Imaginea cu casa de la 13:18 */
            background-size: cover;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Butonul de WhatsApp original */
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            border-radius: 50px;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Acasă</a>

        <a href="metanoia.html">Metanoia</a>

        <a href="obiective.html">Obiective</a>
        <a href="evenimente.html">Evenimente</a>
        <a href="forum.html">Forum</a>
        <a href="contact.html">Contact</a>
    </nav>

    <header>
        <img src="images/hateg-logo.svg" alt="Hațeg Alternativ" class="hateg-logo-vector">
    </header>

    <section class="hero">
        <h1>Simte.</h1> </section>

    <section class="section-buliga">
        <h2 style="font-family:'Playfair Display'; font-size: 4rem; color: white; margin:0;">Buliga.</h2>
        <p style="color: var(--gold-warm); letter-spacing: 3px;">UNDE PĂMÂNTUL ÎNTÂLNEȘTE CERUL.</p> </section>

    <div style="text-align: center; padding: 50px;">
        <a href="pachete.html" style="background: var(--gold-warm); color: black; padding: 20px 40px; text-decoration: none; font-weight: bold; border-radius: 50px; text-transform: uppercase;">Rezervă Liniștea</a> </div>

    <script src="js/translations.js"></script> <a href="https://wa.me/40749000000" class="whatsapp-btn">
        <span>Chat WhatsApp</span>
    </a>
</body>
</html>
