<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Simte tăcerea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ACEST COD REPARĂ TOTUL INSTANT */
        :root { --verde: #1b3022; --auriu: #c5a059; --roz-crem: #fdf2f0; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--roz-crem); color: var(--verde); line-height: 1.6; }
        
        /* Header curat, nu listă albastră */
        .site-header { background: var(--alb); padding: 25px 0; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .nav-wrap { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .brand { text-decoration: none; color: var(--verde); font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; font-family: 'Playfair Display'; }
        .main-nav a { text-decoration: none; color: #444; font-size: 0.8rem; margin-left: 25px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Muntele superb, nu banda aia gri */
        .hero-image { 
            height: 65vh; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.1)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
        }

        /* Panelul alb "Metanoia" */
        .main-panel { 
            transform: translateY(-80px); 
            background: var(--alb); 
            padding: 80px 40px; 
            max-width: 900px; 
            margin: 0 auto; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            text-align: center;
        }
        .kicker { color: var(--auriu); letter-spacing: 5px; font-size: 0.7rem; font-weight: 800; display: block; margin-bottom: 20px; text-transform: uppercase; }
        .metanoia-title { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 30px; line-height: 1.1; font-style: italic; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="nav-wrap">
        <a href="index.html" class="brand">HAȚEG <strong>ALTERNATIV</strong></a>
        <nav class="main-nav">
            <a href="pensiuni.html">Pensiuni</a>
            <a href="retreat.html">Retreat</a>
            <a href="gastronomic.html">Gastronomic</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<section class="hero-image"></section>

<main class="container">
    <div class="main-panel">
        <span class="kicker">The Metanoia Concept</span>
        <h1 class="metanoia-title">Nu e doar o cazare. <br>E o regăsire.</h1>
        <p style="font-weight: 300; font-size: 1.1rem; color: #64748b;">Am căutat și curatoriat locuri unde arhitectura se pleacă în fața naturii și unde liniștea este cel mai mare lux.</p>
    </div>
</main>

</body>
</html>
