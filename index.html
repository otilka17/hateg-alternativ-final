<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Acasă</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --auriu: #ffd700; --negru: #000000; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* HEADER - exact ca pe paginile care merg */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand svg { height: 80px; width: auto; }
        .burger { cursor: pointer; padding: 10px; }
        .burger div { width: 30px; height: 2px; background: var(--auriu); margin: 6px; }

        /* HERO - cel din screenshot-urile tale */
        .hermes-viewport { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 2s ease; }
        .slide.active { opacity: 1; visibility: visible; }
        .slide-bg { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .slide-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2; }
        .hero-text-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; width: 100%; }
        .hero-text-container h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 6rem); color: var(--auriu); font-style: italic; }

        /* EARLY BOOKING SECTION */
        .early-booking { padding: 80px 20px; text-align: center; }
        .early-booking h2 { font-family: 'Playfair Display'; font-style: italic; color: var(--auriu); font-size: 3rem; margin-bottom: 30px; }
        .early-card { max-width: 800px; margin: 0 auto; border-left: 4px solid var(--auriu); background: #0a0a0a; padding: 40px; text-align: left; }
        .early-card p { line-height: 1.8; color: #ccc; font-size: 1.1rem; }

        /* PACHETE - cu pozele tale */
        .pachete-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .pachet-card { background: #080808; border: 1px solid #1a1a1a; text-align: center; }
        .pachet-img { height: 300px; background-size: cover; background-position: center; }
        .pachet-info { padding: 30px; }
        .pachet-info h3 { font-family: 'Cinzel'; color: var(--auriu); margin-bottom: 20px; }

        /* WHATSAPP & TAWK */
        .whatsapp-float { position: fixed; bottom: 30px; left: 20px; background: #25d366; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; }
        footer { padding: 60px; text-align: center; opacity: 0.3; font-family: 'Cinzel'; font-size: 0.7rem; }
    </style>
</head>
<body>

    <a href="https://wa.me/40749229686" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <header class="site-header">
        <div class="brand">
            <svg viewBox="0 0 800 800">
                <circle cx="400" cy="280" r="105" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.4"/>
                <path d="M300 450 L400 250 L500 450 Z" fill="#ffd700"/>
                <text x="400" y="765" font-family="'Cinzel'" text-anchor="middle" font-size="45" fill="#ffd700">HAȚEG ALTERNATIV</text>
            </svg>
        </div>
        <div class="burger"><div></div><div></div><div></div></div>
    </header>

    <section class="hermes-viewport">
        <div class="slide active"><div class="slide-bg" style="background-image: url('images/rasarit.jpg');"></div><div class="slide-overlay"></div></div>
        <div class="slide"><div class="slide-bg" style="background-image: url('images/hero-camp-munti.jpg');"></div><div class="slide-overlay"></div></div>
        <div class="slide"><div class="slide-bg" style="background-image: url('images/hero-premium.jpg');"></div><div class="slide-overlay"></div></div>
        <div class="hero-text-container"><h1>Tihna rânduită.</h1></div>
    </section>

    <section class="early-booking">
        <h2>Early Booking 2026</h2>
        <div class="early-card">
            <p>Sezonul de vară și toamnă la "La Buligă" este limitat. Programul Early Booking îți garantează locul și tarifele actuale, protejându-te de ajustările de sezon.</p>
        </div>
    </section>

    <div class="pachete-grid">
        <div class="pachet-card">
            <div class="pachet-img" style="background-image: url('images/la-buliga-pensiune.jpg');"></div>
            <div class="pachet-info"><h3>Cazare Integrală</h3></div>
        </div>
        <div class="pachet-card">
            <div class="pachet-img" style="background-image: url('images/index-mancare.jpg');"></div>
            <div class="pachet-info"><h3>Cazare + 2 Mese</h3></div>
        </div>
    </div>

    <footer>HAȚEG ALTERNATIV &copy; 2026</footer>

    <script>
        // Scriptul pentru slider - cel care rulează pe celelalte pagini
        let slides = document.querySelectorAll('.slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);

        // Tawk.to
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true; s1.src='https://embed.tawk.to/69c5607435e8d61c3a875f21/1jklg1i9s';
            s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>
</body>
</html>
