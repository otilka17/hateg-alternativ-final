<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Moștenirea de Aur</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER ERMES STYLE - LOGO MARE */
        .site-header { 
            position: fixed; top: 0; width: 100%; z-index: 5000; 
            padding: 40px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.5s ease;
        }
        
        .brand img { 
            height: 110px; /* Logo impunător */
            width: auto; 
            display: block;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        .burger { cursor: pointer; z-index: 6000; padding: 10px; }
        .burger div { width: 50px; height: 4px; background: #fff; margin: 10px; transition: 0.3s; }

        /* MENU OVERLAY */
        .main-nav { 
            position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; 
            background: var(--negru); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1); z-index: 5500;
        }
        .main-nav.active { right: 0; }
        .main-nav a { 
            text-decoration: none; color: #fff; font-size: clamp(2.5rem, 8vw, 4rem); 
            font-weight: 900; text-transform: uppercase; margin: 15px 0; letter-spacing: 5px; opacity: 0.6; transition: 0.3s;
        }
        .main-nav a:hover { opacity: 1; color: var(--auriu); }

        /* ERMES SLIDER (CROSS-FADE + SLOW ZOOM + SHADOW) */
        .hero-viewport {
            position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000;
        }
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
            transition: opacity 3s ease-in-out;
            display: flex; align-items: center; justify-content: center;
        }
        .slide.active { opacity: 1; visibility: visible; }

        .slide-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transform: scale(1.05);
            transition: transform 12s linear;
        }
        .slide.active .slide-bg { transform: scale(1.2); }

        /* Umbra tip Metanoia pentru lizibilitate text */
        .slide::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
        }

        .slide-content { position: relative; z-index: 10; text-align: center; }
        .slide-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 16vw, 11rem);
            font-weight: 900; font-style: italic; line-height: 0.85;
            text-shadow: 0 10px 60px rgba(0,0,0,0.8);
        }

        /* CONTENT */
        .container { padding: 150px 50px; max-width: 1400px; margin: 0 auto; }
        
        .intro-block { display: flex; gap: 80px; align-items: center; flex-wrap: wrap; margin-bottom: 200px; }
        .intro-img { flex: 1; min-width: 450px; height: 750px; border: 1px solid #1a1a1a; overflow: hidden; }
        .intro-img img { width: 100%; height: 100%; object-fit: cover; }
        .intro-text h2 { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--auriu); margin-bottom: 40px; font-style: italic; }
        .intro-text p { font-size: 1.8rem; color: #888; font-weight: 300; }

        /* GRID CARDS - BUTOANELE SUNT AICI */
        .luxury-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 60px; margin-bottom: 150px; }
        .card-lux { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.4s; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; color: inherit; }
        .card-lux:hover { transform: translateY(-20px); border-color: var(--auriu); }
        .img-lux { height: 500px; overflow: hidden; }
        .img-lux img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 1.5s; }
        .card-lux:hover .img-lux img { opacity: 1; transform: scale(1.05); }

        .info-lux { padding: 50px 40px; text-align: center; }
        .info-lux h3 { font-family: 'Playfair Display', serif; font-size: 3rem; font-style: italic; margin-bottom: 20px; }
        .price-lux { font-family: 'Playfair Display', serif; font-size: 3rem; display: block; margin-bottom: 40px; color: #fff; font-weight: 900; }
        .btn-lux { display: block; padding: 20px 40px; border: 2px solid var(--auriu); color: var(--auriu); text-transform: uppercase; font-weight: 900; letter-spacing: 5px; }

        footer { padding: 100px 50px; text-align: center; font-size: 1.2rem; letter-spacing: 6px; border-top: 1px solid #111; opacity: 0.4; }

        @media (max-width: 1024px) {
            .site-header { padding: 25px; }
            .brand img { height: 130px !important; } /* LOGO URIAS MOBIL */
            .intro-img { height: 500px; min-width: 100%; }
            .luxury-grid { grid-template-columns: 1fr; }
            .slide-content h1 { font-size: 6.5rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html" class="brand">
            <img src="images/Hateg-logo.svg" alt="Hațeg Alternativ Logo">
        </a>
        <div class="burger" id="burger">
            <div></div><div></div><div></div>
        </div>
        <nav class="main-nav" id="nav-links">
            <a href="retreat.html">Metanoia</a>
            <a href="gastronomie.html">Gastronomie</a>
            <a href="experiente.html">Ateliere</a>
            <a href="buliga.html">Reservations</a>
        </nav>
    </header>

    <section class="hero-viewport">
        <div class="slide active">
            <div class="slide-bg" style="background-image: url('images/rasarit.jpg');"></div>
            <div class="slide-content"><h1>Simte.</h1></div>
        </div>
        <div class="slide">
            <div class="slide-bg" style="background-image: url('images/apus.jpg');"></div>
            <div class="slide-content"><h1>Explorează.</h1></div>
        </div>
        <div class="slide">
            <div class="slide-bg" style="background-image: url('images/nori.jpg');"></div>
            <div class="slide-content"><h1>Trăiește.</h1></div>
        </div>
    </section>

    <div class="container">
        <section class="intro-block">
            <div class="intro-img"><img src="images/la-buliga-pensiune.jpg" alt="Pensiunea"></div>
            <div class="intro-text">
                <h2>Pensiunea<br>La Buligă</h2>
                <p>Un sanctuar al rânduielii și al tăcerii profunde în inima Retezatului.</p>
                <a href="buliga.html" style="color:var(--auriu); font-weight:900; font-size:1.5rem; text-transform:uppercase; text-decoration:none; border-bottom:2px solid var(--auriu); margin-top:20px; display:inline-block;">Vezi Detalii →</a>
            </div>
        </section>

        <div class="luxury-grid">
            <div class="card-lux">
                <div class="img-lux"><img src="images/jeep.jpg" alt="Aventura"></div>
                <div class="info-lux">
                    <h3>Buliga: Izolare</h3>
                    <span class="price-lux">8.500 RON</span>
                    <a href="https://wa.me/40749229686" class="btn-lux">Rezervă</a>
                </div>
            </div>
            <div class="card-lux">
                <div class="img-lux"><img src="images/apus1.jpg" alt="Metanoia"></div>
                <div class="info-lux">
                    <h3>Metanoia: Tăcere</h3>
                    <span class="price-lux">4.500 RON</span>
                    <a href="https://wa.me/40749229686" class="btn-lux">Rezervă</a>
                </div>
            </div>
        </div>

        <div class="luxury-grid">
            <a href="gastronomie.html" class="card-lux">
                <div class="img-lux"><img src="images/index-mancare.jpg" alt="Gastronomie"></div>
                <div class="info-lux"><h3>Gastronomie</h3></div>
            </a>
            <a href="experiente.html" class="card-lux">
                <div class="img-lux"><img src="images/narcise.jpg" alt="Narcise"></div>
                <div class="info-lux"><h3>Ateliere Artă</h3></div>
            </a>
        </div>
    </div>

    <script>
        // SLIDER ERMES STYLE
        let slides = document.querySelectorAll('.slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 7000);

        // BURGER
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        burger.addEventListener('click', () => { nav.classList.toggle('active'); });
    </script>
</body>
</html>
