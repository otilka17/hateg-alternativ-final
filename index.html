<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domeniile la Buligă | Luxury Retreat</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #1a1a1a; --auriu: #c5a059; --crem: #fdfcf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--negru); line-height: 1.6; overflow-x: hidden; }

        /* HEADER ELEGANT */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 3000; background: rgba(255,255,255,0.98); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 12px 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; text-decoration: none; color: var(--negru); text-transform: uppercase; letter-spacing: 1px; }
        .main-nav { display: flex; gap: 10px; }
        .main-nav a { text-decoration: none; color: var(--negru); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .main-nav a:hover { color: var(--auriu); }

        /* HERO - FULLSCREEN EDITORIAL */
        .hero { height: 100vh; background: #1a1a1a linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('images/IMG-20260326-WA0005.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 0 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-style: italic; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* SECȚIUNEA BINECUVÂNTARE & COLAJE */
        .mosaic-section { padding: 100px 15px; text-align: center; background: white; }
        .collage-container { max-width: 1200px; margin: 0 auto; padding: 20px; border: 1px solid var(--auriu); background: #fdfcf8; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .collage-container img { width: 100%; height: auto; display: block; }
        .blessing-content { max-width: 800px; margin: 40px auto; }
        .blessing-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.4rem; color: #555; }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 10px; }
            .main-nav { margin-top: 5px; }
            .hero h1 { font-size: 2.2rem; }
            .mosaic-section h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">
            <a href="index.html" class="brand">Domeniile la Buligă</a>
            <nav class="main-nav">
                <a href="gastronomie.html">Gastronomy</a>
                <a href="experiente.html">Experiences</a>
                <a href="evenimente.html">Events</a>
                <a href="forum.html">Journal</a>
                <a href="rezervari.html">Book</a>
            </nav>
        </div>
    </header>
    
    <section class="hero">
        <p style="letter-spacing: 3px; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px;">Hațeg Alternativ</p>
        <h1>Simte. Explorează. Trăiește.</h1>
    </section>

    <section class="mosaic-section">
        <div class="blessing-content">
            <h2 style="font-family: serif; font-size: 2.2rem; font-style: italic; margin-bottom: 15px; color: var(--auriu);">Tihna și Liniștea de la Domenii</h2>
            <p class="blessing-quote">
                "Unde-i credință, acolo-i dragoste,<br>
                Unde-i dragoste, acolo-i pace,<br>
                Unde-i pace, acolo-i binecuvântare."
            </p>
            <span style="font-size: 0.7rem; letter-spacing: 3px; color: var(--auriu); font-weight: 700;">SPIRITUL CASEI</span>
        </div>
        
        <div class="collage-container">
            <img src="images/collage-final.png" alt="Colaj Experiențe Domeniile la Buligă">
        </div>
    </section>

</body>
</html>
