<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Descoperă Autenticul</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #0a0a0a; --auriu: #9d8665; --alb: #ffffff; --gri-soft: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--alb); color: var(--negru); line-height: 1.6; }

        /* HEADER & NAV */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 3000; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; padding: 15px 0; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; }
        .brand { font-weight: 600; font-size: 0.85rem; text-decoration: none; color: var(--negru); text-transform: uppercase; letter-spacing: 4px; }
        .main-nav { display: flex; gap: 20px; }
        .main-nav a { text-decoration: none; color: var(--negru); font-size: 0.65rem; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; }
        .main-nav a:hover { opacity: 1; color: var(--auriu); }

        /* HERO SECTION */
        .hero { 
            height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/IMG-20260326-WA0005.jpg') center/cover no-repeat;
            background-color: #111; /* Fallback dacă imaginea nu se încarcă */
        }
        .hero-content { text-align: center; color: white; }
        .hero-content span { font-size: 0.7rem; letter-spacing: 10px; text-transform: uppercase; display: block; margin-bottom: 20px; font-weight: 300; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 400; font-style: italic; line-height: 1.1; }

        /* WRAPPER PRINCIPAL */
        .container { max-width: 1200px; margin: 0 auto; padding: 100px 30px; }

        .intro-text { text-align: center; max-width: 700px; margin: 0 auto 80px; }
        .intro-text h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-style: italic; margin-bottom: 25px; font-weight: 400; }
        .intro-text p { font-size: 1.1rem; color: #555; font-weight: 300; }

        /* COLAJUL PRINCIPAL */
        .main-collage { width: 100%; margin-bottom: 120px; text-align: center; }
        .main-collage img { width: 100%; height: auto; border-radius: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        /* GRID EDITORIAL */
        .grid-editorial { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; margin-bottom: 120px; }
        .grid-editorial.reverse .img-box { order: 2; }
        .grid-editorial.reverse .text-box { order: 1; }
        
        .img-box { width: 100%; height: 500px; background-size: cover; background-position: center; border-radius: 2px; background-color: var(--gri-soft); }
        .text-box span { color: var(--auriu); font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; display: block; margin-bottom: 15px; font-weight: 600; }
        .text-box h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; line-height: 1.2; margin-bottom: 25px; font-style: italic; font-weight: 400; }
        .text-box p { font-size: 1rem; color: #444; margin-bottom: 30px; font-weight: 300; }
        .btn-minimal { text-decoration: none; color: var(--negru); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--auriu); padding-bottom: 5px; transition: 0.3s; }
        .btn-minimal:hover { letter-spacing: 4px; color: var(--auriu); }

        /* FOOTER */
        .footer { padding: 80px 0; border-top: 1px solid #eee; text-align: center; color: #aaa; font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; }

        /* MOBIL */
        @media (max-width: 900px) {
            .nav-container { flex-direction: column; gap: 15px; }
            .main-nav { gap: 10px; flex-wrap: wrap; justify-content: center; }
            .grid-editorial { grid-template-columns: 1fr; gap: 40px; }
            .grid-editorial.reverse .img-box { order: 1; }
            .grid-editorial.reverse .text-box { order: 2; }
            .img-box { height: 350px; }
            .container { padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">
            <a href="index.html" class="brand">Hațeg Alternativ</a>
            <nav class="main-nav">
                <a href="obiective.html">Obiective</a>
                <a href="gastronomie.html">Gastronomie</a>
                <a href="experiente.html">Experiențe</a>
