        /* LOGO IN COLT */
        .logo-wrapper { display: flex; align-items: center; text-decoration: none; color: var(--negru); }

        .brand-text { display: flex; flex-direction: column; }

        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2; }
        .hero-content { position: relative; z-index: 3; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 7vw, 4rem); font-style: italic; }

        .steps-section { padding: 80px 20px; background: #fff; }

        .step-text h3 { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
