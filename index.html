<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METANOIA | Gust Autentic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .image-container { overflow: hidden; position: relative; }
        .image-container img { transition: transform 0.7s ease; }
        .image-container:hover img { transform: scale(1.1); }
        .card-blur { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-black text-white">

    <header class="relative h-[80vh] flex items-center justify-center overflow-hidden">
        <img src="https://source.unsplash.com/1600x900/?gourmet-food" class="absolute w-full h-full object-cover opacity-60">
        <div class="relative text-center z-10">
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter text-[#c5a059]">METANOIA</h1>
            <p class="text-xl mt-4 italic">Rânduiala hranei în Hațeg</p>
            <a href="metanoia_hub.html" class="mt-8 inline-block border border-[#c5a059] px-10 py-4 uppercase tracking-[3px] hover:bg-[#c5a059] hover:text-black transition-all">Alege Meniul</a>
        </div>
    </header>

    <section class="max-w-6xl mx-auto py-20 px-6">
        <h2 class="text-3xl mb-12 text-center text-[#c5a059]">DIN BUCĂTĂRIA NOASTRĂ</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="image-container h-80">
                <img src="https://source.unsplash.com/600x800/?roasted-chicken" class="w-full h-full object-cover">
                <div class="absolute bottom-0 p-6 card-blur w-full">
                    <h3 class="text-xl font-bold">Pui la Cuptor</h3>
                    <p class="text-sm">Gătit lent cu ierburi locale.</p>
                </div>
            </div>

            <div class="image-container h-80">
                <img src="https://source.unsplash.com/600x800/?fresh-salad" class="w-full h-full object-cover">
                <div class="absolute bottom-0 p-6 card-blur w-full">
                    <h3 class="text-xl font-bold">Salate de Sezon</h3>
                    <p class="text-sm">Farm-to-table, proaspăt zilnic.</p>
                </div>
            </div>

            <div class="image-container h-80">
                <img src="https://source.unsplash.com/600x800/?dessert" class="w-full h-full object-cover">
                <div class="absolute bottom-0 p-6 card-blur w-full">
                    <h3 class="text-xl font-bold">Desertul Metanoia</h3>
                    <p class="text-sm">Răsfăț după rânduială.</p>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
