<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hațeg Alternativ | Jurnal Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #1b3022; --auriu: #c5a059; --roz-pal: #fdf2f0; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--roz-pal); color: var(--verde); line-height: 1.6; padding-top: 80px; }
        
        h1, h2, h3, .brand-text { font-family: 'Playfair Display', serif; text-transform: none; }
        .italic-style { font-style: italic; font-weight: 700; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        .site-header { position: fixed; top: 0; width: 100%; z-index: 1500; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-wrap { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .brand { text-decoration: none; color: var(--verde); font-size: 1.3rem; }

        .hero-image {
            min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--alb);
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.15)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
        }

        /* JURNAL LIVE DIN GOOGLE SHEETS */
        .journal-section { padding: 100px 0; background: var(--alb); border-radius: 60px 60px 0 0; margin-top: -60px; }
        #journal-container { display: flex; flex-direction: column; gap: 60px; }
        
        .post-card { 
            background: var(--roz-pal); border-radius: 30px; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; 
            text-align: center; padding-bottom: 40px; border: 1px solid rgba(0,0,0,0.03);
            animation: fadeIn 1s ease;
        }
        .post-img { width: 100%; height: 500px; object-fit: cover; margin-bottom: 30px; background: #eee; }
        .post-content { max-width: 700px; padding: 0 20px; }
        .post-meta { font-family: 'Playfair Display', serif; font-style: italic; color: var(--auriu); font-size: 0.9rem; margin-bottom: 10px; display: block; }
        
        .btn-gold { background: var(--auriu); color: white; padding: 14px 35px; border-radius: 50px; text-decoration: none; font-family: 'Playfair Display', serif; font-style: italic; display: inline-block; margin-top: 20px; transition: 0.3s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .post-img { height: 350px; } }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand brand-text italic-style">Hațeg Alternativ</a>
        <div style="font-family: 'Playfair Display', serif; font-style: italic; color: var(--auriu);">Journal Live</div>
    </div>
</header>

<section class="hero-image">
    <div class="container">
        <h1 class="italic-style" style="font-size: 4rem;">Simte tăcerea.</h1>
    </div>
</section>

<main class="journal-section">
    <div class="container">
        <div id="journal-container">
            <p style="text-align:center; font-style:italic; color:#999;">Se încarcă noutățile...</p>
        </div>
    </div>
</main>

<script>
    // URL-UL SCRIPTULUI TĂU GOOGLE APPS (Același ca la rezervări)
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzsI6M2Pvyn5giR8H6nWBs1RfnmBjq2rr3jSN_vEwYKfjXbcFWaJy-6TQpgSfdrmqss/exec?action=getLive";

    async function loadJournal() {
        try {
            const response = await fetch(SHEETS_URL);
            const data = await response.json();
            const container = document.getElementById('journal-container');
            container.innerHTML = "";

            data.reverse().forEach(post => { // Cele mai noi sus
                const postHTML = `
                    <article class="post-card">
                        <img src="${post.Imagine_URL}" class="post-img" onerror="this.src='https://placehold.co/600x400?text=Imagine+Live'">
                        <div class="post-content">
                            <span class="post-meta">${post.Data} — ${post.Autor}</span>
                            <h3 style="font-size: 2rem; margin-bottom: 15px;" class="italic-style">${post.Mesaj}</h3>
                            ${post.Link_Buton ? `<a href="${post.Link_Buton}" class="btn-gold">Vezi detalii</a>` : ''}
                        </div>
                    </article>
                `;
                container.innerHTML += postHTML;
            });
        } catch (e) {
            document.getElementById('journal-container').innerHTML = "<p>Nu am putut încărca postările momentan.</p>";
        }
    }

    loadJournal();
</script>

</body>
</html>
