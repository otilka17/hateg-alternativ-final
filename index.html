<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hațeg Alternativ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #f5f5f5;
      padding: 18px 16px;
      border-bottom: 1px solid #e9e9e9;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1d2c25;
    }

    .logo span {
      font-weight: 800;
    }

    .est {
      font-size: 11px;
      letter-spacing: 2px;
      color: #c8a257;
      font-weight: bold;
    }

    nav {
      background: #f5f5f5;
      padding: 14px 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    nav ul li a {
      text-decoration: none;
      color: #444;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hero {
      min-height: 70vh;
      background:
        linear-gradient(rgba(0,0,0,0.28), rgba(0,0,0,0.32)),
        url('https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1200&q=80');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px 20px 40px;
    }

    .hero-content {
      max-width: 320px;
    }

    .hero h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 54px;
      line-height: 0.95;
      color: white;
      font-style: italic;
      margin-bottom: 22px;
    }

    .hero p {
      color: rgba(255,255,255,0.95);
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .btn-main {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      background: #c8a257;
      color: white;
      text-decoration: none;
      padding: 18px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .btn-whatsapp {
      display: inline-block;
      background: #25d366;
      color: white;
      text-decoration: none;
      padding: 16px 26px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      header {
        padding: 20px 40px;
      }

      .logo {
        font-size: 26px;
      }

      nav {
        padding: 12px 40px;
      }

      nav ul {
        flex-direction: row;
        justify-content: flex-end;
        gap: 30px;
      }

      .hero {
        min-height: 78vh;
      }

      .hero-content {
        max-width: 650px;
      }

      .hero h1 {
        font-size: 74px;
      }

      .hero p {
        font-size: 20px;
      }

      .btn-main {
        width: auto;
        padding: 18px 34px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <div class="logo">HAȚEG <span>ALTERNATIV</span></div>
      <div class="est">EST. 2026</div>
    </div>
  </header>

  <nav>
    <ul>
      <li><a href="#">Pensiuni</a></li>
      <li><a href="#">Retreat</a></li>
      <li><a href="#">Gastronomic</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>Simte<br>tăcerea.</h1>
      <p>O selecție exclusivă de refugii în inima Transilvaniei.</p>
      <a href="#" class="btn-main">Explorează colecția</a><br>
      <a href="https://wa.me/40700000000" class="btn-whatsapp">Chat WhatsApp</a>
    </div>
  </section>

</body>
</html>
