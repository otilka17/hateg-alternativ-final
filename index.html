<main class="journal-section">
    <div class="container">
        <h2 class="italic-style" style="text-align: center; font-size: 3.2rem; margin-bottom: 70px;">Jurnal Live</h2>
        <div id="journal-container" style="display: flex; flex-direction: column; gap: 80px;">
            <p style="text-align:center; font-style:italic; opacity: 0.5;">Se pregătesc momentele...</p>
        </div>
    </div>
</main>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbz1b5qQajTQQH6QdJDb1ov5qIAhguAqdm1jjmk5uF0q7F-zq85eGE-ua_VAcgopzDtP/exec?action=getLive";

    async function loadJournal() {
        try {
            const response = await fetch(SHEETS_URL);
            const data = await response.json();
            const container = document.getElementById('journal-container');
            container.innerHTML = "";

            data.reverse().forEach(post => {
                const postHTML = `
                    <article class="post-card" style="background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 30px 70px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);">
                        <div style="width: 100%; height: 500px; overflow: hidden; position: relative;">
                            <img src="${post.Imagine_URL}" 
                                 onerror="this.src='https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg'" 
                                 style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        
                        <div style="padding: 60px 40px; text-align: center; position: relative;">
                            <span style="font-family: 'Playfair Display', serif; font-style: italic; color: #c5a059; font-size: 1.1rem; display: block; margin-bottom: 20px;">
                                ${post.Data} — ${post.Autor}
                            </span>
                            <h3 style="font-size: 2.8rem; margin-bottom: 30px; line-height: 1.1; color: var(--verde);" class="italic-style">
                                ${post.Mesaj}
                            </h3>
                            
                            <div class="like-heart" style="margin-bottom: 30px; font-size: 1.5rem; cursor: pointer; color: #eee; transition: 0.3s;" onclick="this.style.color='#c5a059'">
                                <span style="font-size: 0.8rem; vertical-align: middle; margin-right: 8px; font-family: 'Inter'; letter-spacing: 2px; text-transform: uppercase;">Apreciază</span> ♡
                            </div>

                            ${post.Link_Buton ? `
                                <a href="${post.Link_Buton}" class="btn-gold" style="padding: 18px 50px;">
                                    Vezi detalii
                                </a>
                            ` : ''}
                        </div>
                    </article>
                `;
                container.innerHTML += postHTML;
            });
        } catch (e) {
            console.error(e);
            document.getElementById('journal-container').innerHTML = "<p style='text-align:center;'>Momentan nu sunt postări noi.</p>";
        }
    }
    loadJournal();
</script>

<style>
    /* Efect de hover pentru inimioară */
    .like-heart:hover { color: #c5a059 !important; transform: scale(1.1); }
</style>
