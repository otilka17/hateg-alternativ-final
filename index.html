<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hațeg Alternativ | Simte tăcerea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #1b3022; --auriu: #c5a059; --crem: #fdfcf8; --alb: #ffffff; --text-deschis: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--verde); line-height: 1.6; padding-top: 80px; overflow-x: hidden; }
        
        h1, h2, h3, .brand-text { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: none; }
        .italic-style { font-style: italic; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header Aerisit & Blur (Mobile-Style) */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 1500; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-wrap { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; }
        .brand { text-decoration: none; color: var(--verde); font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
        .main-nav { display: flex; gap: 20px; }
        .main-nav a { text-decoration: none; color: #444; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Hero Image - MUNTELE TĂU SUPERB ÎN FUNDAL */
        .hero-image {
            min-height: 80vh;
            display: flex; align-items: center; justify-content: center; text-align: center; color: var(--alb);
            /* AICI PUNE POZA CU MUNTELE TĂU SUPERB */
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.15)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
        }
        .hero-image h1 { font-size: clamp(3.8rem, 12vw, 6.5rem); margin-bottom: 15px; text-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hero-image p { font-size: 1.5rem; font-family: 'Playfair Display', serif; font-style: italic; margin-bottom: 45px; opacity: 0.95; }

        /* Jurnal din Google Sheets */
        .journal-section { padding: 120px 0; background: var(--alb); border-radius: 60px 60px 0 0; margin-top: -60px; position: relative; }
        .section-heading h2 { font-size: 3rem; margin-bottom: 15px; font-style: italic; text-align: center; }
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 50px; }
        .feed-item { border-radius: 15px; overflow: hidden; aspect-ratio: 1; border: 1px solid #eee; transition: 0.3s; }
        .feed-item img { width: 100%; height: 100%; object-fit: cover; }

        /* BUTOANE CONTACT STÂNGA/DREAPTA */
        /* WhatsApp la DREAPTA */
        .wa-btn-fixed { 
            position: fixed; bottom: 30px; right: 30px; 
            background: #25d366; color: white; padding: 15px 30px; 
            border-radius: 50px; text-decoration: none; font-weight: 700; 
            z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-size: 0.8rem;
        }

        /* Tawk.to la STÂNGA (via customStyle) */
        #tawk-chat-container { left: 30px !important; right: auto !important; }

        @media (max-width: 768px) { .main-nav { display: none; } .hero-image h1 { font-size: 4.5rem; } }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand brand-text italic-style">Hațeg Alternativ</a>
        <nav class="main-nav">
            <a href="pensiuni.html">Pensiuni</a>
            <a href="retreat.html">Retreat</a>
            <a href="obiective.html">Obiective</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div style="font-family: 'Playfair Display', serif; font-style: italic; color: var(--auriu);">Est. 2026</div>
    </div>
</header>

<section class="hero-image">
    <div class="container hero-content">
        <h1 class="italic-style">Simte tăcerea.</h1>
        <p>O selecție de refugii în inima Transilvaniei</p>
        <a href="pensiuni.html" class="btn-gold">Explorează Colecția</a>
    </div>
</section>

<section class="live-stream-section journal-section">
    <div class="container">
        <div class="section-heading">
            <h2>Metanoia Live</h2>
            <p style="color: #64748b; font-size: 1.2rem; font-style: italic;">Momente neregizate din inima locului.</p>
        </div>

        <div class="feed-grid" id="journal-container">
            <p style="text-align: center; color: #999; font-style: italic;">Se încarcă momentele...</p>
        </div>
    </div>
</section>

<a href="https://wa.me/40749229686" class="wa-btn-fixed">WhatsApp / Direct</a>

<script type="text/javascript">
var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
Tawk_API.customStyle = { visibility : { desktop : { xOffset : '30px', yOffset : '30px', position : 'bottom-left' }, mobile : { xOffset : '20px', yOffset : '20px', position : 'bottom-left' } } };

(function(){
var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
s1.async=true; s1.src='https://embed.tawk.to/69c5607435e8d61c3a875f21/1jklg1i9s';
s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
s0.parentNode.insertBefore(s1,s0);
})();
</script>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzsI6M2Pvyn5giR8H6nWBs1RfnmBjq2rr3jSN_vEwYKfjXbcFWaJy-6TQpgSfdrmqss/exec?action=getLive";

    async function loadJournal() {
        try {
            const response = await fetch(SHEETS_URL);
            const data = await response.json();
            const container = document.getElementById('journal-container');
            container.innerHTML = "";

            data.reverse().forEach(post => { // Cele mai noi sus
                const postHTML = `
                    <div class="feed-item">
                        <img src="${post.Imagine_URL}" alt="${post.Mesaj}" onerror="this.src='https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg'">
                    </div>
                `;
                container.innerHTML += postHTML;
            });
        } catch (e) {
            document.getElementById('journal-container').innerHTML = "<p style='text-align: center;'>Momentan nu sunt postări noi.</p>";
        }
    }
    loadJournal();
</script>

</body>
</html>
