<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Metanoia | Boutique</title>
    <style>
        :root { --auriu: #C5A059; --negru: #050505; --cream: #FDFCF0; }
        body, html { margin: 0; height: 100%; background: var(--negru); font-family: 'Montserrat', sans-serif; }
        
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center;
            background: linear-gradient(rgba(5,5,5,0.7), rgba(5,5,5,0.7)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2000');
            background-size: cover;
        }
        
        h1 { font-family: 'Bodoni Moda'; font-size: 5rem; color: #fff; margin: 0; letter-spacing: 10px; }
        p { color: var(--auriu); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
        
        .btn-master { 
            padding: 20px 40px; border: 1px solid var(--auriu); color: var(--auriu); 
            text-decoration: none; font-size: 0.9rem; letter-spacing: 3px; transition: 0.4s;
        }
        .btn-master:hover { background: var(--auriu); color: var(--negru); }
    </style>
</head>
<body>

    <section class="hero">
        <p>Arhitectura Rânduielii</p>
        <h1>METANOIA</h1>
        <p style="font-size: 0.7rem; color: #aaa; margin-top: 10px;">Boutique & Masterplan</p>
        
        <a href="masterplan.html" class="btn-master">VEZI PREZENTAREA STRATEGICĂ</a>
    </section>

</body>
</html>
