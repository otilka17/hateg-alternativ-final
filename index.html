<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hațeg Alternativ | Signature Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS SIGNATURE: ROZ-CREM-AURIU (Integrat) */
        :root { --verde: #1b3022; --auriu: #c5a059; --roz-pal: #fdf2f0; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--roz-pal); color: var(--verde); line-height: 1.6; padding-top: 80px; overflow-x: hidden; }
        
        h1, h2, h3, .brand-text { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: none; }
        .italic-style { font-style: italic; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header Alb, Curat, pe Două Rânduri */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 1500; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        
        .brand { text-decoration: none; color: var(--verde); font-size: 1.3rem; text-align: center; line-height: 1.1; }
        .brand strong { font-family: 'Playfair Display', serif; font-weight: 800; }
        
        .est-text { font-size: 0.6rem; color: var(--auriu); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        /* Navigația Simplă cu Majuscule */
        .main-nav { display: flex; gap: 20px; margin-top: 15px; }
        .main-nav a { text-decoration: none; color: #444; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .main-nav a:hover { color: var(--auriu); }

        /* Muntele ÎN CASETĂ (Nu Fundal pe Tot Ecranul) */
        .hero-caseta {
            margin-top: 10px;
            width: 100%; height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.15)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; text-align: center; color: var(--alb);
        }
        .hero-caseta h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-style: italic; text-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        /* Jurnal din Google Sheets (Fără Fundal Alb) */
        .journal-section { padding: 80px 0; }
        .section-heading h2 { font-size: 3rem; margin-bottom: 15px; font-style: italic; text-align: center; }
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 50px; }
        .feed-item { border-radius: 15px; overflow: hidden; aspect-ratio: 1; border: 1px solid #eee; transition: 0.3s; }
        .feed-item img { width: 100%; height: 100%; object-fit: cover; }

        /* CARDUL VIP (Verde Închis, Cursiv) */
        .membership-card { 
            background: var(--verde); border-radius: 24px; padding: 60px; 
            display: flex; align-items: center; gap: 40px; color: white; 
            margin: 80px auto; box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }
        .membership-card h2 { font-size: 3rem; margin-bottom: 20px; font-style: italic; }
        .membership-card input { padding: 15px; border-radius: 50px; border: none; width: 100%; max-width: 300px; margin-right: 10px; }
        
        /* Butoane & WhatsApp STÂNGA/DREAPTA */
        .btn-gold { background: var(--auriu); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .wa-btn-fixed { position: fixed; bottom: 30px; right: 30px; /* DREAPTA */ background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-size: 0.8rem; }

        /* Tawk.to în STÂNGA (via customStyle) */
        #tawk-chat-container { left: 30px !important; right: auto !important; }

        @media (max-width: 768px) { .brand { font-size: 1.1rem; } .main-nav { flex-wrap: wrap; justify-content: center; } .hero-caseta h1 { font-size: 2.2rem; } .membership-card { flex-direction: column; padding: 40px 20px; text-align: center; } }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand brand-text italic-style">HAȚEG <strong>ALTERNATIV</strong></a>
        <span class="est-text">EST. 2026</span>
        <nav class="main-nav">
            <a href="pensiuni.html">Pensiuni</a>
            <a href="retreat.html">Retreat</a>
            <a href="obiective.html">Obiective</a>
            <a href="forum.html" style="color: var(--auriu);">Forum</a>
        </nav>
    </div>
</header>

<section class="hero-caseta">
    <div class="container hero-content">
        <h1>Simte tăcerea.</h1>
    </div>
</section>

<section class="live-stream-section journal-section">
    <div class="container">
        <div class="section-heading">
            <h2>Metanoia Live</h2>
            <p style="color: #64748b; font-size: 1.2rem; font-style: italic;">Momente neregizate din inima locului.</p>
        </div>

        <div class="feed-grid" id="journal-container">
            <p style="text-align: center; color: #999; font-style: italic;">Se încarcă noutățile...</p>
        </div>
    </div>
</section>

<div class="container membership-wrap">
    <section class="membership-card">
        <div style="flex: 1;">
            <span style="color: var(--auriu); letter-spacing: 5px; font-weight: 800; font-size: 0.7rem; display: block; margin-bottom: 15px;">MEMBER ACCESS</span>
            <h2>Devino membru</h2>
            <p style="margin-bottom: 35px; opacity: 0.8; font-weight: 300;">Acces prioritar la retreat-uri private și experiențe curatoriate.</p>
            <form id="membership-form" style="display: flex; flex-wrap: wrap; gap: 10px;">
                <input type="email" id="member-email" placeholder="Email-ul tău" required style="padding: 15px; border-radius: 50px; border: none; flex: 1; min-width: 220px; max-width: 320px; font-family: 'Inter', sans-serif;">
                <button type="submit" class="btn-gold" id="submit-btn">Înscrie-te</button>
            </form>
            <div id="form-msg" style="margin-top: 20px; color: var(--auriu); font-weight: 700;"></div>
        </div>
        <div style="flex: 0.6;">
            <img src="https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/images/membership-key.png" alt="VIP" style="width: 100%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));">
        </div>
    </section>
</div>

<a href="https://wa.me/40749229686" class="wa-btn-fixed">WhatsApp / Direct</a>

var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
s1.async=true; s1.src='https://embed.tawk.to/69c5607435e8d61c3a875f21/1jklg1i9s';

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbz1b5qQajTQQH6QdJDb1ov5qIAhguAqdm1jjmk5uF0q7F-zq85eGE-ua_VAcgopzDtP/exec?action=getLive";

    async function loadJournal() {
        try {
            const response = await fetch(SHEETS_URL);
            const data = await response.json();
            const container = document.getElementById('journal-container');
            container.innerHTML = "";

            data.reverse().forEach(post => { // Cele mai noi sus
                const postHTML = `
                    <div class="feed-item">
                        <img src="${post.Imagine_URL}" alt="${post.Mesaj}" onerror="this.src='https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/images/hero-camp-munti.jpg'">
                    </div>
                `;
                container.innerHTML += postHTML;
            });
        } catch (e) {
            document.getElementById('journal-container').innerHTML = "<p style='text-align: center; color: #999;'>Momentan nu sunt postări noi.</p>";
        }
    }

    loadJournal();
</script>

</body>
</html>
