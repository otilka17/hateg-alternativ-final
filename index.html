<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domeniile la Buligă | Acasă în Hațeg</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #1a1a1a; --auriu: #c5a059; --crem: #fdfcf8; --text: #444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--negru); line-height: 1.6; }

        /* HEADER */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 2000; background: rgba(255,255,255,0.98); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; text-decoration: none; color: var(--negru); }
        .main-nav a { text-decoration: none; color: var(--negru); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-left: 25px; transition: 0.3s; }
        .main-nav a:hover { color: var(--auriu); }

        /* HERO SECTION */
        .hero { height: 90vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/hero-bg.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 0 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4.5rem; font-style: italic; margin-bottom: 20px; }
        .hero p { font-size: 1.1rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }

        /* BLESSING SECTION */
        .section-blessing { padding: 100px 20px; text-align: center; }
        .blessing-box { max-width: 600px; margin: 0 auto; padding: 40px; border: 1px solid rgba(197,160,89,0.3); }
        .blessing-img { width: 150px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .blessing-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem; color: #555; margin-bottom: 20px; }

        /* FEATURE SECTIONS (Stil Alternat) */
        .feature { display: flex; align-items: center; flex-wrap: wrap; padding: 80px 0; max-width: 1200px; margin: 0 auto; }
        .feature.reverse { flex-direction: row-reverse; }
        .feature-img { flex: 1; min-width: 350px; height: 500px; background-size: cover; background-position: center; margin: 20px; }
        .feature-text { flex: 1; min-width: 350px; padding: 40px; }
        .feature-text span { color: var(--auriu); font-weight: 800; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }
        .feature-text h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 15px 0 25px; font-style: italic; }
        
        /* FOOTER CTA */
        .cta-footer { background: var(--negru); color: white; padding: 100px 20px; text-align: center; }
