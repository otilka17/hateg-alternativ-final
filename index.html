<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Simte tăcerea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #1b3022; --auriu: #c5a059; --crem: #fdfcf8; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--verde); line-height: 1.6; }
        h1, .brand { font-family: 'Playfair Display', serif; }

        /* Navigație Minimalistă - Cele 4 pagini cheie */
        .site-header { position: absolute; top: 0; left: 0; width: 100%; padding: 30px 0; z-index: 100; background: transparent; }
        .nav-wrap { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .brand { text-decoration: none; color: var(--alb); font-size: 1.5rem; letter-spacing: 2px; font-weight: 700; }
        .main-nav a { text-decoration: none; color: var(--alb); font-size: 0.85rem; margin-left: 35px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; opacity: 0.9; }
        .main-nav a:hover { opacity: 1; color: var(--auriu); }

        /* Hero Superb - Imaginea care vinde totul */
        .hero { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            color: var(--alb);
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.2)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
        }
        .hero-content { max-width: 800px; padding: 0 20px; }
        .hero h1 { font-size: clamp(3rem, 10vw, 5.5rem); margin-bottom: 10px; line-height: 1.1; }
        .hero p { font-size: 1.2rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; opacity: 0.9; }

        /* Butonul de Call to Action */
        .btn-premium { 
            padding: 18px 45px; 
            border: 1px solid var(--alb); 
            color: var(--alb); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.9rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            transition: 0.4s;
            border-radius: 2px;
        }
        .btn-premium:hover { background: var(--alb); color: var(--verde); }

        /* WhatsApp Minimalist */
        .wa-link { position: fixed; bottom: 40px; left: 40px; color: var(--alb); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; z-index: 100; text-transform: uppercase; border-bottom: 1px solid var(--auriu); padding-bottom: 5px; }

        @media (max-width: 768px) { .main-nav { display: none; } }
    </style>
</head>

            <a href="obiective.html">Obiective</a>

        </nav>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <p>Simte tăcerea.</p>
        <h1>Trăiește real.</h1>
        <div style="margin-top: 50px;">
            <a href="pensiuni.html" class="btn-premium">Descoperă Colecția</a>
        </div>
    </div>
</section>
