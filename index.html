<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METANOIA | Rânduiala Hranei</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel:wght@400;700&display=swap');
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .font-brand { font-family: 'Cinzel', serif; }
        .gold { color: #c5a059; }
        .bg-card { background: #0c0c0c; border: 1px solid #1a1a1a; }
        .premium-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 text-center sticky top-0 bg-[#050505]/80 backdrop-blur-md z-50">
        <h1 class="text-2xl tracking-[0.3em] font-brand gold">METANOIA</h1>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-8">
        
        <div class="h-64 rounded-3xl overflow-hidden relative premium-shadow">
            <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1200" class="w-full h-full object-cover opacity-80">
            <div class="absolute bottom-6 left-6">
                <h2 class="text-3xl font-bold font-brand">Meniul Zilei</h2>
                <p class="text-sm opacity-80">Rânduiala hranei în Hațeg</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-card p-5 rounded-3xl">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold">Ceaun de Pui</h3>
                        <p class="text-xs opacity-60">450 kcal • 300g</p>
                    </div>
                    <p class="gold font-bold">20.50 RON</p>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="updateCart('Ceaun de Pui', 20.50, 450)" class="w-full py-2 border border-white/10 rounded-xl text-xs hover:bg-[#c5a059] hover:text-black transition-all">Adaugă</button>
                </div>
            </div>

            <div class="bg-card p-5 rounded-3xl">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold">Tochitură Metanoia</h3>
                        <p class="text-xs opacity-60">650 kcal • 400g</p>
                    </div>
                    <p class="gold font-bold">25.00 RON</p>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="updateCart('Tochitură', 25.00, 650)" class="w-full py-2 border border-white/10 rounded-xl text-xs hover:bg-[#c5a059] hover:text-black transition-all">Adaugă</button>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 w-full p-6 bg-[#050505] border-t border-white/10 flex justify-between items-center z-50">
        <div>
            <p class="text-[10px] uppercase tracking-widest opacity-60">Total & Calorii</p>
            <p class="text-lg font-bold"><span id="total-price" class="gold">0.00</span> RON | <span id="total-kcal">0</span> kcal</p>
        </div>
        <button onclick="sendOrder()" class="bg-[#c5a059] text-black font-bold px-8 py-4 rounded-2xl text-xs uppercase tracking-widest hover:opacity-90 transition-all">Finalizare</button>
    </div>

    <script>
        let cart = { price: 0, kcal: 0, items: [] };

        function updateCart(name, price, kcal) {
            cart.price += price;
            cart.kcal += kcal;
            cart.items.push(name);
            document.getElementById('total-price').innerText = cart.price.toFixed(2);
            document.getElementById('total-kcal').innerText = cart.kcal;
        }

        async function sendOrder() {
            if(cart.price === 0) return alert("Selectează un produs!");

            // AICI PUI LINKUL DE WEBHOOK DIN MAKE.COM
            const WEBHOOK_URL = "AICI_PUII_LINKUL_DE_LA_MAKE";

            const res = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ...cart, timestamp: new Date().toLocaleString() })
            });

            if(res.ok) {
                alert("Comanda Metanoia a fost trimisă!");
                location.reload();
            }
        }
    </script>
</body>
</html>
