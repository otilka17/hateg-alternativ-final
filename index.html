<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metanoia Hub | Hațeg Alternativ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #1c1e21;
            --metanoia-green: #198754;
            --bg-light: #f0f2f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--primary-dark);
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://i.postimg.cc/T1cwPS07/la-buliga-pensiune.jpg'); /* Aici poți pune linkul de la imaginea generată */
            background-size: cover;
            background-position: center;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        /* FEED CARDS CSS */
        .feed-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: none;
            margin-bottom: 25px;
            transition: transform 0.2s;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
            overflow: hidden;
        }

        .feed-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f2f5;
        }

        .feed-avatar {
            width: 45px;
            height: 45px;
            background-color: var(--metanoia-green);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .feed-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
        }

        .feed-body { padding: 15px; }
        
        .feed-button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #f0f2f5;
            color: #050505;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
        }

        .feed-button:hover { background-color: #e4e6eb; }

        .navbar { background: rgba(255,255,255,0.95) !important; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">METANOIA HUB</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#concept">Concept</a></li>
                    <li class="nav-item"><a class="nav-link" href="#feed">Noutăți</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-success text-white px-4 ms-lg-3" href="#">Cere Ofertă</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="display-3 fw-bold mb-3">Metanoia Retreat</h1>
            <p class="lead mb-4">Portal spre transformare în inima Retezatului.</p>
        </div>
    </header>

    <section id="feed" class="py-5">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="fw-bold">Metanoia Live Stream</h2>
                <p class="text-muted">Momente, arome și acorduri din Totești</p>
            </div>
            
            <div id="metanoia-feed">
                <div class="text-center py-5" id="loader">
                    <div class="spinner-grow text-success" role="status"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-white py-4 border-top text-center text-muted">
        <p>© 2026 Metanoia Hub - Hațeg Alternativ. Toate drepturile rezervate.</p>
    </footer>

    <script>
        const tsvURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxemlkMdIB7S2NwCO4dbsNUpThHA388goatoSLGOzGDy4ZktNizTl9Eo9_QcbfYx2kuK1G-aG_kW9K/pub?gid=1405914163&single=true&output=tsv';

        async function loadFeed() {
            try {
                const response = await fetch(tsvURL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                const feedContainer = document.getElementById('metanoia-feed');
                let htmlContent = '';

                rows.forEach(row => {
                    const columns = row.split('\t');
                    if(columns.length >= 3) {
                        const [dataP, autor, mesaj, img, link] = columns;
                        htmlContent += `
                            <div class="feed-card">
                                <div class="feed-header">
                                    <div class="feed-avatar">${autor.trim().charAt(0)}</div>
                                    <div><h6 class="mb-0 fw-bold">${autor}</h6><small class="text-muted">${dataP}</small></div>
                                </div>
                                ${img && img.trim() !== "" ? `<img src="${img.trim()}" class="feed-image" onerror="this.style.display='none'">` : ''}
                                <div class="feed-body">
                                    <p class="feed-text">${mesaj}</p>
                                    ${link && link.trim() !== "" ? `<a href="${link.trim()}" class="feed-button">Descoperă</a>` : ''}
                                </div>
                            </div>
                        `;
                    }
                });
                document.getElementById('loader').style.display = 'none';
                feedContainer.innerHTML = htmlContent;
            } catch (e) { console.error(e); }
        }
        window.onload = loadFeed;
    </script>

    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
        var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
        s1.async=true;
        s1.src='https://embed.tawk.to/69c5607435e8d61c3a875f21/1jklg1i9s';
        s1.charset='UTF-8';
        s1.setAttribute('crossorigin','*');
        s0.parentNode.insertBefore(s1,s0);
        })();
    </script>

</body>
</html>
