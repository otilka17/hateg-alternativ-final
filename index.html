    <style>
        :root { --auriu: #c5a059; --negru: #070707; --crem: #f4f0e8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--crem); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HERO CU SLIDER DINAMIC[cite: 3] */
        .hero { 
            height: 100vh; position: relative; display: flex; align-items: center; justify-content: flex-start; 
            padding: 0 10%; overflow: hidden; background-color: var(--negru);
        }
        .hero-slider { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .slide { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center;
            opacity: 0; animation: slideAnim 18s infinite;
        }
        .slide::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); }
        .slide:nth-child(1) { background-image: url('images/rasarit.jpg'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('images/la-buliga-pensiune.jpg'); animation-delay: 6s; }

        @keyframes slideAnim {
            0% { opacity: 0; transform: scale(1); }
            10% { opacity: 1; }
            33% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0; }
        }

        .hero-content { position: relative; z-index: 2; border-left: 2px solid var(--auriu); padding-left: 40px; }
        .hero h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 8vw, 5rem); font-style: italic; color: var(--auriu); }

        /* BUTON ELITĂ */
        .btn-gold { 
            display: inline-block; padding: 18px 45px; border: 1px solid var(--auriu); 
            color: var(--auriu); font-family: 'Cinzel'; letter-spacing: 2px; text-decoration: none; 
            transition: 0.4s; margin-top: 30px;
        }
        .btn-gold:hover { background: var(--auriu); color: var(--negru); }

        /* WIDGET ELFSIGHT CONTAINER[cite: 3] */
        .widget-section { padding: 80px 5%; background: #0a0a0a; border-top: 1px solid #1a1a1a; }
        
        .footer-rule { text-align: center; padding: 40px; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--auriu); opacity: 0.6; }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-slider">
            <div class="slide"></div>
            <div class="slide"></div>
        </div>
        <div class="hero-content">
            <span style="font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 5px;">HAȚEG ALTERNATIV[cite: 3]</span>

            <p style="max-width: 600px; margin-top: 20px; color: #ccc;">Mai mult decât un loc. Un ecosistem complet pentru cei care caută rânduiala unei vieți trăite cu sens.[cite: 3]</p>
            <a href="curs.html" class="btn-gold">INTRĂ ÎN HUB</a>
        </div>
    </section>
