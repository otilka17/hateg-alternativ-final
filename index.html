    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { overflow-x: hidden; width: 100%; position: relative; background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; scroll-behavior: smooth; }

        a { text-decoration: none; }

        /* HEADER */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: clamp(15px, 5vw, 30px) clamp(15px, 5vw, 50px); display: flex; justify-content: space-between; align-items: center; }
        
        /* LOGO MAI MARE */
        .brand-logo svg { height: clamp(90px, 18vw, 150px); width: auto; filter: drop-shadow(0 0 15px rgba(0, 0, 0, 1)); }
        
        .header-controls { display: flex; align-items: center; gap: clamp(10px, 3vw, 30px); }
        .btn-reserve-header { padding: 10px 18px; border: 2px solid var(--auriu); color: var(--auriu) !important; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 1px; font-weight: 700; background: rgba(0,0,0,0.5); transition: 0.3s ease; }
        .btn-reserve-header:hover { background: var(--auriu); color: #000 !important; }

        .burger { cursor: pointer; z-index: 10001; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; }
        .burger div { width: 28px; height: 2px; background: var(--auriu); margin: 6px; }

        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 2rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-transform: uppercase; letter-spacing: 5px; text-shadow: 2px 2px 15px #000; }

        /* HERO */
        .hero-slider { width: 100%; height: 100vh; overflow: hidden; position: relative; }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; background: rgba(0,0,0,0.2); padding: 20px; }
        .hero-text h1 { 
            font-family: 'Playfair Display'; 
            font-size: clamp(2.5rem, 10vw, 7rem); 
            font-style: italic; color: var(--auriu); 
            text-shadow: 4px 4px 25px rgba(0,0,0,1), 0 0 50px rgba(0,0,0,0.8);
            line-height: 1.1;
        }

        .hero-subtitle {
            max-width: 900px;
            margin: 24px auto 0;
            color: #f5f5f5;
            font-size: clamp(1rem, 3.7vw, 1.35rem);
            line-height: 1.8;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.95);
            padding: 0 10px;
        }

        .hero-highlight {
            font-family:'Cinzel';
            color:var(--auriu);
            letter-spacing:8px;
            margin-top:20px;
            font-weight:700;
            text-shadow: 2px 2px 10px #000;
            font-size: clamp(0.8rem, 2.8vw, 1rem);
        }

        .hero-benefits {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 1100px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; z-index: 3;
        }

        .hero-benefit-item {
            background: rgba(0,0,0,0.45); border: 1px solid rgba(197,160,89,0.35);
            backdrop-filter: blur(2px); padding: 14px 16px; text-align: center;
        }

        .hero-benefit-item strong { display: block; font-family: 'Cinzel'; color: var(--auriu); font-size: 0.78rem; letter-spacing: 2px; margin-bottom: 6px; }
        .hero-benefit-item span { font-size: 0.9rem; color: #ddd; line-height: 1.4; }

        /* TRANSPORT */
        .road-advisory { background: #080808; border-top: 3px solid var(--auriu); border-bottom: 3px solid var(--auriu); padding: 60px 20px; text-align: center; }
        .road-inner { max-width: 1100px; margin: 0 auto; }
        .road-inner i { color: var(--auriu); font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 20px; display: block; }
        .road-text h3 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 5px; font-size: clamp(1.2rem, 5vw, 1.8rem); margin-bottom: 15px; font-weight: 900; }
        .road-text p { font-size: clamp(1.1rem, 4vw, 1.5rem); color: #fff; line-height: 1.6; margin-bottom: 10px; }

        /* WIDGETS SECTION (NOU) */
        .info-panel { padding: 80px 20px; background: #000; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1400px; margin: 0 auto; }
        .widget { border: 1px solid rgba(197, 160, 89, 0.2); padding: 35px; background: #0a0a0a; text-align: center; }
        .widget h3 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 3px; font-size: 1.2rem; margin-bottom: 25px; }
        .widget-content { color: #aaa; font-size: 0.95rem; }
        .gold-text { color: var(--auriu); font-weight: bold; }

        /* GRID EXPERIENTE */
        .container { width: 100%; max-width: 1450px; margin: 0 auto; padding: 60px 20px; }
        .grid-5 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 80px; }
        .card-item { height: clamp(450px, 70vh, 600px); position: relative; overflow: hidden; display: block; border: 1px solid #1a1a1a; background: #000; }
        .card-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.65; transition: 1s ease; }
        .card-item:hover img { transform: scale(1.05); opacity: 0.78; }
        .card-info { position: absolute; bottom: 0; padding: 30px 20px; width: 100%; background: linear-gradient(to top, rgba(0,0,0,1) 40%, transparent); text-align: center; }
        .card-info h4 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 3px; font-size: 1.1rem; margin-bottom: 10px; text-shadow: 2px 2px 5px #000; }

        /* CALENDAR */
        .calendar-section { padding: 80px 20px; background: #050505; border-top: 1px solid #111; }
        .calendar-timeline { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 60px; }
        .event-row { display: flex; flex-direction: column; gap: 30px; align-items: center; text-align: center; margin-bottom: 40px; }
        .event-card { width: 100%; background: #0d0d0d; border: 1px solid #1a1a1a; overflow: hidden; }
        .event-card img { width: 100%; height: 300px; object-fit: cover; opacity: 0.8; }
        .date-badge { font-family: 'Cinzel'; color: var(--auriu); font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; display: block; }
        .event-info-box h2 { font-family: 'Playfair Display'; font-size: 2.2rem; font-style: italic; color: #fff; margin-bottom: 20px; }
        .btn-action { display: inline-block; padding: 14px 30px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; transition: 0.3s ease; }
        .btn-action:hover { background: var(--auriu); color: #000; }

        /* FOOTER */
        footer { padding: 80px 20px; text-align: center; background: #000; border-top: 1px solid #111; }
        .footer-legal { margin: 25px 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .footer-legal a { font-family: 'Cinzel'; font-size: 0.75rem; color: #666 !important; letter-spacing: 2px; font-weight: 700; }

        .whatsapp-float { position: fixed; bottom: 25px; left: 25px; background: #25d366; border-radius: 50%; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 35px; z-index: 1001; color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        @media (min-width: 950px) {
            .event-row { flex-direction: row; text-align: left; }
            .event-row.reverse { flex-direction: row-reverse; }
            .event-card { width: 50%; }
            .event-info-box { width: 50%; padding-left: 50px; }
        }

        @media (max-width: 768px) {
            .hero-benefits { position: static; transform: none; margin: 24px auto 0; width: 100%; padding: 0 20px 20px; }
        }
    </style>
</head>
