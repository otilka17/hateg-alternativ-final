<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | La Buligă</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #000; --alb: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .site-header { position: absolute; top: 0; width: 100%; z-index: 999; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand svg { width: 45px; height: 45px; }
        .brand-text { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--auriu); letter-spacing: 2px; font-weight: 700; }
        .burger { cursor: pointer; z-index: 1001; }
        .burger div { width: 25px; height: 2px; background: var(--auriu); margin: 5px; transition: 0.3s; }
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.4s; z-index: 1000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.5rem; font-family: 'Cinzel'; margin: 15px 0; color: var(--alb); letter-spacing: 2px; text-decoration: none; }
        .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('images/rasarit.jpg') center/cover; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 6rem); color: var(--auriu); font-style: italic; }
        .hero p { font-family: 'Cinzel'; letter-spacing: 3px; font-size: 0.9rem; }
        .grid-lux { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card-lux { height: 400px; display: flex; flex-direction: column; justify-content: flex-end; padding: 25px; position: relative; overflow: hidden; background-size: cover; background-position: center; border: 1px solid #111; }
        .card-lux::before { content: ""; position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        .card-content { position: relative; z-index: 2; }
        .card-content h3 { font-family: 'Cinzel'; color: var(--auriu); margin-bottom: 10px; }
        .btn-gold { display: inline-block; padding: 10px 20px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-size: 0.7rem; text-decoration: none; transition: 0.3s; }
        .btn-gold:hover { background: var(--auriu); color: #000; }
        .whatsapp-float { position: fixed; bottom: 25px; left: 20px; background: #25d366; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; z-index: 1000; }
    </style>
</head>
<body>
    <a href="https://wa.me/40749229686" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <header class="site-header">
        <div class="brand">
            <svg viewBox="0 0 800 500"><path d="M300 400 L400 200 L500 400 Z" fill="#c5a059"/></svg>
            <div class="brand-text">Hațeg Alternativ</div>
        </div>
        <div class="burger" id="burger"><div></div><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">ACASĂ</a>
            <a href="pensiune.html">PENSIUNEA</a>
            <a href="gastronomie.html">GASTRONOMIE</a>
            <a href="metanoia.html">METANOIA</a>
            <a href="evenimente.html">EVENIMENTE</a>
            <a href="contact.html">CONTACT</a>
            <a href="rezervari.html">REZERVARE</a>
        </nav>
    </header>

    <section class="hero">
        <h1>La Buligă.</h1>
        <p>Rânduiala veche în munte</p>
    </section>

    <div class="grid-lux">
        <div class="card-lux" style="background-image: url('images/la-buliga-pensiune.jpg');">
            <div class="card-content">
                <h3>PENSIUNEA</h3>
                <a href="pensiune.html" class="btn-gold">DESCOPERĂ CASA</a>
            </div>
        </div>
        <div class="card-lux" style="background-image: url('images/gast-masa-traditionala.jpg');">
            <div class="card-content">
                <h3>GASTRONOMIE</h3>
                <a href="gastronomie.html" class="btn-gold">DETALII MENIU</a>
            </div>
        </div>
        <div class="card-lux" style="background-image: url('images/hero-premium.jpg');">
            <div class="card-content">
                <h3>METANOIA</h3>
                <a href="metanoia.html" class="btn-gold">MANIFEST</a>
            </div>
        </div>
        <div class="card-lux" style="background-image: url('images/index-mancare.jpg');">
            <div class="card-content">
                <h3>EVENIMENTE</h3>
                <a href="evenimente.html" class="btn-gold">VEZI MOMENTE</a>
            </div>
        </div>
        <div class="card-lux" style="background-image: url('images/jeep.jpg');">
            <div class="card-content">
                <h3>CONTACT</h3>
                <a href="contact.html" class="btn-gold">SUNTEM AICI</a>
            </div>
        </div>
    </div>

    <script>
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        burger.onclick = () => { nav.classList.toggle('active'); }
    </script>
</body>
</html>
