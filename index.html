<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Acasă</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #1a1a1a; --crem: #fdfcf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--negru); padding-top: 130px; line-height: 1.6; }

        /* HEADER UNIFICAT CU CONTACT */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #eee; }
        .top-announcement { background: var(--auriu); color: #fff; text-align: center; padding: 8px 0; font-size: 0.6rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }
        .nav-container { max-width: 1240px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; height: 80px; }
        
        .logo-wrapper { display: flex; align-items: center; text-decoration: none; color: var(--negru); }
        .logo-wrapper img { height: 45px; width: auto; margin-right: 12px; }
        .brand-text h1 { font-family: 'Playfair Display', serif; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }

        .main-nav { display: flex; align-items: center; gap: 20px; }
        .main-nav a { text-decoration: none; color: var(--negru); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .main-nav a:hover { color: var(--auriu); }
        .cta-nav { border: 1px solid var(--negru); padding: 10px 18px !important; }
        .cta-nav:hover { background: var(--negru); color: #fff !important; }

        /* BANNER */
        .trans-hero { width: 100%; border-bottom: 5px solid var(--auriu); line-height: 0; }
        .trans-hero img { width: 100%; height: auto; }

        /* GRID */
        .grid-section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .grid-item { position: relative; overflow: hidden; height: 350px; border-bottom: 3px solid var(--auriu); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .grid-item:hover img { transform: scale(1.05); }
        .grid-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: #fff; padding: 15px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 1100px) {
            body { padding-top: 180px; }
            .nav-container { flex-direction: column; height: auto; padding: 20px; gap: 15px; }
            .main-nav { flex-wrap: wrap; justify-content: center; gap: 10px; }
        }
    </style>
</head>
