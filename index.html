<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">

    <title>Hațeg Alternativ | Simte, trăiește tăcerea</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --auriu: #c5a059; --negru: #000000; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        a { text-decoration: none !important; color: inherit !important; }

        /* HEADER & MENU */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo svg { height: 70px; width: auto; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.4)); }
        
        .burger { cursor: pointer; z-index: 10001; padding: 10px; }
        .burger div { width: 30px; height: 2px; background: var(--auriu); margin: 6px; transition: 0.3s; }
        
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s ease; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-transform: uppercase; letter-spacing: 4px; }
        .main-nav a:hover { color: var(--auriu) !important; }

        /* HERO SLIDER CU TEXTUL TĂU */
        .gallery-viewport { width: 100%; height: 100vh; overflow: hidden; position: relative; }
        .gallery-track { display: flex; width: 100%; height: 100%; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .gallery-slide { min-width: 100%; height: 100%; }
        .gallery-slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%); }
        .hero-text h1 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 10vw, 6.5rem); font-style: italic; color: var(--auriu); margin-bottom: 20px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero-text p { font-family: 'Cinzel'; letter-spacing: 8px; font-size: 1rem; color: #fff; text-transform: uppercase; }

        /* INTRO */
        .container { max-width: 1400px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        .intro-box { max-width: 900px; margin: 0 auto 80px; }
        .intro-box h2 { font-family: 'Playfair Display'; font-style: italic; font-size: clamp(1.8rem, 5vw, 3.2rem); margin-bottom: 30px; line-height: 1.2; }
        .intro-box p { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 5px; font-size: 0.9rem; }

        /* CELE 5 CARDURI */
        .grid-5 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 100px; }
        .card-item { height: 500px; position: relative; overflow: hidden; border: 1px solid #111; display: block; }
        .card-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.35; transition: 1.5s ease; }
        .card-item:hover img { opacity: 0.7; transform: scale(1.08); }
        .card-info { position: absolute; bottom: 0; padding: 35px; text-align: left; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); width: 100%; }
        .card-info h4 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 3px; margin-bottom: 10px; font-size: 1.1rem; }
        .card-info p { font-size: 0.85rem; color: #bbb; }

        /* CALENDAR EVENIMENTE */
        .event-row { display: grid; grid-template-columns: 120px 1fr 180px; gap: 20px; align-items: center; padding: 25px; border: 1px solid #1a1a1a; background: #050505; margin-bottom: 15px; transition: 0.3s; text-align: left; }
        .event-row:hover { border-color: var(--auriu); }

        /* UTILS: VREMEA & CALENDAR */
        .utils-wrap { background: #050505; padding: 80px 20px; border-top: 1px solid #111; border-bottom: 1px solid #111; }
        .utils-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1100px; margin: 0 auto; }
        .util-box { border: 1px solid #1a1a1a; padding: 40px; text-align: center; }
        .util-box h4 { font-family: 'Cinzel'; color: var(--auriu); margin-bottom: 25px; letter-spacing: 3px; }

        /* MAP */
        .map-section { padding: 100px 20px; text-align: center; }
        .map-container { height: 500px; width: 100%; max-width: 1200px; margin: 40px auto; border: 1px solid #1a1a1a; filter: grayscale(100%) invert(92%) contrast(110%); }

        .btn-gold { display: inline-block; padding: 15px 35px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 2px; transition: 0.4s; background: transparent; cursor: pointer; }
        .btn-gold:hover { background: var(--auriu); color: #000 !important; }
