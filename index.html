<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Moștenirea de Aur</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --auriu: #c5a059; 
            --negru: #050505; 
            --gri-card: #0d0d0d; 
            --tranzitie: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { background: var(--negru); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }

        /* HEADER */
        .site-header { 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            padding: 30px 60px;
            display: flex; justify-content: space-between; align-items: center;
            transition: var(--tranzitie);
        }
        
        .site-header.scrolled {
            padding: 15px 60px;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }
        
        .brand { font-weight: 900; letter-spacing: 6px; text-transform: uppercase; font-size: 0.85rem; color: #fff; text-decoration: none; }
        .main-nav a { text-decoration: none; color: #fff; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-left: 35px; letter-spacing: 2px; opacity: 0.6; transition: var(--tranzitie); }
        .main-nav a:hover { opacity: 1; color: var(--auriu); }
        .btn-res { border: 1px solid rgba(255,255,255,0.2); padding: 12px 25px; margin-left: 40px !important; opacity: 1 !important; }
        .btn-res:hover { background: var(--auriu); color: #000 !important; border-color: var(--auriu); }

        /* HERO SLIDER */
        .hero-slider { width: 100%; height: 100vh; position: relative; overflow: hidden; }
        .slider-track { display: flex; width: 400%; height: 100%; animation: slide-anim 28s infinite ease-in-out; }
        .slide { width: 25%; height: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slide-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; animation: kenburns 14s infinite alternate; z-index: 0; }
        .slide::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%); z-index: 1; }
