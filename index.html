<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --gri: #111; --alb: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; }
        .site-header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(197,160,89,0.3); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Cinzel'; color: var(--auriu); font-weight: 900; text-decoration: none; }
        .main-container { max-width: 1200px; margin: 120px auto 50px; display: grid; grid-template-columns: 1fr 400px; gap: 40px; padding: 20px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: #fff; margin-bottom: 15px; }
        .extras-section { border: 1px solid #222; padding: 20px; margin-bottom: 20px; }
        .extra-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.85rem; }
        .extra-item input { width: auto; margin-right: 15px; margin-bottom: 0; }
        .summary-side { background: var(--gri); border: 1px solid var(--auriu); padding: 30px; position: sticky; top: 120px; }
        .sum-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .total-price { font-family: 'Playfair Display'; font-size: 2rem; color: var(--auriu); font-style: italic; }
        .btn-send { background: var(--auriu); color: #000; padding: 20px; cursor: pointer; border: none; width: 100%; font-family: 'Cinzel'; font-weight: 900; }
    </style>
</head>
<body>
    <header class="site-header"><a href="index.html" class="brand">HAȚEG ALTERNATIV</a></header>
    <div class="main-container">
        <div class="form-side">
            <h2 style="font-family:'Cinzel'; color:var(--auriu); margin-bottom:20px;">REZERVARE</h2>
            <form id="bookingForm" action="https://formspree.io/f/xjgpvbkj" method="POST">
                <input type="text" name="Nume" placeholder="Numele tău" required>
                <input type="text" name="Telefon" placeholder="Telefon / WhatsApp" required>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="date" id="checkin" name="Check-in" required title="Check-in">
                    <input type="date" id="checkout" name="Check-out" required title="Check-out">
                </div>
                <select id="pachet_base" name="Pachet" required>
                    <option value="0" disabled selected>Alege Pachetul</option>
                    <option value="2000" data-nume="Rânduiala Veche">Rânduiala Veche (2000 RON/noapte)</option>
                    <option value="4000" data-nume="Metanoia All-In">Metanoia All-In (4000 RON/noapte)</option>
                </select>
                <div class="extras-section">
                    <p style="font-family:'Cinzel'; font-size:0.7rem; color:var(--auriu); margin-bottom:10px;">SUPLIMENTE</p>
                    <label class="extra-item"><input type="checkbox" class="extra-cb" value="600"> Tur Nomad 4x4 (600 RON)</label>
                    <label class="extra-item"><input type="checkbox" class="extra-cb" value="500"> Atelier Gastro (500 RON)</label>
                    <label class="extra-item"><input type="checkbox" class="extra-cb" value="400"> Zi la Stâne (400 RON)</label>
                    <label class="extra-item"><input type="checkbox" class="extra-cb" value="300"> Atelier E-Bike (300 RON)</label>
                </div>
                <button type="submit" class="btn-send">TRIMITE CEREREA</button>
            </form>
        </div>
        <div class="summary-side">
            <h3 style="font-family:'Cinzel'; color:var(--auriu); margin-bottom:20px; text-align:center;">SUMAR</h3>
            <div class="sum-row"><span>Nopți:</span> <span id="res_nopti">0</span></div>
            <div class="sum-row"><span>Pachet:</span> <span id="res_pachet">-</span></div>
            <div class="sum-row"><span>Suplimente:</span> <span id="res_extras">0 RON</span></div>
            <div style="border-top:1px solid var(--auriu); margin-top:20px; padding-top:20px; display:flex; justify-content:space-between; align-items:center;">
                <span>TOTAL:</span> <span id="res_total" class="total-price">0 RON</span>
            </div>
        </div>
    </div>
    <script>
        const cin = document.getElementById('checkin'), cout = document.getElementById('checkout');
        const pack = document.getElementById('pachet_base'), ex = document.querySelectorAll('.extra-cb');
        function calc() {
            const d1 = new Date(cin.value), d2 = new Date(cout.value);
            let n = (d1 && d2 && d2 > d1) ? Math.ceil((d2-d1)/(1000*60*60*24)) : 0;
            let pb = parseInt(pack.value) || 0, pe = 0;
            ex.forEach(c => { if(c.checked) pe += parseInt(c.value); });
            document.getElementById('res_nopti').innerText = n;
            document.getElementById('res_pachet').innerText = pack.options[pack.selectedIndex].getAttribute('data-nume') || "-";
            document.getElementById('res_extras').innerText = pe + " RON";
            document.getElementById('res_total').innerText = (n * pb) + pe + " RON";
        }
        [cin, cout, pack].forEach(el => el.addEventListener('change', calc));
        ex.forEach(c => c.addEventListener('change', calc));
    </script>
</body>
</html>
