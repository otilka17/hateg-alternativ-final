        .site-header { position: fixed; top: 0; width: 100%; z-index: 2000; background: rgba(255,255,255,0.98); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 0; }

            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            text-align: center; 
            transition: background-image 1.5s ease-in-out;
            position: relative;
        }
        #hero-slider::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; padding: 0 20px; }

        /* BLESSING */
        .section-blessing { padding: 100px 20px; text-align: center; }
        .blessing-box { max-width: 600px; margin: 0 auto; padding: 40px; border: 1px solid rgba(197,160,89,0.3); }
        .blessing-img { width: 150px; margin-bottom: 25px; }

        /* JURNAL LIVE */
        #jurnal-live { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
        .jurnal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .post-card { background: white; border: 1px solid #eee; overflow: hidden; transition: 0.3s; }
        .post-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
