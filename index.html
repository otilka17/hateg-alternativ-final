<html lang="ro">

    <style>
        :root { 
            --auriu: #c5a059; 
            --negru: #050505; 
            --gri-card: #0d0d0d; 
            --tranzitie: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { background: var(--negru); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }

        /* HEADER MASIV */
        .site-header { 
            position: fixed; top: 0; width: 100%; z-index: 3000; 
            padding: 40px 60px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            transition: var(--tranzitie);
        }
        .site-header.scrolled {
            padding: 20px 40px;
            background: rgba(5, 5, 5, 0.98);
            border-bottom: 2px solid var(--auriu);
        }
        
        .brand { z-index: 4000; }
        .brand img { 
            height: 90px; /* Desktop size */
            width: auto; 
            display: block;
        }

        /* BURGER PENTRU DEGETE MARI */
        .burger { display: none; cursor: pointer; z-index: 4000; padding: 15px; }
        .burger div { width: 50px; height: 6px; background: var(--auriu); margin: 8px; transition: 0.3s; border-radius: 10px; }

        /* NAV DESKTOP */
        .main-nav { display: flex; align-items: center; }
        .main-nav a {

        .btn-res { border: 3px solid var(--auriu); padding: 15px 35px; color: var(--auriu) !important; opacity: 1 !important; }

        .hero-slider { width: 100%; height: 100vh; position: relative; overflow: hidden; }

        .hero-content { position: relative; z-index: 10; text-align: center; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 12vw, 8rem); font-weight: 900; font-style: italic; line-height: 1.1; }

        /* CONTAINER */
        .container { padding: 120px 50px; max-width: 1400px; margin: 0 auto; }

        .pensiune-img { flex: 1; min-width: 400px; height: 600px; background: var(--gri-card); border: 2px solid #222; }
        .pensiune-img img { width: 100%; height: 100%; object-fit: cover; }
        .pensiune-text h2 { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--auriu); margin-bottom: 30px; font-style: italic; }
        .pensiune-text p { font-size: 1.5rem; color: #bbb; }

        .p-card-img { height: 400px; }

        .p-content { padding: 60px 40px; text-align: center; }
