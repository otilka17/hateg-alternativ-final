<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #0a0a0a; --auriu: #9d8665; --gri: #eeeeee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: var(--negru); }

        /* Meniu */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 3000; background: #fff; border-bottom: 1px solid #eee; padding: 15px 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .brand { font-weight: 600; font-size: 0.8rem; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 3px; }
        .main-nav a { text-decoration: none; color: #000; font-size: 0.6rem; text-transform: uppercase; margin-left: 15px; opacity: 0.6; }

        /* Sectiunea de sus - Am facut-o mai mica (60% din ecran) sa nu mai fie doar alb */
        .hero { 
            height: 60vh; width: 100%; display: flex; align-items: center; justify-content: center; 
            background: var(--gri) url('IMG-20260326-WA0005.jpg') center/cover no-repeat;
            margin-top: 50px;
        }
        .hero-content { text-align: center; color: #000; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-style: italic; }

        /* Container poze si text */
        .content { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        .intro { text-align: center; margin-bottom: 50px; }
        .intro h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; }

        /* COLAJUL TAU - Aici trebuie sa fie poza cu panoul */
        .main-image { width: 100%; margin-bottom: 60px; border: 1px solid #ddd; }
        .main-image img { width: 100%; height: auto; display: block; }

        /* Sectiuni editoriale */
        .box { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin-bottom: 80px; }
        .img-placeholder { width: 100%; height: 400px; background: var(--gri); background-size: cover; background-position: center; }
        .text-box h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 15px; }
        .btn { text-decoration: none; color: var(--auriu); font-weight: 600; border-bottom: 1px solid var(--auriu); font-size: 0.8rem; text-transform: uppercase; }

        @media (max-width: 768px) {
            .box { grid-template-columns: 1fr; }
            .nav-container { flex-direction: column; gap: 10px; }
            .hero { height: 40vh; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">
            <a href="index.html" class="brand">HAȚEG ALTERNATIV</a>
            <nav class="main-nav">
                <a href="obiective.html">Obiective</a>
                <a href="gastronomie.html">Mâncare</a>
                <a href="rezervari.html">Rezervări</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Simte. Descoperă.</h1>
        </div>
    </section>

    <div class="content">
        <div class="intro">
            <h2>Arhitectura Liniștii</h2>
            <p>Domeniile la Buligă & Hațeg Alternativ</p>
        </div>

        <div class="main-image">
            <img src="961c2090-bedc-45f8-a03a-0d7e41743008.jpeg" alt="Colaj principal">
        </div>

        <div class="box">
            <div class="img-placeholder" style="background-image: url('IMG-20260326-WA0020.jpg');"></div>
            <div class="text-box">
                <span>RECOMANDARE</span>
                <h2>Domeniile la Buligă</h2>
                <p>Unde-i credință, acolo-i dragoste. Unde-i dragoste, acolo-i pace.</p><br>
                <a href="rezervari.html" class="btn">Vezi detalii</a>
            </div>
        </div>
    </div>

</body>
</html>
