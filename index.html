<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Moștenirea de Aur</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --auriu: #ffd700; --negru: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* HEADER */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 99; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand svg { height: 70px; filter: drop-shadow(0 0 10px var(--auriu)); }
        .btn-reserve { padding: 10px 15px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-size: 0.7rem; text-decoration: none; }

        /* HERO */
        .hero { height: 85vh; background: #000; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; }
        /* AICI AM PUS LINK DIRECT */
        .hero-bg { position: absolute; inset: 0; background: url('https://raw.githubusercontent.com/otilka17/otilka17.github.io/main/images/hero-premium.jpg') center/cover; opacity: 0.6; }
        .hero h1 { position: relative; font-family: 'Playfair Display'; font-style: italic; font-size: clamp(2.5rem, 8vw, 5rem); color: var(--auriu); text-shadow: 2px 2px 15px black; }

        /* PACHETE */
        .section-title { text-align: center; font-family: 'Cinzel'; color: var(--auriu); padding: 60px 20px 20px; letter-spacing: 5px; }
        .grid-pachete { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .pachet-card { background: #080808; border: 1px solid #1a1a1a; padding-bottom: 20px; text-align: center; }
        .p-img { height: 250px; background-size: cover; background-position: center; margin-bottom: 20px; }
        .pachet-card h3 { font-family: 'Cinzel'; color: var(--auriu); margin-bottom: 10px; }
        .price { font-size: 1.5rem; font-weight: 900; display: block; margin-bottom: 15px; }

        /* EXPERIENTE */
        .grid-exp { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto 100px; }
        .exp-card { height: 400px; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 20px; text-decoration: none; border: 1px solid #111; }
        .exp-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, black); }
        .exp-card h3 { position: relative; font-family: 'Playfair Display'; color: var(--auriu); font-size: 2rem; font-style: italic; }

        footer { padding: 80px; text-align: center; opacity: 0.3; font-family: 'Cinzel'; color: var(--auriu); font-size: 0.7rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="brand">
            <svg viewBox="0 0 800 800"><path d="M300 450 L400 250 L500 450 Z" fill="#ffd700"/><text x="400" y="750" font-family="'Cinzel'" text-anchor="middle" font-size="45" fill="#ffd700">HAȚEG ALTERNATIV</text></svg>
        </div>
        <a href="rezervare.html" class="btn-reserve">REZERVĂRI</a>
    </header>

    <section class="hero">
        <div class="hero-bg"></div>
        <h1>Tihna rânduită.</h1>
    </section>

    <h2 class="section-title">PACHETE</h2>
    <div class="grid-pachete">
        <div class="pachet-card">
            <div class="p-img" style="background-image: url('https://raw.githubusercontent.com/otilka17/otilka17.github.io/main/images/la-buliga-pensiune.jpg');"></div>
            <h3>Cazare Integrală</h3>
            <span class="price">2000 RON</span>
            <a href="rezervare.html" class="btn-reserve">SELECTEAZĂ</a>
        </div>
        <div class="pachet-card">
            <div class="p-img" style="background-image: url('https://raw.githubusercontent.com/otilka17/otilka17.github.io/main/images/index-mancare.jpg');"></div>
            <h3>Cazare + Mese</h3>
            <span class="price">3000 RON</span>
            <a href="rezervare.html" class="btn-reserve">SELECTEAZĂ</a>
        </div>
        <div class="pachet-card">
            <div class="p-img" style="background-image: url('https://raw.githubusercontent.com/otilka17/otilka17.github.io/main/images/hero-camp-munti.jpg');"></div>
            <h3>Metanoia All-In</h3>
            <span class="price">4000 RON</span>
            <a href="rezervare.html" class="btn-reserve">SELECTEAZĂ</a>
        </div>
    </div>

    <div class="grid-exp">
        <a href="experiente.html" class="exp-card" style="background-image: url('https://raw.githubusercontent.com/otilka17/otilka17.github.io/main/images/jeep.jpg');">
            <h3>Aventură</h3>
        </a>
        <a href="experiente.html" class="exp-card" style="background-image: url('https://raw.githubusercontent.com/otilka17/otilka17.github.io/main/images/floripepanza.JPG');">
            <h3>Atelier</h3>
        </a>
    </div>

    <footer>HAȚEG ALTERNATIV &copy; 2026</footer>

    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true; s1.src='https://embed.tawk.to/642944b54247f20fefea97df/1gsvek60a';
            s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>
</body>
</html>
