<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Moștenirea de Aur</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --auriu-gold: #ffd700; 
            --negru-pur: #0a0a0a; /* Gri extrem de închis, mai bun în soare decât 000 */
            --alb: #ffffff;
            --overlay-card: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.85) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru-pur); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .brand svg { height: 130px; width: auto; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
        .burger { cursor: pointer; z-index: 10000; padding: 10px; }
        .burger div { width: 35px; height: 2px; background: var(--auriu-gold); margin: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        /* NAV OVERLAY */
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); z-index: 9500; }
        .main-nav.active { right: 0; }
        .main-nav a { text-decoration: none; color: #fff; font-size: 3rem; font-family: 'Cinzel'; margin: 15px 0; letter-spacing: 5px; }

        /* HERO SLIDER */
        .hermes-viewport { position: relative; width: 100%; height: 100vh; overflow: hidden; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 2s; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; visibility: visible; }
        .slide-bg { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .slide-overlay { position: absolute; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%); z-index: 2; }
        .slide-content h1 { position: relative; z-index: 10; font-family: 'Playfair Display', serif; font-size: clamp(4rem, 12vw, 10rem); font-style: italic; color: var(--auriu-gold); text-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* MANIFEST */
        .manifest-section { padding: 120px 30px; text-align: center; max-width: 1200px; margin: 0 auto; }
        .manifest-section h2 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--auriu-gold); letter-spacing: 12px; margin-bottom: 40px; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .manifest-section p { font-family: 'Playfair Display'; font-size: clamp(2rem, 5vw, 4rem); font-style: italic; line-height: 1.1; color: var(--alb); margin-bottom: 30px; }
        .manifest-section .sub-text { font-family: 'Inter'; font-size: 1.1rem; color: #aaa; letter-spacing: 4px; margin-top: 20px; font-weight: 400; }

        /* GRILA ACTIVITATI */
        .grid-lux { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 40px; max-width: 1600px; margin: 0 auto; }
        .card-lux { height: 500px; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 25px; border: 1px solid #222; position: relative; overflow: hidden; text-decoration: none; transition: 0.5s; background-size: cover; background-position: center; }
        .card-lux::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--overlay-card); z-index: 1; }
        .card-lux h3 { font-family: 'Playfair Display'; font-size: 2.4rem; color: var(--auriu-gold); margin-bottom: 10px; font-style: italic; position: relative; z-index: 5; text-shadow: 2px 2px 10px rgba(0,0,0,1); }
        .card-lux p { color: #fff; font-size: 1rem; margin-bottom: 25px; position: relative; z-index: 5; text-shadow: 1px 1px 5px #000; font-weight: 400; }

        /* FORUM REZERVARE */
        .forum-section { padding: 100px 30px; background: #080808; border-top: 1px solid #1a1a1a; }
        .forum-container { max-width: 800px; margin: 0 auto; }
        .forum-container h2 { font-family: 'Cinzel'; font-size: 2rem; color: var(--auriu-gold); text-align: center; margin-bottom: 50px; letter-spacing: 5px; }
        .forum-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .forum-form input, .forum-form select, .forum-form textarea { background: #000; border: 1.5px solid #333; padding: 18px; color: #fff; font-family: 'Inter', sans-serif; outline: none; transition: 0.3s; font-size: 1rem; }
        .forum-form input:focus, .forum-form select:focus, .forum-form textarea:focus { border-color: var(--auriu-gold); }
        .forum-form textarea { grid-column: span 2; }
        .forum-form button { grid-column: span 2; cursor: pointer; font-weight: 700; background: rgba(255, 215, 0, 0.05); }
