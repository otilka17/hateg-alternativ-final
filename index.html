<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #1a1a1a; --auriu: #c5a059; --crem: #fdfcf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); color: var(--negru); line-height: 1.6; overflow-x: hidden; }

        /* HEADER ELEGANT */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 3000; background: rgba(255,255,255,0.98); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 12px 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; text-decoration: none; color: var(--negru); text-transform: uppercase; letter-spacing: 1px; }
        .main-nav { display: flex; gap: 15px; }
        .main-nav a { text-decoration: none; color: var(--negru); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .main-nav a:hover { color: var(--auriu); }

        /* HERO - CETATEA COLȚ / POZA TA PRINCIPALĂ */
        .hero { 
            height: 100vh; 
            /* Aici am pus calea către poza cu Cetatea sau prima ta poză de impact */
            background: #1a1a1a linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('images/cetatea-colt.jpg'); 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            text-align: center; 
            padding: 0 20px; 
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 4rem); font-style: italic; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* SECȚIUNEA BINECUVÂNTARE & COLAJE */
        .mosaic-section { padding: 80px 15px; text-align: center; background: white; }
        .blessing-content { max-width: 800px; margin: 0 auto 50px auto; }
        .blessing-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: #333; margin: 20px 0; line-height: 1.4; }
        
        .collage-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 15px; 
            border: 1px solid var(--auriu); 
            background: #fdfcf8; 
            border-radius: 2px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
        }
        .collage-container img { width: 100%; height: auto; display: block; filter: contrast(1.05); }

        /* BUTON REZERVARE MOBIL / WHATSAPP */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 2px 2px 15px rgba(0,0,0,0.2); z-index: 4000; text-decoration: none; }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 15px; }
            .main-nav { flex-wrap: wrap; justify-content: center; gap: 10px; }
            .hero h1 { font-size: 2.5rem; }
            .blessing-quote { font-size: 1.2rem; }
            .mosaic-section { padding: 50px 15px; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">

    <section class="hero">
        <p style="letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 15px; font-weight: 300;">Hațeg Alternativ | Est. 2026</p>
        <h1>Simte. Explorează. Trăiește.</h1>
    </section>

    <section class="mosaic-section">
        <div class="blessing-content">
            <span style="font-size: 0.7rem; letter-spacing: 4px; color: var(--auriu); font-weight: 700; text-transform: uppercase;">Spiritul Casei</span>
            <p class="blessing-quote">
                "Unde-i credință, acolo-i dragoste,<br>
                Unde-i dragoste, acolo-i pace,<br>
                Unde-i pace, acolo-i binecuvântare."
            </p>
            <h2 style="font-family: serif; font-size: 1.8rem; font-style: italic; color: var(--auriu); font-weight: 400;">Tihna și Liniștea de la Domenii</h2>
        </div>
        
        <div class="collage-container">
            <img src="images/collage-final.png" alt="Colaj Experiențe Domeniile la Buligă">
        </div>
    </section>

    <a href="https://wa.me/40749229686" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
