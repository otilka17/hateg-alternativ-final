<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hațeg Alternativ | Simte tăcerea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS SIGNATURE: ROZ-CREM-AURIU (Integrat) */
        :root { --verde: #1b3022; --auriu: #c5a059; --roz-pal: #fdf2f0; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--roz-pal); color: var(--verde); line-height: 1.6; padding-top: 80px; overflow-x: hidden; }
        
        h1, h2, h3, .brand-text { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: none; }
        .italic-style { font-style: italic; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header Transparent & Soft */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 1500; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-wrap { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .brand { text-decoration: none; color: var(--verde); font-size: 1.3rem; }
        .main-nav a { text-decoration: none; color: var(--verde); font-size: 1.05rem; font-family: 'Playfair Display', serif; font-style: italic; margin-left: 25px; transition: 0.3s; }
        .main-nav a:hover { color: var(--auriu); }

        /* Hero Image - MUNTELE TĂU SUPERB */
        .hero-image {
            min-height: 85vh;
            display: flex; align-items: center; justify-content: center; text-align: center; color: var(--alb);
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.15)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
        }
        .hero-image h1 { font-size: clamp(3.8rem, 12vw, 6.5rem); margin-bottom: 15px; text-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hero-image p { font-size: 1.5rem; font-family: 'Playfair Display', serif; font-style: italic; margin-bottom: 45px; opacity: 0.95; }

        /* Butoane */
        .btn-gold { background: var(--auriu); color: white; padding: 18px 45px; border-radius: 60px; text-decoration: none; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .btn-gold:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(197,160,89,0.25); }

        /* WhatsApp Minimalist */
        .wa-contact { position: fixed; bottom: 40px; left: 40px; color: var(--alb); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; z-index: 100; text-transform: uppercase; border-bottom: 1px solid var(--auriu); padding-bottom: 5px; opacity: 0.8; transition: 0.3s; }
        .wa-contact:hover { opacity: 1; color: var(--auriu); }

        @media (max-width: 768px) { .main-nav { display: none; } .hero-image h1 { font-size: 4.5rem; } }
    </style>
</head>
<body>

<header class="site-header">

            <a href="obiective.html">Obiective</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div style="font-family: 'Playfair Display', serif; font-style: italic; color: var(--auriu);">Est. 2026</div>
    </div>
</header>

<section class="hero-image">
    <div class="container hero-content">
        <h1 class="italic-style">Simte tăcerea.</h1>
        <p>O selecție de refugii și puncte gastronomice în inima Transilvaniei</p>
        <a href="pensiuni.html" class="btn-gold">Explorează Colecția</a>
    </div>
</section>
