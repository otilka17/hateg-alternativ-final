        <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Signature Dark</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --auriu: #c5a059; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background: #000; color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER TRANSPARENT EDITORIAL */
        .site-header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 25px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-weight: 900; letter-spacing: 4px; text-transform: uppercase; font-size: 1.1rem; color: #fff; text-decoration: none; }
        .main-nav a { text-decoration: none; color: #fff; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; margin-left: 20px; opacity: 0.8; }

        /* HERO SLIDER FULLSCREEN */
        .hero-slider { width: 100%; height: 100vh; position: relative; overflow: hidden; }

        .slider-track {
            display: flex; width: 400%; height: 100%;
            animation: slide-anim 24s infinite ease-in-out;
        }

        .slide {
            width: 25%; height: 100%;
            background-size: cover; background-position: center;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        /* UMBRA ERMES - ACUM E REGLATĂ SĂ SE VADĂ POZA */
        .slide::after {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* Această umbră lasă centrul mai luminat și marginile adânci */
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative; z-index: 2; text-align: center; max-width: 1000px; padding: 0 20px;
        }

        .hero-content span { 
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 10px; color: var(--auriu); 
            display: block; margin-bottom: 20px; font-weight: 800;
        }

        .hero-content h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(3.5rem, 10vw, 7rem); /* Text imens stil Ermes */
            font-weight: 900; font-style: italic; line-height: 0.85; margin-bottom: 30px;
            text-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        .btn-lux {
            display: inline-block; padding: 22px 50px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 4px; transition: 0.4s;
        }
        .btn-lux:hover { background: #fff; color: #000; border-color: #fff; }

        @keyframes slide-anim {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .site-header { padding: 20px; flex-direction: column; }
            .hero-content h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html" class="brand">HAȚEG ALTERNATIV</a>
        <nav class="main-nav">
            <a href="retreat.html">Metanoia</a>
            <a href="gastronomie.html">Gastronomie</a>
            <a href="experiente.html">Ateliere</a>
            <a href="rezervari.html" style="border: 1px solid #fff; padding: 5px 10px;">Rezervări</a>
        </nav>
    </header>

    <section class="hero-slider">
        <div class="slider-track">
            <div class="slide" style="background-image: url('transgenerational.png');">
                <div class="hero-content">
                    <span>DOMENIILE LA BULIGĂ</span>
                    <h1>Simte.<br>Explorează.<br>Trăiește.</h1>
                    <a href="rezervari.html" class="btn-lux">Planifică</a>
                </div>
            </div>
            <div class="slide" style="background-image: url('ciorba-aurie.jpg');">
                <div class="hero-content">
                    <span>PUNCT GASTRONOMIC</span>
                    <h1>Aurul<br>Lichid.</h1>
                    <a href="gastronomie.html" class="btn-lux">Meniul Zilei</a>
                </div>
            </div>
            <div class="slide" style="background-image: url('images/retezat.jpg');">
                <div class="hero-content">
                    <span>RETEZAT</span>
                    <h1>Terapia<br>Isihiei.</h1>
                    <a href="obiective.html" class="btn-lux">Descoperă</a>
                </div>
            </div>
            <div class="slide" style="background-image: url('images/exp-fluturi.jpg');">
                <div class="hero-content">
                    <span>METANOIA</span>
                    <h1>Diamantele<br>Minții.</h1>
                    <a href="experiente.html" class="btn-lux">Ateliere</a>
                </div>
            </div>
        </div>
    </section>

        })();

</body>
</html>
