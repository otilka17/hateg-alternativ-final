        .hero-cinema { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000; }
        .cinema-slide { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            opacity: 0; 
            animation: cinematicEffect 18s infinite; 
            transform: scale(1);
        }

        /* Cele 3 poze se succed prin transparență */
        .slide-1 { background-image: url('images/rasarit.jpg'); animation-delay: 0s; }
        .slide-2 { background-image: url('images/nori.jph.jpg'); animation-delay: 6s; }
        .slide-3 { background-image: url('images/apus.jpg'); animation-delay: 12s; }

        @keyframes cinematicEffect {
            0% { opacity: 0; transform: scale(1); }
            10% { opacity: 1; }
            33% { opacity: 1; transform: scale(1.1); }
            43% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; }
        }

        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle, transparent, var(--negru) 130%); z-index: 10; }

        /* TRANZITII "FILM" JUMĂTATE DE PAGINĂ */

        .trans-1 { background-image: url('images/jeep.jpg'); }
