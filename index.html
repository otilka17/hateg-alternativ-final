<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hațeg Alternativ | Simte tăcerea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #1b3022; --auriu: #c5a059; --crem: #fdfcf8; --alb: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--verde); /* Fundal închis pentru contrast cu muntele */
            color: var(--alb); 
            overflow-x: hidden;
        }

        /* MUNTELE ÎN FUNDAL PE TOT ECRANUL */
        .hero-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.2)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
            z-index: -1;
        }

        header { padding: 30px; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; top: 0; }
        .brand { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; text-decoration: none; color: white; }
        .main-nav a { font-family: 'Playfair Display', serif; font-style: italic; color: white; text-decoration: none; margin-left: 20px; font-size: 1.1rem; }

        .hero-content {
            height: 90vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
        }

        h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(3.5rem, 10vw, 6rem); margin-bottom: 10px; }
        .hero-p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; margin-bottom: 40px; opacity: 0.9; }

        /* CARDUL VIP - ACUM MIC ȘI ELEGANT */
        .vip-mini-card {
            background: rgba(27, 48, 34, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: 0 auto 100px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            display: flex; align-items: center; gap: 20px;
            text-align: left;
        }
        .vip-mini-card h2 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; margin-bottom: 5px; }
        .vip-mini-card p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px; }
        .vip-img { width: 80px; height: auto; }

        input { padding: 10px 15px; border-radius: 50px; border: none; font-size: 0.8rem; width: 160px; }
        .btn-gold { 
            background: var(--auriu); color: white; padding: 10px 25px; 
            border-radius: 50px; text-decoration: none; font-family: 'Playfair Display', serif; 
            font-style: italic; border: none; cursor: pointer;
        }

        /* WHATSAPP DREAPTA */
        .wa-float {
            position: fixed; bottom: 30px; right: 30px;
            background: #25d366; color: white; padding: 12px 25px;
            border-radius: 50px; text-decoration: none; font-weight: 700;
            z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* JURNALUL LIVE */
        .journal { padding: 50px 20px; background: var(--crem); color: var(--verde); }
        .post-card { max-width: 600px; margin: 40px auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .post-img { width: 100%; height: 300px; object-fit: cover; }
        .post-info { padding: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="hero-bg"></div>

<header>
    <a href="#" class="brand">Hațeg Alternativ</a>
    <nav class="main-nav">
        <a href="pensiuni.html">Pensiuni</a>
        <a href="retreat.html">Retreat</a>
    </nav>
</header>

<section class="hero-content">
    <h1>Simte tăcerea.</h1>
    <p class="hero-p">O selecție de refugii în inima Transilvaniei</p>
    
    <div class="vip-mini-card">
        <div style="flex: 1;">
            <h2>Devino membru</h2>
            <p>Invitații la cine secrete și retreat-uri.</p>
            <form id="membership-form">
                <input type="email" id="member-email" placeholder="Email" required>
                <button type="submit" class="btn-gold">Ok</button>
            </form>
        </div>
        <img src="https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/images/membership-key.png" class="vip-img" alt="VIP">
    </div>
</section>

<main class="journal" id="journal-container">
    <h2 style="text-align: center; font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.5rem;">Jurnal Live</h2>
    </main>

<a href="https://wa.me/40749229686" class="wa-float">WhatsApp</a>

<script type="text/javascript">
var Tawk_API=Tawk_API||{};
Tawk_API.customStyle = { visibility : { desktop : { xOffset : '30', yOffset : '30', position : 'bottom-left' }, mobile : { xOffset : '20', yOffset : '20', position : 'bottom-left' } } };
(function(){
var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
s1.async=true; s1.src='https://embed.tawk.to/69c5607435e8d61c3a875f21/1jklg1i9s';
s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
s0.parentNode.insertBefore(s1,s0);
})();
</script>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbz1b5qQajTQQH6QdJDb1ov5qIAhguAqdm1jjmk5uF0q7F-zq85eGE-ua_VAcgopzDtP/exec?action=getLive";
    async function loadJournal() {
        try {
            const response = await fetch(SHEETS_URL);
            const data = await response.json();
            const container = document.getElementById('journal-container');
            data.reverse().forEach(post => {
                container.innerHTML += `
                    <div class="post-card">
                        <img src="${post.Imagine_URL}" class="post-img" onerror="this.src='https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/images/hero-camp-munti.jpg'">
                        <div class="post-info">
                            <span style="color: #c5a059; font-style: italic;">${post.Data}</span>
                            <h3 style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; margin: 10px 0;">${post.Mesaj}</h3>
                        </div>
                    </div>`;
            });
        } catch (e) { console.log(e); }
    }
    loadJournal();
</script>

</body>
</html>
