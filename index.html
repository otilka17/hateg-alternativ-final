        .hero-slider { width: 100%; height: 100vh; overflow: hidden; position: relative; }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-text h1 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 10vw, 6.5rem); font-style: italic; color: var(--auriu); }

        .road-advisory { background: #080808; border-bottom: 1px solid #1a1a1a; padding: 40px 20px; text-align: center; }
        .road-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 25px; }
        .road-inner i { color: var(--auriu); font-size: 2.2rem; }

        .container { max-width: 1400px; margin: 0 auto; padding: 80px 20px; }
        .grid-5 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 60px; }
        .card-item { height: 550px; position: relative; overflow: hidden; display: block; border: 1px solid #1a1a1a; }
        .card-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 1s ease; }
        .card-item:hover img { opacity: 1; transform: scale(1.05); }
        .card-info { position: absolute; bottom: 0; padding: 40px; width: 100%; background: linear-gradient(to top, var(--negru), transparent); }
        .card-info h4 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 4px; font-size: 1.1rem; }

        .calendar-section { padding: 100px 20px; background: #080808; border-top: 1px solid #111; }
        .calendar-timeline { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 100px; }
        .event-row { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
        .event-row.reverse { direction: rtl; }
        .event-row.reverse .event-content-details { direction: ltr; }
        .event-card { background: #0d0d0d; border: 1px solid #1a1a1a; overflow: hidden; }
        .event-card img { width: 100%; height: 350px; object-fit: cover; }
        .event-info-box { padding: 40px; }
        .date-badge { font-family: 'Cinzel'; color: var(--auriu); font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 15px; display: block; }
        .event-info-box h2 { font-family: 'Playfair Display'; font-style: italic; font-size: 2.2rem; color: #fff; margin-bottom: 20px; }
        .btn-action { display: inline-block; padding: 14px 35px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; transition: 0.4s; }
        .btn-action:hover { background: var(--auriu); color: #000 !important; }

        footer { padding: 80px 20px; text-align: center; background: #000; border-top: 1px solid #111; }

        .legal-badges { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 30px 0; }

        .legal-badges img:hover { opacity: 1; }
