<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hațeg Alternativ | Rânduiala Veche</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu-gold: #ffd700; --negru-pur: #0a0a0a; --alb: #ffffff; --gri-text: #aaa; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru-pur); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .brand svg { height: 100px; width: auto; }
        .burger { cursor: pointer; z-index: 10000; padding: 10px; }
        .burger div { width: 35px; height: 2px; background: var(--auriu-gold); margin: 8px; }

        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s; z-index: 9500; }
        .main-nav.active { right: 0; }
        .main-nav a { text-decoration: none; color: #fff; font-size: 2.5rem; font-family: 'Cinzel'; margin: 15px 0; letter-spacing: 5px; }

        .hero { height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; background: url('images/hero-premium.jpg') center/cover; }
        .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
        .hero-content { position: relative; z-index: 10; text-align: center; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 8rem); font-style: italic; color: var(--auriu-gold); }

        .btn-gold { display: inline-block; padding: 18px 45px; border: 1px solid var(--auriu-gold); color: var(--auriu-gold); text-decoration: none; font-family: 'Cinzel'; letter-spacing: 4px; margin-top: 30px; transition: 0.4s; }
        .btn-gold:hover { background: var(--auriu-gold); color: #000; }

        .grid-vibe { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; padding: 20px; }
        .img-item { height: 600px; background-size: cover; background-position: center; border: 1px solid #111; }

        .whatsapp-float { position: fixed; bottom: 40px; left: 40px; background: #25d366; color: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 10000; }
        footer { padding: 80px; text-align: center; font-family: 'Cinzel'; border-top: 1px solid #111; color: #444; }
    </style>
</head>
<body>
    <a href="https://wa.me/40749229686" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>
    <header class="site-header">
        <a href="index.html" class="brand">
            <svg viewBox="0 0 800 800"><path d="M300 450 L400 250 L500 450 Z" fill="#ffd700"/></svg>
        </a>
        <div class="burger" id="burger"><div></div><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">Acasă</a>
            <a href="experiente.html">Experiențe & Tarife</a>
            <a href="pensiune.html">Pensiunea</a>
            <a href="gastronomie.html">Gastronomie</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <p style="font-family: 'Cinzel'; letter-spacing: 5px;">Rânduiala Veche</p>
            <h1>Hațeg<br>Alternativ</h1>
            <a href="experiente.html" class="btn-gold">VEZI PACHETELE 2026</a>
        </div>
    </section>

    <main>
        <section class="grid-vibe">
            <div class="img-item" style="background-image: url('images/sura.jpg');"></div>
            <div class="img-item" style="background-image: url('images/IMG_20260330_160344.jpg');"></div>
            <div class="img-item" style="background-image: url('images/jeep.jpg');"></div>
            <div class="img-item" style="background-image: url('images/apus.jpg');"></div>
        </section>
    </main>

    <footer>HAȚEG ALTERNATIV &copy; 2026</footer>

    <script>
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        burger.onclick = () => { nav.classList.toggle('active'); }
    </script>
</body>
</html>
