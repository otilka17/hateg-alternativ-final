<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Metanoia | Admin Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .box-card { border: 1px solid #1a1a1a; transition: 0.3s; }
        .box-card:hover { border-color: #c5a059; }
        .bg-metanoia { background: #050505; }
        .gold-btn { border: 1px solid #c5a059; color: #c5a059; }
    </style>
</head>
<body class="bg-metanoia text-white p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-8 text-[#c5a059]">CONFIGURARE BOX PERSONALIZAT</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="box-card p-6 rounded-lg">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="font-bold">Shot Vitamina D</h2>
                        <p class="text-xs text-gray-500">60ml / Urban Monkey</p>
                    </div>
                    <span class="text-[#c5a059] font-bold">10 RON</span>
                </div>
                <button class="gold-btn w-full py-2 text-xs uppercase tracking-widest hover:bg-[#c5a059] hover:text-black">Adaugă în Box</button>
            </div>

            <div class="box-card p-6 rounded-lg">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="font-bold">Fru Limonadă</h2>
                        <p class="text-xs text-gray-500">Cu bule / 250ml</p>
                    </div>
                    <span class="text-[#c5a059] font-bold">10 RON</span>
                </div>
                <button class="gold-btn w-full py-2 text-xs uppercase tracking-widest hover:bg-[#c5a059] hover:text-black">Adaugă în Box</button>
            </div>
        </div>

        <div class="mt-12 p-6 border-t border-[#1a1a1a]">
            <div class="flex justify-between items-center text-xl">
                <span>Total Box:</span>
                <span class="font-bold text-[#c5a059]">120 RON</span>
            </div>
        </div>
    </div>
</body>
</html>
