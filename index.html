<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hațeg Alternativ | Signature Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #1b3022; --auriu: #c5a059; --roz-pal: #fdfcf8; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--roz-pal); color: var(--verde); line-height: 1.6; padding-top: 100px; overflow-x: hidden; }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: none; }
        .italic-style { font-style: italic; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header Alb pe 2 rânduri ca în poza ta */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 1500; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        
        .brand { text-decoration: none; color: var(--verde); font-size: 1.4rem; text-align: center; line-height: 1.1; letter-spacing: 1px; }
        .est-text { font-size: 0.6rem; color: var(--auriu); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        /* Meniu actualizat: Experiențe în loc de Obiective */
        .main-nav { display: flex; gap: 25px; margin-top: 20px; }
        .main-nav a { text-decoration: none; color: #444; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .main-nav a:hover { color: var(--auriu); }

        /* Muntele în casetă */
        .hero-caseta {
            width: 100%; height: 65vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.1)), 
                        url('https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; text-align: center; color: var(--alb);
        }
        .hero-caseta h1 { font-size: clamp(2.5rem, 7vw, 4.5rem); font-style: italic; }

        /* Journal Live Section */
        .journal-section { padding: 80px 0; }
        .section-heading { text-align: center; margin-bottom: 50px; }
        .section-heading h2 { font-size: 3rem; font-style: italic; margin-bottom: 10px; }
        
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .feed-item { border-radius: 15px; overflow: hidden; aspect-ratio: 1; border: 1px solid #eee; }
        .feed-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Card VIP Mic & Elegant */
        .membership-card { 
            background: var(--verde); border-radius: 24px; padding: 50px; 
            display: flex; align-items: center; gap: 40px; color: white; 
            margin: 80px auto; box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }
        .membership-card h2 { font-size: 2.8rem; font-style: italic; margin-bottom: 15px; }
        .membership-card p { font-weight: 300; opacity: 0.8; margin-bottom: 30px; font-size: 0.95rem; }
        
        #member-email { padding: 15px 25px; border-radius: 50px; border: none; width: 100%; max-width: 280px; }
        .btn-gold { background: var(--auriu); color: white; padding: 15px 35px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }

        /* Butoane Contact Fixe */
        .wa-btn-fixed { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-size: 0.8rem; }
        
        /* Forțare Tawk în stânga */
        #tawk-chat-container { left: 30px !important; right: auto !important; }

        @media (max-width: 768px) {
            .membership-card { flex-direction: column; text-align: center; padding: 40px 20px; }
            .hero-caseta { height: 50vh; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container nav-wrap">
        <a href="index.html" class="brand">HAȚEG<br><strong>ALTERNATIV</strong></a>
        <span class="est-text">EST. 2026</span>
        <nav class="main-nav">
            <a href="pensiuni.html">Pensiuni</a>
            <a href="retreat.html">Retreat</a>
            <a href="experiente.html" style="color: var(--auriu);">Experiențe</a>
            <a href="forum.html">Forum</a>
        </nav>
    </div>
</header>

<section class="hero-caseta">
    <div class="container">
        <h1>Simte tăcerea.</h1>
    </div>
</section>

<section class="journal-section container">
    <div class="section-heading">
        <h2>Metanoia Live</h2>
        <p style="color: #64748b; font-style: italic;">Momente neregizate din inima locului.</p>
    </div>
    <div class="feed-grid" id="journal-container">
        </div>
</section>

<div class="container">
    <section class="membership-card">
        <div style="flex: 1;">
            <span style="color: var(--auriu); letter-spacing: 5px; font-weight: 800; font-size: 0.6rem; display: block; margin-bottom: 10px;">MEMBER ACCESS</span>
            <h2>Devino membru</h2>
            <p>Invitații la cine secrete și acces prioritar în colecție.</p>
            <form id="membership-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="email" id="member-email" placeholder="Email-ul tău" required>
                <button type="submit" class="btn-gold">Ok</button>
            </form>
        </div>
        <div style="flex: 0.5; text-align: center;">
            <img src="https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/images/membership-key.png" alt="VIP" style="width: 100px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));">
        </div>
    </section>
</div>

<a href="https://wa.me/40749229686" class="wa-btn-fixed">Chat WhatsApp</a>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbz1b5qQajTQQH6QdJDb1ov5qIAhguAqdm1jjmk5uF0q7F-zq85eGE-ua_VAcgopzDtP/exec?action=getLive";
    async function loadJournal() {
        try {
            const response = await fetch(SHEETS_URL);
            const data = await response.json();
            const container = document.getElementById('journal-container');
            container.innerHTML = "";
            data.reverse().forEach(post => {
                container.innerHTML += `
                    <div class="feed-item">
                        <img src="${post.Imagine_URL}" alt="${post.Mesaj}" onerror="this.src='https://raw.githubusercontent.com/otilka17/hateg-alternativ-final/main/hero-camp-munti.jpg'">
                    </div>`;
            });
        } catch (e) { console.log("Eroare incarcare jurnal"); }
    }
    loadJournal();
</script>

</body>
</html>
