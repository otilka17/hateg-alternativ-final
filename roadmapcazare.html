<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check & Select - Analiză Finanțare Satul Piatra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --coral-accent: #ff7f50;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--surface);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        header h1 { font-family: 'Comfortaa', cursive; font-size: 1.6em; margin-bottom: 6px; }
        header p { color: var(--text-muted); font-size: 0.9em; }

        .section-title {
            font-family: 'Comfortaa', cursive;
            font-size: 1.15em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Checkbox List Mod Militar */
        .check-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }

        .check-item {
            background: var(--surface-light);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .check-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--coral-accent);
            cursor: pointer;
        }

        .check-item.checked { border-color: var(--coral-accent); background: rgba(255,127,80,0.04); }

        .check-text h4 { font-size: 0.95em; font-weight: 600; margin-bottom: 2px; }
        .check-text p { font-size: 0.8em; color: var(--text-muted); }

        /* Rezultat Dinamic */
        .result-box {
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            background: #151f32;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 10px;
        }

        .result-title { font-family: 'Comfortaa', cursive; font-weight: 700; color: var(--coral-accent); }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.8em; }
        .badge-green { background: rgba(16,185,129,0.15); color: var(--success); }

        .result-body p { font-size: 0.9em; line-height: 1.5; margin-bottom: 12px; }
        .result-body ul { padding-left: 20px; font-size: 0.85em; color: var(--text-muted); margin-bottom: 15px; }
        .result-body li { margin-bottom: 6px; }

        .risk-alert {
            background: rgba(239,68,68,0.08);
            border-left: 4px solid var(--danger);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Check & Select Tactic</h1>
        <p>Bifează activele validate pentru a stabili ghidul optim</p>
    </header>

    <div class="section-title"><i class="fa-solid fa-square-check" style="color:var(--coral-accent);"></i> Variabile de Intrare (Inputs)</div>
    
    <div class="check-list">
        <label class="check-item">
            <input type="checkbox" id="c1" onchange="evaluateProject()">
            <div class="check-text">
                <h4>Vârsta aplicantului este sub 40 de ani</h4>
                <p>Deblechează criteriul de prioritate "Tânăr Antreprenor" (38 de ani bifați).</p>
            </div>
        </label>

        <label class="check-item">
            <input type="checkbox" id="c2" onchange="evaluateProject()">
            <div class="check-text">
                <h4>Sistem energetic verde integrat complet</h4>
                <p>Panouri fotovoltaice și pompă de căldură (Scor energetic maxim).</p>
            </div>
        </label>

        <label class="check-item">
            <input type="checkbox" id="c3" onchange="evaluateProject()">
            <div class="check-text">
                <h4>Bugetul necesar depășește 100.000 EUR</h4>
                <p>Infrastructura și construcția pe cei 2600 mp necesită capital masiv.</p>
            </div>
        </label>

        <label class="check-item">
            <input type="checkbox" id="c4" onchange="evaluateProject()">
            <div class="check-text">
                <h4>Certificat de Urbanism curat (Fără restricții lizieră)</h4>
                <p>Terenul este intravilan construibil și respectă distanța legală față de pădure.</p>
            </div>
        </label>
    </div>

    <!-- PANOU DE REZULTAT EVALUAT LIVE -->
    <div class="result-box" id="resultPanel">
        <!-- Generat din JS în funcție de bife -->
    </div>
</div>

<script>
    function evaluateProject() {
        // Stil vizual pentru casetele bifate
        document.querySelectorAll('.check-item').forEach(item => {
            const checkbox = item.querySelector('input[type="checkbox"]');
            if (checkbox.checked) {
                item.classList.add('checked');
            } else {
                item.classList.remove('checked');
            }
        });

        const v_tanar = document.getElementById('c1').checked;
        const v_verde = document.getElementById('c2').checked;
        const v_buget_mare = document.getElementById('c3').checked;
        const v_urbanism = document.getElementById('c4').checked;

        const resultPanel = document.getElementById('resultPanel');
        
        // Dacă nu e bifat nimic, ascundem panoul
        if (!v_tanar && !v_verde && !v_buget_mare && !v_urbanism) {
            resultPanel.style.display = 'none';
            return;
        }

        resultPanel.style.display = 'block';
        let html = "";

        // SCENARIU BLOCKED: Lipsă Urbanism
        if (!v_urbanism) {
            html = `
                <div class="result-header">
                    <span class="result-title" style="color:var(--danger);"><i class="fa-solid fa-ban"></i> PIPELINE BLOCKED</span>
                    <span class="badge" style="background:rgba(239,68,68,0.15); color:var(--danger);">CRITICAL BUG</span>
                </div>
                <div class="result-body">
                    <p><strong>Eroare: Lipsă validare Certificat Urbanism.</strong> Indiferent de vârstă sau buget, proiectul nu poate fi depus pe niciun ghid până nu eliminăm riscul de vecinătate cu pădurea.</p>
                    <div class="risk-alert">
                        <strong>Acțiune PM Obligatorie:</strong> Solicită apelul de review pe urbanism pentru a verifica retragerile minime și avizele de mediu exigibile lângă lizieră.
                    </div>
                </div>
            `;
        } 
        // SCENARIU OPTIM: Traseu I (AFIR DR-24)
        else if (v_buget_mare && v_tanar && v_verde) {
            html = `
                <div class="result-header">
                    <span class="result-title"><i class="fa-solid fa-rocket"></i> GHID OPTIM: AFIR DR-24 (Național)</span>
                    <span class="badge badge-green">65% NERAMBURSABIL</span>
                </div>
                <div class="result-body">
                    <p>Deoarece bugetul necesar este mare, iar profilul bifează bonusurile de <strong>Tânăr Antreprenor</strong> și <strong>Scor Verde Maxim</strong>, arhitectura națională este cea recomandată.</p>
                    <ul>
                        <li><i class="fa-solid fa-check" style="color:var(--success)"></i> Finanțare masivă adaptată pentru dezvoltarea celor 2600 mp.</li>
                        <li><i class="fa-solid fa-check" style="color:var(--success)"></i> Start-up SRL-ul nou înființat trece curat faza administrativă.</li>
                    </ul>
                    <div class="risk-alert" style="color:#ffaa80; background:rgba(255,127,80,0.05); border-left-color:var(--coral-accent);">
                        <strong>Risc de Procesare (Lead Time):</strong> Evaluarea durează între 6 și 12 luni. Clientul trebuie informat corect despre asigurarea cash-flow-ului.
                    </div>
                </div>
            `;
        } 
        // SCENARIU SECUNDAR: Traseu II (GAL Sesiune Locală)
        else {
            html = `
                <div class="result-header">
                    <span class="result-title" style="color:var(--teal-accent);"><i class="fa-solid fa-bullseye"></i> GHID OPTIM: GAL Ogoarele Vlăsiei</span>
                    <span class="badge" style="background:rgba(13,148,136,0.15); color:var(--teal-accent);">CONCURENȚĂ REDUSĂ</span>
                </div>
                <div class="result-body">
                    <p>Scenariu recomandat pentru implementare rapidă și sigură, cu un buget calibrat sub pragul de 100.000 EUR.</p>
                    <ul>
                        <li><i class="fa-solid fa-check" style="color:var(--success)"></i> Evaluare rapidă la nivel local, birocrație scăzută.</li>
                        <li><i class="fa-solid fa-check" style="color:var(--success)"></i> Te bați doar cu firmele din comunele învecinate, nu cu toată țara.</li>
                    </ul>
                    <div class="risk-alert">
                        <strong>Limitare Tactică:</strong> Suma totală nerambursabilă este mai mică. Orice extindere ulterioară a lucrărilor va fi suportată integral de către Start-up SRL.
                    </div>
                </div>
            `;
        }

        resultPanel.innerHTML = html;
    }
</script>

</body>
</html>
