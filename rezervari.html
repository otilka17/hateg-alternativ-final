<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rezervări | Hațeg Alternativ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo svg { height: 65px; filter: drop-shadow(0 0 15px #000); }
        .burger { cursor: pointer; z-index: 10001; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px solid rgba(197, 160, 89, 0.3); }
        .burger div { width: 30px; height: 2px; background: var(--auriu); margin: 6px; }
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 2rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-transform: uppercase; letter-spacing: 5px; text-decoration: none; }

        /* HERO */
        .hero-rezervari { height: 45vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.85)), url('images/apus.jpg') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; border-bottom: 2px solid var(--auriu); }
        .hero-rezervari h1 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 8vw, 4.5rem); font-style: italic; color: var(--auriu); text-shadow: 4px 4px 20px #000; }

        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        /* FORMULAR */
        .form-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px 25px; border-top: 3px solid var(--auriu); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; color: var(--auriu); margin-bottom: 10px; font-size: 0.75rem; font-family: 'Cinzel'; letter-spacing: 2px; text-transform: uppercase; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; padding: 18px; background: #000; border: 1px solid #222; color: #fff; font-family: 'Inter'; outline: none; border-radius: 0; font-size: 1rem;
        }
        .form-group input:focus { border-color: var(--auriu); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(100%) saturate(500%) hue-rotate(10deg); cursor: pointer; }

        .total-display { text-align: center; padding: 30px; background: #080808; border: 1px solid #1a1a1a; margin: 20px 0; }
        .total-display p { font-family: 'Cinzel'; font-size: 0.7rem; color: #666; letter-spacing: 3px; margin-bottom: 10px; }
        .total-display span { font-size: clamp(2.5rem, 10vw, 3.5rem); color: var(--auriu); font-weight: 900; font-family: 'Playfair Display'; font-style: italic; }

        .btn-submit { width: 100%; padding: 22px; background: transparent; border: 2px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-weight: 700; letter-spacing: 5px; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .btn-submit:hover { background: var(--auriu); color: #000; }
        
        #mesaj-succes { display: none; background: #0a0a0a; color: var(--auriu); padding: 60px 20px; border: 1px solid var(--auriu); text-align: center; margin-bottom: 40px; }
        #mesaj-succes h2 { font-family: 'Playfair Display'; font-size: 2rem; font-style: italic; margin-bottom: 15px; }

        footer { padding: 60px 20px; text-align: center; opacity: 0.4; font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 3px; }
        .whatsapp-float { position: fixed; bottom: 25px; left: 25px; background: #25d366; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1001; color: #fff; }
    </style>
</head>
<body>

    <a href="https://wa.me/40749229686" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <header class="site-header">
        <a href="index.html" class="brand-logo">
            <svg viewBox="0 0 800 500"><circle cx="400" cy="250" r="105" fill="none" stroke="#c5a059" stroke-width="4"/><path d="M300 400 L400 200 L500 400 Z" fill="#c5a059"/></svg>
        </a>
        <div class="burger" id="burger"><div></div><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">Acasă</a>
            <a href="pensiune.html">Domeniile La Buligă</a>
            <a href="metanoia.html">Metanoia</a>
            <a href="rezervari.html">Rezervare</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero-rezervari"><h1>Rânduiala Rezervării.</h1></section>

    <main class="container">
        <div id="mesaj-succes">
            <h2>CERERE TRIMISĂ.</h2>
            <p>Vom verifica rânduiala și revenim pe WhatsApp.</p>
        </div>

        <div class="form-box" id="form-container">
            <form id="booking-form">
                <div class="form-group">
                    <label>Experiența Dorită</label>
                    <select name="Pachet_Ales" id="pachet" onchange="calculPret()">
                        <option value="3000">Tihnă la Buligă (3000 lei/noapte)</option>
                        <option value="6000">Metanoia Full (6000 lei/noapte)</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Data Sosirii</label>
                        <input type="date" name="Data_CheckIn" id="checkin" required onchange="updateCheckoutMin()">
                    </div>
                    <div class="form-group">
                        <label>Data Plecării</label>
                        <input type="date" name="Data_CheckOut" id="checkout" required onchange="calculPret()">
                    </div>
                </div>

                <div class="form-group">
                    <label>Nume Client</label>
                    <input type="text" name="Nume_Client" required placeholder="Numele tău complet">
                </div>

                <div class="form-group">
                    <label>WhatsApp / Telefon</label>
                    <input type="tel" name="Telefon" required placeholder="07xx xxx xxx">
                </div>

                <div class="total-display">
                    <p>SUMA TOTALĂ ESTIMATĂ</p>
                    <span id="total-price">6000 LEI</span>
                </div>

                <div class="form-group">
                    <label>Mesaj / Mențiuni</label>
                    <textarea name="Mesaj" rows="3" placeholder="Detalii despre grup sau preferințe..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="btn-trimite">Trimite Cererea</button>
            </form>
        </div>
    </main>

    <footer>HAȚEG ALTERNATIV &copy; 2026</footer>

    <script>
        // Meniu
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        burger.onclick = () => nav.classList.toggle('active');

        // Logica Calendar & Pret
        const azi = new Date().toISOString().split('T')[0];
        document.getElementById('checkin').min = azi;

        function updateCheckoutMin() {
            const cin = document.getElementById('checkin').value;
            const cout = document.getElementById('checkout');
            if(cin) {
                let d = new Date(cin);
                d.setDate(d.getDate() + 2);
                cout.min = d.toISOString().split('T')[0];
                cout.value = d.toISOString().split('T')[0];
            }
            calculPret();
        }

        function calculPret() {
            const p = parseInt(document.getElementById('pachet').value);
            const d1 = new Date(document.getElementById('checkin').value);
            const d2 = new Date(document.getElementById('checkout').value);
            if(d1 && d2 && d2 > d1) {
                const nopti = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
                document.getElementById('total-price').innerText = (p * nopti) + " LEI";
            }
        }

        // Trimitere Make
        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-trimite');
            btn.innerText = "SE TRIMITE...";
            btn.disabled = true;

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            data.Suma_Totala = document.getElementById('total-price').innerText;

            fetch('https://hook.eu1.make.com/1ojlwd2tys2fa6rcp39oauobwe8sebzk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => {
                if(res.ok) {
                    document.getElementById('form-container').style.display='none';
                    document.getElementById('mesaj-succes').style.display='block';
                } else {
                    alert("Eroare server. Te rugăm să ne scrii direct pe WhatsApp.");
                    btn.disabled = false;
                    btn.innerText = "TRIMITE DIN NOU";
                }
            });
        });

        updateCheckoutMin();
    </script>
</body>
</html>
