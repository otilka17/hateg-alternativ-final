<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rezervări | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; }
        .hero-rezervari { height: 35vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9)), url('images/apus.jpg') center/cover; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid var(--auriu); }
        .hero-rezervari h1 { font-family: 'Playfair Display'; font-size: 2.5rem; font-style: italic; color: var(--auriu); }
        .container { width: 100%; max-width: 700px; margin: 0 auto; padding: 40px 20px; }
        .form-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 30px 20px; border-top: 3px solid var(--auriu); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: var(--auriu); margin-bottom: 8px; font-size: 0.75rem; font-family: 'Cinzel'; letter-spacing: 1px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; background: #000; border: 1px solid #222; color: #fff; font-family: 'Inter'; outline: none; border-radius: 0; }
        .total-display { text-align: center; padding: 20px; background: #111; border: 1px solid #1a1a1a; margin: 15px 0; }
        .total-display span { font-size: 2.2rem; color: var(--auriu); font-weight: 900; font-family: 'Playfair Display'; font-style: italic; }
        .btn-submit { width: 100%; padding: 18px; background: transparent; border: 2px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; font-weight: 700; letter-spacing: 3px; cursor: pointer; transition: 0.4s; }
        .btn-submit:hover { background: var(--auriu); color: #000; }
        #mesaj-succes { display: none; background: #0a0a0a; color: var(--auriu); padding: 40px; border: 1px solid var(--auriu); text-align: center; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }
    </style>
</head>
<body>
    <section class="hero-rezervari"><h1>Rânduiala Șederii.</h1></section>
    <main class="container">
        <div id="mesaj-succes">
            <i class="fas fa-check-circle" style="font-size: 2.5rem; margin-bottom: 15px;"></i>
            <h2>CERERE TRIMISĂ!</h2>
            <p>Verificăm calendarul și te contactăm rapid.</p>
        </div>
        <div class="form-box" id="form-container">
            <form id="booking-form">
                <div class="form-group">
                    <label>Alege Experiența</label>
                    <select name="Pachet_Ales" id="pachet" onchange="calculPret()">
                        <option value="3000">Tihnă la Buligă (3000 lei/noapte)</option>
                        <option value="6000">Metanoia Full (6000 lei/noapte)</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="form-group"><label>Data Sosirii</label><input type="date" name="Data_CheckIn" id="checkin" required onchange="updateCheckoutMin()"></div>
                    <div class="form-group"><label>Data Plecării</label><input type="date" name="Data_CheckOut" id="checkout" required onchange="calculPret()"></div>
                </div>
                <div class="total-display"><p style="font-size: 0.7rem; color: #555;">TOTAL ESTIMAT</p><span id="total-price">6000 LEI</span></div>
                <div class="form-group"><label>Nume Complet</label><input type="text" name="Nume_Client" required></div>
                <div class="form-group"><label>WhatsApp / Telefon</label><input type="tel" name="Telefon" required></div>
                <div class="form-group"><label>Mențiuni</label><textarea name="Mesaj" rows="2"></textarea></div>
                <button type="submit" class="btn-submit" id="btn-trimite">TRIMITE SOLICITAREA</button>
            </form>
        </div>
    </main>
    <script>
        document.getElementById('checkin').min = new Date().toISOString().split('T')[0];
        function updateCheckoutMin() {
            const cin = document.getElementById('checkin').value;
            const cout = document.getElementById('checkout');
            if(cin) {
                let d = new Date(cin); d.setDate(d.getDate() + 2);
                cout.min = d.toISOString().split('T')[0]; cout.value = d.toISOString().split('T')[0];
            }
            calculPret();
        }
        function calculPret() {
            const p = parseInt(document.getElementById('pachet').value);
            const d1 = new Date(document.getElementById('checkin').value);
            const d2 = new Date(document.getElementById('checkout').value);
            if(d1 && d2 && d2 > d1) {
                const nopti = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
                document.getElementById('total-price').innerText = (p * nopti) + " LEI";
            }
        }
        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-trimite');
            btn.innerText = "SE TRIMITE..."; btn.disabled = true;
            const data = Object.fromEntries(new FormData(this).entries());
            data.Suma_Totala = document.getElementById('total-price').innerText;

            fetch('https://hook.eu1.make.com/1ojlwd2tys2fa6rcp39oauobwe8sebzk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => {
                if(res.ok) {
                    document.getElementById('form-container').style.display='none';
                    document.getElementById('mesaj-succes').style.display='block';
                } else { throw new Error(); }
            })
            .catch(() => {
                alert("Eroare: Asigură-te că Scenariul din Make.com este legat de Webhook și este pornit (ON)!");
                btn.disabled = false; btn.innerText = "ÎNCEARCĂ DIN NOU";
            });
        });
        updateCheckoutMin();
    </script>
</body>
</html>
