<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervări | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --gri-card: #0d0d0d; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; line-height: 1.6; }
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .btn-reserve-header { padding: 12px 25px; border: 1px solid var(--auriu); color: var(--auriu) !important; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 2px; }
        .burger div { width: 30px; height: 1px; background: var(--auriu); margin: 8px; }
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-transform: uppercase; letter-spacing: 5px; }

        .hero-res { height: 40vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('images/rasarit.jpg') center/cover; display: flex; align-items: center; justify-content: center; }
        .hero-res h1 { font-family: 'Playfair Display'; font-size: 3rem; font-style: italic; color: var(--auriu); }

        .container { max-width: 1100px; margin: -50px auto 100px; padding: 0 20px; position: relative; z-index: 10; }
        .package-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .p-card { background: var(--gri-card); border: 1px solid #1a1a1a; padding: 40px; }
        .p-card h3 { font-family: 'Playfair Display'; font-size: 1.8rem; color: var(--auriu); margin-bottom: 20px; }

        .booking-box { background: #080808; border: 1px solid #1a1a1a; padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .total-display { padding: 30px; border: 1px solid var(--auriu); text-align: center; }
        .price-tag { font-family: 'Playfair Display'; font-size: 3rem; color: #fff; }

        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 15px; outline: none; }
        .btn-submit { width: 100%; padding: 20px; background: transparent; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; cursor: pointer; }
        @media (max-width: 900px) { .booking-box { grid-template-columns: 1fr; } .site-header { padding: 20px; } }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand-logo"><svg viewBox="0 0 800 500" style="height:70px;"><circle cx="400" cy="250" r="105" fill="none" stroke="#c5a059" stroke-width="2"/><path d="M300 400 L400 200 L500 400 Z" fill="#c5a059"/></svg></a>
        <div class="header-controls">
            <a href="rezervari.html" class="btn-reserve-header">REZERVĂ-ȚI EXPERIENȚA</a>
            <div class="burger" id="burger" style="cursor:pointer;"><div></div><div></div></div>
        </div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">Acasă</a><a href="pensiune.html">Pensiunea</a><a href="metanoia.html">Metanoia</a><a href="gastronomie.html">Gastronomie</a><a href="evenimente.html">Evenimente</a><a href="rezervari.html">Rezervare</a><a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="hero-res"><h1>Rânduiala Rezervării.</h1></section>
    <main class="container">
        <div class="package-row">
            <div class="p-card"><h3>Tihnă la Buligă</h3><p>2 Nopți • Mic Dejun • E-bike</p></div>
            <div class="p-card" style="border-color: var(--auriu);"><h3>Metanoia Supremă</h3><p>3 Nopți • Demipensiune • Nomad 4x4 • Muzică Live</p></div>
        </div>
        <div class="booking-box">
            <div>
                <select id="pachet-select" onchange="calc()">
                    <option value="6000">Metanoia Supremă (6000 RON)</option>
                    <option value="3000">Tihnă la Buligă (3000 RON)</option>
                </select>
                <div class="total-display"><h4>TOTAL</h4><div class="price-tag" id="total">6000 <span>RON</span></div></div>
            </div>
            <form action="https://formspree.io/f/xjgpvbkj" method="POST">
                <input type="text" name="nume" placeholder="Nume" required>
                <input type="date" name="data" required>
                <textarea name="mesaj" placeholder="Preferințe..."></textarea>
                <button type="submit" class="btn-submit">TRIMITE</button>
            </form>
        </div>
    </main>
    <script>
        const burger = document.getElementById('burger'); const nav = document.getElementById('nav-links'); burger.onclick = () => nav.classList.toggle('active');
        function calc() { const val = document.getElementById('pachet-select').value; document.getElementById('total').innerHTML = val + " <span>RON</span>"; }
    </script>
</body>
</html>
