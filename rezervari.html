<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --gri: #111; --alb: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; line-height: 1.6; }
        .site-header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(197,160,89,0.3); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Cinzel'; color: var(--auriu); font-weight: 900; letter-spacing: 2px; text-decoration: none; }
        .main-container { max-width: 1200px; margin: 120px auto 50px; display: grid; grid-template-columns: 1fr 400px; gap: 40px; padding: 20px; }
        .form-side h2 { font-family: 'Cinzel'; color: var(--auriu); margin-bottom: 25px; letter-spacing: 3px; }
        .booking-form { display: grid; gap: 20px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: #fff; font-family: 'Inter'; outline: none; border-radius: 0; }
        input:focus { border-color: var(--auriu); }
        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label-mini { font-size: 0.7rem; color: var(--auriu); font-family: 'Cinzel'; display: block; margin-bottom: 5px; }
        .extras-section { margin-top: 10px; border: 1px solid #222; padding: 20px; background: rgba(255,255,255,0.02); }
        .extra-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.9rem; cursor: pointer; }
        .extra-item input { width: auto; margin-right: 15px; }
        .summary-side { background: var(--gri); border: 1px solid var(--auriu); padding: 30px; position: sticky; top: 120px; height: fit-content; }
        .summary-side h3 { font-family: 'Cinzel'; color: var(--auriu); text-align: center; margin-bottom: 20px; }
        .sum-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; border-bottom: 1px dotted #333; padding-bottom: 5px; }
        .total-row { margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--auriu); display: flex; justify-content: space-between; align-items: center; }
        .total-price { font-family: 'Playfair Display'; font-size: 2.2rem; color: var(--auriu); font-style: italic; }
        .btn-send { background: transparent; border: 1px solid var(--auriu); color: var(--auriu); padding: 20px; font-family: 'Cinzel'; cursor: pointer; transition: 0.4s; width: 100%; font-weight: bold; margin-top: 20px; }
        .btn-send:hover { background: var(--auriu); color: #000; }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } .summary-side { position: relative; top: 0; } }
    </style>
</head>
<body>
    <header class="site-header"><a href="index.html" class="brand">HAȚEG ALTERNATIV</a></header>

    <div class="main-container">
        <div class="form-side">
            <h2>CERERE REZERVARE</h2>
            <form id="bookingForm" action="https://hook.eu1.make.com/1ojlwd2tys2fa6rcp39oauobwe8sebzk" method="POST" class="booking-form">
                <input type="text" name="Nume" placeholder="Numele tău" required>
                <input type="text" name="Telefon" placeholder="Telefon / WhatsApp" required>
                
                <div class="date-grid">
                    <div><span class="label-mini">Check-In</span><input type="date" id="checkin" name="Check_in" required></div>
                    <div><span class="label-mini">Check-Out</span><input type="date" id="checkout" name="Check_out" required></div>
                </div>

                <select id="pachet_base" name="Pachet_Baza" required>
                    <option value="0" disabled selected>Alege Pachetul de Bază</option>
                    <option value="2000" data-nume="Rânduiala Veche">Rânduiala Veche - 2000 RON/noapte</option>
                    <option value="3000" data-nume="Premium">Pachet Premium - 3000 RON/noapte</option>
                    <option value="4000" data-nume="Metanoia All-In">Metanoia All-In - 4000 RON/noapte</option>
                </select>

                <div class="extras-section">
                    <h4 class="label-mini" style="font-size: 0.8rem; margin-bottom: 15px;">OPȚIUNI ȘI ATELIERE EXTRA</h4>
                    <label class="extra-item"><input type="checkbox" class="extra-cb" name="Cina_Extra" value="150"> Cină Extra (150 RON)</label>
                    <label class="extra-item"><input type="checkbox" class="extra-cb" name="Atelier_Gastro" value="500"> Atelier Gastronomic (500 RON)</label>
                    <label class="extra-item"><input type="checkbox" class="extra-cb" name="Atelier_Daco" value="350"> Atelier de creație (Daco) (350 RON)</label>
                </div>

                <input type="number" name="Persoane" placeholder="Nr. persoane" required>
                
                <input type="hidden" id="total_valoare" name="Total_Estimativ" value="0">
                <input type="hidden" id="nume_pachet_ales" name="Nume_Pachet" value="">

                <button type="submit" class="btn-send">TRIMITE REZERVAREA</button>
            </form>
        </div>

        <div class="summary-side">
            <h3>SUMAR ESTIMATIV</h3>
            <div class="sum-row"><span>Pachet:</span> <span id="res_pachet">-</span></div>
            <div class="sum-row"><span>Nopți:</span> <span id="res_nopti">0</span></div>
            <div class="sum-row"><span>Cost Cazare:</span> <span id="res_cost_cazare">0 RON</span></div>
            <div class="sum-row"><span>Suplimente:</span> <span id="res_extras">0 RON</span></div>
            
            <div class="total-row">
                <span>TOTAL:</span>
                <span id="res_total" class="total-price">0 RON</span>
            </div>
        </div>
    </div>

    <script>
        const checkin = document.getElementById('checkin');
        const checkout = document.getElementById('checkout');
        const pachet = document.getElementById('pachet_base');
        const extras = document.querySelectorAll('.extra-cb');

        function calculate() {
            const d1 = new Date(checkin.value);
            const d2 = new Date(checkout.value);
            let nopti = (d1 && d2 && d2 > d1) ? Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) : 0;
            
            const pretBazaNoapte = parseInt(pachet.value) || 0;
            const costCazareTotal = nopti * pretBazaNoapte;

            let pretExtras = 0;
            extras.forEach(cb => { if(cb.checked) pretExtras += parseInt(cb.value); });

            const numePachet = pachet.options[pachet.selectedIndex].getAttribute('data-nume') || "-";
            const grandTotal = costCazareTotal + pretExtras;

            // Actualizare interfață vizuală
            document.getElementById('res_pachet').innerText = numePachet;
            document.getElementById('res_nopti').innerText = nopti;
            document.getElementById('res_cost_cazare').innerText = costCazareTotal + " RON";
            document.getElementById('res_extras').innerText = pretExtras + " RON";
            document.getElementById('res_total').innerText = grandTotal + " RON";

            // Actualizare câmpuri ascunse pentru formular (ce se trimite la Make)
            document.getElementById('total_valoare').value = grandTotal;
            document.getElementById('nume_pachet_ales').value = numePachet;
        }

        [checkin, checkout, pachet].forEach(el => el.addEventListener('change', calculate));
        extras.forEach(cb => cb.addEventListener('change', calculate));
    </script>
</body>
</html>
