<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --auriu: #c5a059; --negru: #1a1a1a; --crem: #fdfcf8; }
        body { font-family: 'Inter', sans-serif; background: var(--crem); padding-top: 120px; }
        .site-header { position: fixed; top: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #eee; padding: 10px 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .res-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .section-label { font-size: 0.65rem; font-weight: 800; color: var(--auriu); text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px; display: block; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #eee; font-family: inherit; }
        .btn-submit { width: 100%; padding: 18px; background: var(--auriu); color: white; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">
            <a href="index.html" style="text-decoration:none; color:#000; font-family:'Playfair Display'; font-weight:700;">HAȚEG ALTERNATIV</a>
            <nav><a href="index.html" style="text-decoration:none; color:#000; font-size:0.7rem; font-weight:700;">ÎNAPOI</a></nav>
        </div>
    </header>

    <div class="res-container">
        <h1 style="font-family:'Playfair Display'; font-style:italic; text-align:center;">Rezervare Sejur</h1>
        
        <span class="section-label">Date Contact</span>
        <input type="text" id="nume" placeholder="Nume Complet">
        <input type="text" id="telefon" placeholder="Telefon (WhatsApp)">

        <span class="section-label">Perioadă Sejur</span>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="date" id="checkin">
            <input type="date" id="checkout">
        </div>

        <span class="section-label">Pachet & Locație</span>
        <select id="pachet">
            <option value="2000">Cazare Integrală (10 locuri) - 2000 RON</option>
            <option value="3000">Cazare + 2 Mese - 3000 RON</option>
            <option value="4000">Metanoia All-Inclusive - 4000 RON</option>
        </select>
        <input type="hidden" id="locatie" value="Domeniile la Buligă">
        <input type="hidden" id="persoane" value="10">

        <button class="btn-submit" onclick="trimiteRezervarea()">Confirmă Rezervarea</button>
    </div>

    <script>
        async function trimiteRezervarea() {
            // URL-ul tau de la Google Apps Script (Web App URL)
            const scriptURL = 'PUNE_AICI_URL_UL_TAU_DE_LA_DEPLOY';
            
            const data = {
                nume: document.getElementById('nume').value,
                telefon: document.getElementById('telefon').value,
                locatie: document.getElementById('locatie').value,
                checkin: document.getElementById('checkin').value,
                checkout: document.getElementById('checkout').value,
                persoane: document.getElementById('persoane').value,
                total: document.getElementById('pachet').value + " RON",
                pachetNume: document.getElementById('pachet').selectedOptions[0].text
            };

            if(!data.nume || !data.telefon || !data.checkin) {
                alert("Te rugăm să completezi toate datele.");
                return;
            }

            try {
                // 1. Trimitem la Google Sheet
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante pentru Google Script
                    cache: 'no-cache',
                    body: JSON.stringify(data)
                });

                // 2. Trimitem pe WhatsApp pentru notificare rapidă
                const msg = `Rezervare Nouă: ${data.nume}\nPerioada: ${data.checkin} - ${data.checkout}\nPachet: ${data.pachetNume}`;
                window.open(`https://wa.me/40749229686?text=${encodeURIComponent(msg)}`);
                
                alert("Rezervarea a fost trimisă cu succes!");
            } catch (e) {
                alert("A apărut o eroare. Încearcă din nou.");
            }
        }
    </script>
</body>
</html>
