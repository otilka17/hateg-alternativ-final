<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare | Hațeg Alternativ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --auriu-crem: #c5a059; 
            --negru-pur: #050505; 
            --alb: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru-pur); color: var(--alb); font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* HEADER & BURGER REPARAT */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 10000; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(197,160,89,0.2); }
        .brand { font-family: 'Cinzel'; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; font-size: 0.85rem; color: var(--auriu-crem); }
        
        .burger { cursor: pointer; z-index: 10001; padding: 10px; }
        .burger div { width: 25px; height: 2px; background: var(--auriu-crem); margin: 5px; transition: 0.3s; }

        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru-pur); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s ease; z-index: 9999; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: var(--alb) !important; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; }

        .main-container { max-width: 1200px; margin: 120px auto 60px; display: flex; flex-wrap: wrap; gap: 40px; padding: 0 20px; }

        /* FORMULAR */
        .form-side { flex: 1; min-width: 320px; }
        .form-side h2 { font-family: 'Cinzel'; color: var(--auriu-crem); margin-bottom: 30px; letter-spacing: 3px; font-size: 1.2rem; }
        
        .booking-form { display: grid; gap: 20px; }
        .booking-form input, .booking-form select, .booking-form textarea { 
            background: #000; border: 1px solid #222; padding: 15px; color: #fff; font-family: 'Inter'; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .booking-form input:focus { border-color: var(--auriu-crem); }
        
        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .date-label { font-size: 0.7rem; color: var(--auriu-crem); margin-bottom: 5px; display: block; font-family: 'Cinzel'; letter-spacing: 1px; }

        /* SUMAR */
        .summary-side { flex: 0.6; min-width: 300px; background: #0d0d0d; border: 1px solid var(--auriu-crem); padding: 35px; height: fit-content; position: sticky; top: 120px; }
        .summary-side h3 { font-family: 'Cinzel'; color: var(--auriu-crem); margin-bottom: 25px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; font-size: 1rem; letter-spacing: 2px; }
        
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; }
        .summary-row span:first-child { color: #888; }
        .total-row { margin-top: 20px; padding-top: 20px; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .total-price { color: var(--auriu-crem); font-size: 1.8rem; font-weight: 900; font-family: 'Playfair Display'; font-style: italic; }

        .btn-submit { background: transparent; border: 1px solid var(--auriu-crem); color: var(--auriu-crem); padding: 20px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; letter-spacing: 2px; transition: 0.3s; margin-top: 20px; }
        .btn-submit:hover { background: var(--auriu-crem); color: #000; }

        .whatsapp-float { position: fixed; bottom: 30px; left: 20px; background: #25d366; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 1000; color: #fff; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        @media (max-width: 768px) {
            .main-container { margin: 100px auto 30px; }
            .site-header { padding: 15px 20px; }
            .summary-side { position: static; }
        }
    </style>
</head>
