<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensiunea | La Buligă | Hațeg Alternativ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --auriu: #c5a059; --negru: #000000; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* HEADER & MENU */
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo svg { height: 80px; width: auto; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.5)); }
        .burger { cursor: pointer; z-index: 10001; padding: 10px; }
        .burger div { width: 30px; height: 2px; background: var(--auriu); margin: 6px; }
        
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-decoration: none; text-transform: uppercase; letter-spacing: 4px; }
        .main-nav a:hover { color: var(--auriu) !important; }

        /* HERO */
        .hero-sub { height: 70vh; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('images/la-buliga-pensiune.jpg') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-sub h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 6rem); color: var(--auriu); font-style: italic; }

        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; }
        .intro-text { text-align: center; max-width: 800px; margin: 0 auto 60px; }
        .intro-text h2 { font-family: 'Cinzel'; color: var(--auriu); letter-spacing: 5px; margin-bottom: 25px; }
        .intro-text p { font-family: 'Playfair Display'; font-style: italic; font-size: 1.8rem; color: #ccc; }

        /* GALERIE REPARATĂ */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; margin-bottom: 80px; }
        .photo-item { border: 1px solid #111; padding: 10px; background: #080808; }
        .photo-item img { width: 100%; height: 450px; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .photo-item:hover img { opacity: 1; }

        /* REZERVARE FORM */
        .booking-section { padding: 100px 20px; background: #050505; text-align: center; }
        .booking-section h2 { font-family: 'Cinzel'; color: var(--auriu); margin-bottom: 50px; letter-spacing: 5px; }
        .booking-form { max-width: 600px; margin: 0 auto; display: grid; gap: 20px; }
        .booking-form input, .booking-form textarea { background: #000; border: 1px solid #222; padding: 20px; color: #fff; font-family: 'Inter'; outline: none; }
        .booking-form input:focus { border-color: var(--auriu); }
        .btn-gold { padding: 18px 45px; border: 1px solid var(--auriu); color: var(--auriu); font-family: 'Cinzel'; background: transparent; cursor: pointer; text-decoration: none; }
        .btn-gold:hover { background: var(--auriu); color: #000; }

        footer { padding: 60px; text-align: center; border-top: 1px solid #111; color: #444; font-family: 'Cinzel'; font-size: 0.75rem; }
        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; color: #fff; }
    </style>
</head>
<body>

    <a href="https://wa.me/40749229686" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <header class="site-header">
        <a href="index.html">
            <svg viewBox="0 0 800 500" style="height:80px;"><circle cx="400" cy="250" r="105" fill="none" stroke="#c5a059" stroke-width="4" opacity="0.6"/><path d="M300 400 L400 200 L500 400 Z" fill="#c5a059"/></svg>
        </a>
        <div class="burger" id="burger"><div></div><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">ACASĂ</a>
            <a href="pensiune.html">PENSIUNEA</a>
            <a href="gastronomie.html">GASTRONOMIE</a>
            <a href="metanoia.html">METANOIA</a>
            <a href="evenimente.html">EVENIMENTE</a>
            <a href="#booking">REZERVARE</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <section class="hero-sub"><h1>La Buligă.</h1></section>

    <main class="container">
        <div class="intro-text">
            <h2>RÂNDUIALĂ ÎN POIANA RUSCĂ</h2>
            <p>„Aici, timpul nu se grăbește. Se așază cuminte pe grinzi vechi.”</p>
        </div>

        <div class="photo-grid">
            <div class="photo-item"><img src="images/IMG_20260330_160314.jpg" alt="Interior"></div>
            <div class="photo-item"><img src="images/IMG_20260330_160323.jpg" alt="Detalii"></div>
            <div class="photo-item"><img src="images/IMG_20260330_160335.jpg" alt="Atmosfera"></div>
            <div class="photo-item"><img src="images/IMG_20260330_160344.jpg" alt="Camere"></div>
        </div>

        <section id="booking" class="booking-section">
            <h2>SOLICITĂ REZERVARE</h2>
            <form class="booking-form" action="https://formspree.io/f/xjgpvbkj" method="POST">
                <input type="text" name="name" placeholder="Numele tău" required>
                <input type="email" name="email" placeholder="Adresa de email" required>
                <textarea name="message" rows="5" placeholder="Perioada dorită și număr de persoane"></textarea>
                <button type="submit" class="btn-gold">TRIMITE CEREREA</button>
            </form>
        </section>
    </main>

    <footer>DAKAMIGOS MARKT SRL | CUI: RO40767794 | HAȚEG ALTERNATIV &copy; 2026</footer>

    <script>
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-links');
        if(burger) { burger.onclick = () => { nav.classList.toggle('active'); } }
    </script>
</body>
</html>
