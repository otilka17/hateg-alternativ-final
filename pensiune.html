<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensiunea | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; --gri-card: #0d0d0d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; line-height: 1.6; }
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo svg { height: 75px; width: auto; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.4)); }
        .burger { cursor: pointer; } .burger div { width: 30px; height: 1px; background: var(--auriu); margin: 8px; }
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-decoration: none; letter-spacing: 5px; }
        .hero-sub { height: 65vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('images/la-buliga-pensiune.jpg') center/cover; display: flex; align-items: center; justify-content: center; }
        .hero-sub h1 { font-family: 'Playfair Display'; font-size: clamp(3.5rem, 10vw, 6rem); font-style: italic; color: var(--auriu); }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; }
        .interior-colaj { width: 100%; margin-bottom: 80px; border: 1px solid #1a1a1a; }
        .interior-colaj img { width: 100%; height: auto; display: block; }
        .vibe-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; }
        .img-item { height: 450px; background-size: cover; background-position: center; border: 1px solid #1a1a1a; opacity: 0.9; transition: 0.5s; }
        .img-item:hover { opacity: 1; border-color: var(--auriu); }
        footer { padding: 60px 20px; text-align: center; border-top: 1px solid #111; color: #444; font-family: 'Cinzel'; font-size: 0.7rem; }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand-logo"><svg viewBox="0 0 800 500"><circle cx="400" cy="250" r="105" fill="none" stroke="#c5a059" stroke-width="2"/><path d="M300 400 L400 200 L500 400 Z" fill="#c5a059"/></svg></a>
        <div class="burger" id="burger"><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">Acasă</a><a href="pensiune.html">Pensiunea</a><a href="metanoia.html">Metanoia</a><a href="gastronomie.html">Gastronomie</a><a href="evenimente.html">Evenimente</a><a href="rezervari.html">Rezervare</a><a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="hero-sub"><h1>Rânduiala Casei.</h1></section>
    <main class="container">
        <div class="interior-colaj"><img src="images/image_7182c2.jpg" loading="lazy"></div>
        <div class="vibe-grid">
            <div class="img-item" style="background-image: url('images/IMG_20260330_160314.webp');"></div>
            <div class="img-item" style="background-image: url('images/IMG_20260330_160323.webp');"></div>
            <div class="img-item" style="background-image: url('images/IMG_20260330_160335.webp');"></div>
            <div class="img-item" style="background-image: url('images/IMG_20260330_160344.webp');"></div>
            <div class="img-item" style="background-image: url('images/IMG_20260330_160353.webp');"></div>
            <div class="img-item" style="background-image: url('images/IMG_20260330_160505.webp');"></div>
        </div>
    </main>
    <footer>HAȚEG ALTERNATIV &copy; 2026</footer>
    <script>
        const burger = document.getElementById('burger'); const nav = document.getElementById('nav-links'); burger.onclick = () => nav.classList.toggle('active');
    </script>
</body>
</html>
