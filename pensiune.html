<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensiunea | Hațeg Alternativ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --auriu: #c5a059; --negru: #050505; --alb: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negru); color: var(--alb); font-family: 'Inter', sans-serif; }
        .site-header { position: absolute; top: 0; width: 100%; z-index: 9999; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .burger div { width: 30px; height: 1px; background: var(--auriu); margin: 8px; }
        .main-nav { position: fixed; top: 0; right: -100%; height: 100vh; width: 100%; background: var(--negru); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s; z-index: 10000; }
        .main-nav.active { right: 0; }
        .main-nav a { font-size: 1.8rem; font-family: 'Cinzel'; margin: 15px 0; color: #fff !important; text-transform: uppercase; letter-spacing: 5px; }

        .hero-pensiune { height: 60vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('images/la-buliga-pensiune.jpg') center/cover; display: flex; align-items: center; justify-content: center; }
        .hero-pensiune h1 { font-family: 'Playfair Display'; font-size: 4rem; font-style: italic; color: var(--auriu); }

        .container { max-width: 1000px; margin: 80px auto; padding: 0 20px; text-align: center; }
        .house-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .detail-item i { color: var(--auriu); font-size: 2.5rem; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand-logo"><svg viewBox="0 0 800 500" style="height:70px;"><circle cx="400" cy="250" r="105" fill="none" stroke="#c5a059" stroke-width="2"/><path d="M300 400 L400 200 L500 400 Z" fill="#c5a059"/></svg></a>
        <div class="burger" id="burger" style="cursor:pointer;"><div></div><div></div></div>
        <nav class="main-nav" id="nav-links">
            <a href="index.html">Acasă</a><a href="pensiune.html">Pensiunea</a><a href="metanoia.html">Metanoia</a><a href="gastronomie.html">Gastronomie</a><a href="evenimente.html">Evenimente</a><a href="rezervari.html">Rezervare</a><a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="hero-pensiune"><h1>Rânduiala Locului.</h1></section>
    <main class="container">
        <div class="house-details">
            <div class="detail-item"><i class="fas fa-bed"></i><h4>DORMIRE</h4><p>Camere calde, cu arome de lemn.</p></div>
            <div class="detail-item"><i class="fas fa-couch"></i><h4>RELAXARE</h4><p>Zone comune generoase.</p></div>
            <div class="detail-item"><i class="fas fa-mountain-sun"></i><h4>TERASĂ</h4><p>Priveliște panoramică.</p></div>
        </div>
    </main>
    <script>const burger = document.getElementById('burger'); const nav = document.getElementById('nav-links'); burger.onclick = () => nav.classList.toggle('active');</script>
</body>
</html>
